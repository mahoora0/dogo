<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<th:block th:replace="~{layout/base :: setContent(~{this::content})}">
  <th:block th:fragment="content">
    <div class="quick-actions">
      <div class="action-card lost" onclick="location.href='/lost-items/new'">
        <div class="icon">🔍</div>
        <div class="text">
          <p>물건을 잃어버리셨나요?</p>
          <strong>분실물 등록</strong>
        </div>
      </div>
      <div class="action-card found" onclick="location.href='/found-items/new'">
        <div class="icon">🎁</div>
        <div class="text">
          <p>주인을 찾아주시겠어요?</p>
          <strong>습득물 등록</strong>
        </div>
      </div>
    </div>

    <form action="/lost-items" method="get" class="mb-10 grid gap-3 rounded-xl border border-slate-200 bg-white p-5 shadow-sm md:grid-cols-4">
      <div class="flex flex-col gap-1.5">
        <label class="text-xs font-semibold text-slate-500 ml-1">물품명</label>
        <input name="keyword" placeholder="어떤 물건을 찾으시나요?" class="rounded-lg border border-slate-200 bg-slate-50 px-3 py-2.5 text-sm outline-none focus:border-slate-900 focus:bg-white transition-all">
      </div>
      <div class="flex flex-col gap-1.5">
        <label class="text-xs font-semibold text-slate-500 ml-1">카테고리</label>
        <select name="category" class="rounded-lg border border-slate-200 bg-slate-50 px-3 py-2.5 text-sm outline-none focus:border-slate-900 focus:bg-white transition-all">
          <option value="">전체 카테고리</option>
          <option th:each="categoryOption : ${searchCategories}" th:value="${categoryOption}" th:text="${categoryOption}">지갑</option>
        </select>
      </div>
      <div class="flex flex-col gap-1.5">
        <label class="text-xs font-semibold text-slate-500 ml-1">분실 지역</label>
        <input name="area" placeholder="장소 또는 지역명" class="rounded-lg border border-slate-200 bg-slate-50 px-3 py-2.5 text-sm outline-none focus:border-slate-900 focus:bg-white transition-all">
      </div>
      <div class="flex items-end">
        <button type="submit" class="w-full rounded-lg bg-slate-900 py-2.5 text-sm font-bold text-white hover:bg-slate-800 transition-colors shadow-sm">
          검색하기
        </button>
      </div>
    </form>

    <div class="mt-10">
      <h4 class="mb-4 text-lg font-bold tracking-tight">최근 등록된 물품</h4>
      <section th:if="${!#lists.isEmpty(recentItems)}" class="grid gap-4 sm:grid-cols-2 xl:grid-cols-3">
        <a th:each="item : ${recentItems}"
           th:href="${item.type == 'LOST' ? '/lost-items/' + item.id : '/found-items/' + item.id}"
           class="group overflow-hidden rounded-xl border border-slate-200 bg-white shadow-sm transition hover:-translate-y-0.5 hover:shadow-md">
          <div class="relative h-44 overflow-hidden bg-slate-100">
            <img th:if="${item.imageUrl}" th:src="${item.imageUrl}" alt=""
                 class="h-full w-full object-cover transition duration-300 group-hover:scale-105">
            <div th:unless="${item.imageUrl}"
                 class="flex h-full w-full items-center justify-center text-slate-300">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
            </div>
            <span th:text="${item.typeLabel}"
                  th:classappend="${item.type == 'LOST' ? ' bg-rose-500' : ' bg-blue-500'}"
                  class="absolute left-2 top-2 rounded-full px-2.5 py-0.5 text-xs font-bold text-white shadow">분실</span>
            <span th:text="${item.statusLabel}"
                  class="absolute right-2 top-2 rounded-full bg-slate-600 px-2.5 py-0.5 text-xs font-bold text-white shadow">대기중</span>
          </div>
          <div class="p-4">
            <span th:text="${item.category ?: '미분류'}"
                  class="inline-block rounded-md bg-teal-50 px-2 py-0.5 text-xs font-semibold text-teal-700">카테고리</span>
            <h2 th:text="${item.title}" class="mt-2 line-clamp-1 text-base font-bold">제목</h2>
            <div class="mt-2 flex items-center gap-1.5 text-sm text-slate-500">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a2 2 0 01-2.828 0l-4.243-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
              <span th:text="${item.place ?: '-'}" class="truncate">장소</span>
            </div>
            <div class="mt-1 flex items-center gap-1.5 text-sm text-slate-400">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
              <span th:text="${#temporals.format(item.itemAt, 'yyyy.MM.dd HH:mm')}">2026.05.02 14:30</span>
            </div>
          </div>
        </a>
      </section>
      <div th:if="${#lists.isEmpty(recentItems)}"
           class="flex flex-col items-center rounded-xl border border-dashed border-slate-300 bg-white px-5 py-14 text-center">
        <svg xmlns="http://www.w3.org/2000/svg" class="mb-3 h-12 w-12 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1"><path stroke-linecap="round" stroke-linejoin="round" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-2.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/></svg>
        <p class="text-sm font-medium text-slate-500">등록된 물품이 없습니다.</p>
      </div>
    </div>
  </th:block>
</th:block>
</html>
