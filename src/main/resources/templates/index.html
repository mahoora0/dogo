<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<th:block th:replace="~{layout/base :: setContent(~{this::content})}">
  <th:block th:fragment="content">
    <div class="quick-actions">
      <div class="action-card lost" onclick="location.href='/lost-items'">
        <div class="icon">🔍</div>
        <div class="text">
          <p>물건을 잃어버리셨나요?</p>
          <strong>분실물 검색</strong>
        </div>
      </div>
      <div class="action-card found" onclick="location.href='/lost-items/new'">
        <div class="icon">🎁</div>
        <div class="text">
          <p>주인을 찾아주시겠어요?</p>
          <strong>습득물 등록</strong>
        </div>
      </div>
    </div>

    <div class="feed-section">
      <h4 class="section-title">최근 등록된 물품</h4>
      <div class="feed-grid">
        <div class="feed-item">
          <div class="item-img">이미지</div>
          <div class="item-info">
            <h4>AirPods Pro 2nd Gen</h4>
            <p class="status-lost">[분실]</p>
            <p class="date">2026.05.09(토)</p>
            <p class="loc">장소: 서면역 2번 출구</p>
          </div>
        </div>
        <div class="feed-item">
          <div class="item-img">이미지</div>
          <div class="item-info">
            <h4>검정색 가죽 지갑</h4>
            <p class="status-found">[습득]</p>
            <p class="date">2026.05.10(일)</p>
            <p class="loc">장소: 정관읍 주민센터</p>
          </div>
        </div>
      </div>
    </div>
  </th:block>
</th:block>
</html>
