<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<th:block th:replace="~{layout/base :: setContent(~{this::content})}">
  <th:block th:fragment="content">
    <div class="quick-actions">
      <div class="action-card lost" onclick="location.href='/lost-items/new'">
        <div class="icon">🔍</div>
        <div class="text">
          <p>물건을 잃어버리셨나요?</p>
          <strong>분실물 등록</strong>
        </div>
      </div>
      <div class="action-card found" onclick="location.href='/found-items/new'">
        <div class="icon">🎁</div>
        <div class="text">
          <p>주인을 찾아주시겠어요?</p>
          <strong>습득물 등록</strong>
        </div>
      </div>
      <div class="action-card animal" onclick="location.href='/animal-reports'">
        <div class="icon">!</div>
        <div class="text">
          <p>실종/목격 동물 신고</p>
          <strong>동물 신고 게시판</strong>
        </div>
      </div>
    </div>

    <form action="/lost-items" method="get" class="mb-10 grid gap-3 rounded-2xl border border-slate-200 bg-white p-4 shadow-sm sm:grid-cols-2 lg:grid-cols-4">
      <div class="relative group">
        <svg xmlns="http://www.w3.org/2000/svg" class="pointer-events-none absolute left-4 top-1/2 h-5 w-5 -translate-y-1/2 text-slate-400 transition-colors group-focus-within:text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M11 19a8 8 0 100-16 8 8 0 000 16z"/></svg>
        <input name="keyword" placeholder="어떤 물건을 찾으시나요?" class="w-full rounded-lg border border-slate-200 bg-slate-50 py-3 pl-11 pr-4 text-sm font-medium text-slate-800 outline-none transition focus:border-slate-400 focus:bg-white focus:ring-2 focus:ring-slate-100">
      </div>
      <div class="relative">
        <select name="category" class="w-full appearance-none rounded-lg border border-slate-200 bg-slate-50 px-4 py-3 text-sm font-medium text-slate-800 outline-none transition focus:border-slate-400 focus:bg-white focus:ring-2 focus:ring-slate-100">
          <option value="">전체 카테고리</option>
          <option th:each="categoryOption : ${searchCategories}" th:value="${categoryOption}" th:text="${categoryOption}">지갑</option>
        </select>
        <svg xmlns="http://www.w3.org/2000/svg" class="pointer-events-none absolute right-4 top-1/2 h-4 w-4 -translate-y-1/2 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
      </div>
      <div class="relative group">
        <svg xmlns="http://www.w3.org/2000/svg" class="pointer-events-none absolute left-4 top-1/2 h-4 w-4 -translate-y-1/2 text-slate-400 transition-colors group-focus-within:text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a2 2 0 01-2.828 0l-4.243-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        <input name="area" placeholder="장소 또는 지역명" class="w-full rounded-lg border border-slate-200 bg-slate-50 py-3 pl-10 pr-4 text-sm font-medium text-slate-800 outline-none transition focus:border-slate-400 focus:bg-white focus:ring-2 focus:ring-slate-100">
      </div>
      <button type="submit" class="rounded-lg bg-slate-900 px-4 py-3 text-sm font-semibold text-white shadow-sm transition hover:bg-slate-700 active:scale-[0.98]">
        검색하기
      </button>
    </form>

    <div class="mt-10">
      <h4 class="mb-5 text-xl font-bold tracking-tight text-slate-900">최근 등록된 물품</h4>
      <section th:if="${!#lists.isEmpty(recentItems)}" class="grid gap-5 sm:grid-cols-2 xl:grid-cols-3">
        <a th:each="item : ${recentItems}"
           th:href="${item.type == 'LOST' ? '/lost-items/' + item.id : '/found-items/' + item.id}"
           class="group overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm transition hover:border-slate-300 hover:shadow-md">
          <div class="relative h-44 w-full overflow-hidden bg-slate-50">
            <img th:if="${item.imageUrl}" th:src="${item.imageUrl}" alt=""
                 class="h-full w-full object-cover transition-transform duration-700 group-hover:scale-110">
            <div th:unless="${item.imageUrl}"
                 class="flex h-full w-full items-center justify-center text-slate-300 bg-gradient-to-br from-slate-50 to-slate-100">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-14 w-14 opacity-50" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
            </div>
            <div class="absolute left-3 top-3 z-10 flex gap-1.5">
              <span th:text="${item.typeLabel}"
                    th:classappend="${item.type == 'LOST' ? ' bg-rose-500' : ' bg-indigo-500'}"
                    class="block rounded-md px-2 py-1 text-xs font-bold text-white shadow-sm">분실</span>
            </div>
            <div class="absolute right-3 top-3 z-10">
              <span th:text="${item.statusLabel}"
                    th:classappend="${item.status == 'RETURNED' ? ' bg-emerald-600 text-white' : (item.status == 'MATCHING' ? ' bg-amber-500 text-white' : ' bg-slate-800 text-white')}"
                    class="block rounded-full px-3 py-1 text-xs font-bold shadow-sm">보관중</span>
            </div>
          </div>
          <div class="p-4">
            <h2 th:text="${item.title}" class="line-clamp-1 text-base font-bold text-slate-900">제목</h2>
            <div class="mt-2 flex flex-wrap gap-1.5">
              <span th:text="${item.category ?: '미분류'}" class="max-w-full truncate rounded bg-slate-100 px-2 py-0.5 text-xs font-semibold text-slate-600">카테고리</span>
            </div>
            <div class="mt-3 space-y-1.5 text-sm text-slate-500">
              <div class="flex min-w-0 items-center gap-1.5">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 shrink-0 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a2 2 0 01-2.828 0l-4.243-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                <span th:text="${item.place ?: '-'}" class="truncate">장소</span>
              </div>
              <div class="flex items-center gap-1.5">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 shrink-0 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                <span th:text="${#temporals.format(item.itemAt, 'yyyy.MM.dd HH:mm')}">2026.05.02 14:30</span>
              </div>
            </div>
          </div>
        </a>
      </section>
      <div th:if="${#lists.isEmpty(recentItems)}"
           class="mt-8 flex flex-col items-center justify-center rounded-3xl border border-slate-200 bg-white/50 px-5 py-24 text-center backdrop-blur-sm">
        <div class="mb-5 flex h-20 w-20 items-center justify-center rounded-full bg-slate-100 text-slate-300">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        </div>
        <p class="text-lg font-bold text-slate-700">등록된 물품이 없습니다</p>
      </div>
    </div>
  </th:block>
</th:block>
</html>
