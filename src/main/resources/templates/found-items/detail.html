<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<th:block th:replace="~{layout/base :: setContent(~{this::content})}">
  <th:block th:fragment="content">
    <div class="mb-6">
      <a th:href="@{/found-items}" class="inline-flex items-center gap-1 text-sm font-medium text-slate-500 transition hover:text-slate-900">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
        목록으로 돌아가기
      </a>
    </div>

    <section class="grid gap-8 lg:grid-cols-[1.1fr_0.9fr]">
      <div>
        <div class="overflow-hidden rounded-xl border border-slate-200 bg-slate-100 shadow-sm">
          <img th:if="${foundItem.imageUrls != null && !foundItem.imageUrls.isEmpty()}"
               th:src="${foundItem.imageUrls[0]}" alt=""
               class="h-72 w-full object-cover lg:h-[420px]">
          <div th:unless="${foundItem.imageUrls != null && !foundItem.imageUrls.isEmpty()}"
               class="flex h-72 w-full items-center justify-center text-slate-300 lg:h-[420px]">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
          </div>
        </div>
        <div th:if="${foundItem.imageUrls != null && #lists.size(foundItem.imageUrls) > 1}"
             class="mt-3 grid grid-cols-4 gap-2">
          <img th:each="imageUrl : ${foundItem.imageUrls}" th:src="${imageUrl}" alt=""
               class="h-20 w-full cursor-pointer rounded-lg border-2 border-transparent object-cover transition hover:border-teal-500 hover:opacity-90">
        </div>
      </div>

      <div>
        <div class="mb-4 flex flex-wrap items-center gap-2">
          <span th:text="${foundItem.category ?: '미분류'}"
                class="rounded-md bg-teal-50 px-2.5 py-1 text-sm font-semibold text-teal-700">지갑</span>
          <span th:text="${foundItem.statusLabel}"
                th:classappend="${foundItem.status == 'RETURNED' ? ' bg-emerald-50 text-emerald-700' : (foundItem.status == 'MATCHING' ? ' bg-amber-50 text-amber-700' : ' bg-slate-100 text-slate-700')}"
                class="rounded-md px-2.5 py-1 text-sm font-semibold">보관중</span>
        </div>

        <h1 th:text="${foundItem.title}" class="text-2xl font-bold tracking-tight">검정 카드지갑을 주웠습니다</h1>

        <p th:text="${foundItem.description ?: '상세 설명이 없습니다.'}"
           class="mt-4 whitespace-pre-line leading-7 text-slate-600">상세 설명</p>

        <dl class="mt-6 divide-y divide-slate-100 rounded-xl border border-slate-200 bg-white shadow-sm">
          <div class="flex gap-4 px-4 py-3.5">
            <dt class="w-24 shrink-0 text-sm font-semibold text-slate-400">물품명</dt>
            <dd th:text="${foundItem.name}" class="text-sm font-medium text-slate-800">검정 카드지갑</dd>
          </div>
          <div class="flex gap-4 px-4 py-3.5">
            <dt class="w-24 shrink-0 text-sm font-semibold text-slate-400">습득 지역</dt>
            <dd th:text="${foundItem.area ?: '-'}" class="text-sm font-medium text-slate-800">서울 강남구</dd>
          </div>
          <div class="flex gap-4 px-4 py-3.5">
            <dt class="w-24 shrink-0 text-sm font-semibold text-slate-400">습득 장소</dt>
            <dd th:text="${foundItem.place ?: '-'}" class="text-sm font-medium text-slate-800">강남역</dd>
          </div>
          <div class="flex gap-4 px-4 py-3.5">
            <dt class="w-24 shrink-0 text-sm font-semibold text-slate-400">보관 장소</dt>
            <dd th:text="${foundItem.keepPlace ?: '-'}" class="text-sm font-medium text-slate-800">-</dd>
          </div>
          <div class="flex gap-4 px-4 py-3.5">
            <dt class="w-24 shrink-0 text-sm font-semibold text-slate-400">연락처</dt>
            <dd th:text="${foundItem.contact ?: '-'}" class="text-sm font-medium text-slate-800">02-0000-0000</dd>
          </div>
          <div class="flex gap-4 px-4 py-3.5">
            <dt class="w-24 shrink-0 text-sm font-semibold text-slate-400">습득 일시</dt>
            <dd th:text="${#temporals.format(foundItem.foundAt, 'yyyy.MM.dd HH:mm')}" class="text-sm font-medium text-slate-800">2026.05.02 14:30</dd>
          </div>
          <div th:if="${foundItem.colorName}" class="flex gap-4 px-4 py-3.5">
            <dt class="w-24 shrink-0 text-sm font-semibold text-slate-400">색상</dt>
            <dd th:text="${foundItem.colorName}" class="text-sm font-medium text-slate-800">검정</dd>
          </div>
        </dl>

        <div class="mt-6 flex gap-2">
          <form th:action="@{/chat/room}" method="post" style="display: inline;">
            <input type="hidden" name="itemId" th:value="${foundItem.id}">
            <input type="hidden" name="itemType" value="FOUND">
            <button type="submit"
                    class="rounded-lg bg-indigo-600 px-6 py-2.5 text-sm font-semibold text-white transition hover:bg-indigo-700 shadow-md">
              채팅하기
            </button>
          </form>
          <a th:href="@{/found-items}"
             class="rounded-lg border border-slate-300 px-4 py-2.5 text-sm font-semibold text-slate-700 transition hover:bg-slate-50">
            목록
          </a>
        </div>
      </div>
    </section>

    <section th:if="${matchCandidates != null && !matchCandidates.isEmpty()}" class="mt-10">
      <h2 class="mb-4 text-lg font-bold tracking-tight">
        이 물건을 찾는 분실 신고
        <span class="ml-2 text-sm font-normal text-slate-400" th:text="${#lists.size(matchCandidates)} + '건'">0건</span>
      </h2>
      <div class="grid gap-3 sm:grid-cols-2 lg:grid-cols-3">
        <a th:each="match : ${matchCandidates}"
           th:href="@{'/lost-items/' + ${match.id()}}"
           class="group block rounded-xl border border-slate-200 bg-white shadow-sm transition hover:border-amber-300 hover:shadow-md">
          <div class="relative overflow-hidden rounded-t-xl bg-slate-100">
            <img th:if="${match.imageUrl() != null}" th:src="${match.imageUrl()}" alt=""
                 class="h-36 w-full object-cover transition group-hover:scale-105">
            <div th:unless="${match.imageUrl() != null}"
                 class="flex h-36 w-full items-center justify-center text-slate-300">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
            </div>
            <span class="absolute right-2 top-2 rounded-full bg-amber-500 px-2 py-0.5 text-xs font-bold text-white"
                  th:text="${match.score() + '점'}">85점</span>
          </div>
          <div class="p-3">
            <p class="truncate text-sm font-semibold text-slate-800" th:text="${match.name()}">검정 반지갑</p>
            <div class="mt-1 flex flex-wrap items-center gap-1.5">
              <span th:if="${match.category() != null}" th:text="${match.category()}"
                    class="rounded bg-amber-50 px-1.5 py-0.5 text-xs font-medium text-amber-700">지갑</span>
              <span th:text="${match.statusLabel()}"
                    class="rounded bg-slate-100 px-1.5 py-0.5 text-xs font-medium text-slate-600">대기중</span>
            </div>
            <p th:if="${match.place() != null}" class="mt-1.5 truncate text-xs text-slate-500" th:text="${match.place()}">강남역</p>
            <p th:if="${match.eventAt() != null}" class="text-xs text-slate-400"
               th:text="${#temporals.format(match.eventAt(), 'yyyy.MM.dd')}">2026.05.02</p>
            <div th:if="${match.matchReasons() != null && !match.matchReasons().isEmpty()}" class="mt-2 space-y-0.5">
              <p th:each="reason : ${match.matchReasons()}" class="text-xs text-slate-400"
                 th:text="'· ' + ${reason}">· 카테고리 일치</p>
            </div>
          </div>
        </a>
      </div>
    </section>

    <div th:if="${matchCandidates == null || matchCandidates.isEmpty()}" class="mt-10 rounded-xl border border-dashed border-slate-300 bg-slate-50 px-6 py-10 text-center">
      <p class="text-sm text-slate-400">아직 매칭된 분실 신고가 없습니다.</p>
      <p class="mt-1 text-xs text-slate-300">새로운 분실 신고가 등록되면 자동으로 매칭됩니다.</p>
    </div>
  </th:block>
</th:block>
</html>
