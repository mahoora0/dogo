<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<th:block th:replace="~{layout/base :: setContent(~{this::content})}">
  <th:block th:fragment="content">
    <div class="flex flex-col items-center justify-center py-20 text-center">
      <div class="rounded-full bg-slate-100 p-4">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
      </div>
      <h1 class="mt-5 text-2xl font-bold tracking-tight">습득물 정보를 찾을 수 없습니다</h1>
      <p th:text="${message ?: '요청한 습득물 게시글이 없거나 삭제되었습니다.'}"
         class="mt-2 text-sm text-slate-500">
        요청한 습득물 게시글이 없거나 삭제되었습니다.
      </p>
      <a th:href="@{/found-items}"
         class="mt-6 inline-flex items-center gap-1.5 rounded-lg bg-slate-900 px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-slate-700">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
        목록으로 돌아가기
      </a>
    </div>
  </th:block>
</th:block>
</html>
