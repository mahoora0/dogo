<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<th:block th:replace="~{layout/base :: setContent(~{this::content})}">
  <th:block th:fragment="content">
    <section class="mb-8 flex flex-col gap-4 sm:flex-row sm:items-end sm:justify-between">
      <div>
        <p class="text-sm font-semibold text-teal-700">습득물 등록과 조회</p>
        <h1 class="mt-1 text-2xl font-bold tracking-tight">내가 주웠어요</h1>
        <p class="mt-1 text-sm text-slate-500">주운 물건을 등록하고 검색할 수 있습니다.</p>
      </div>
      <a th:href="@{/found-items/new}"
         class="inline-flex items-center justify-center gap-1.5 rounded-lg bg-teal-600 px-4 py-2.5 text-sm font-semibold text-white shadow-sm transition hover:bg-teal-700 active:scale-[0.97]">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
        습득물 등록
      </a>
    </section>

    <form th:action="@{/found-items}" method="get"
          class="mb-6 grid gap-3 rounded-xl border border-slate-200 bg-white p-4 shadow-sm sm:grid-cols-2 lg:grid-cols-5">
      <div class="relative">
        <svg xmlns="http://www.w3.org/2000/svg" class="pointer-events-none absolute left-3 top-1/2 h-4 w-4 -translate-y-1/2 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M11 19a8 8 0 100-16 8 8 0 000 16z"/></svg>
        <input name="keyword" th:value="${keyword}" placeholder="물품명, 제목"
               class="w-full rounded-lg border border-slate-300 py-2 pl-9 pr-3 text-sm outline-none transition focus:border-teal-500 focus:ring-2 focus:ring-teal-100">
      </div>
      <select name="category"
              class="rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none transition focus:border-teal-500 focus:ring-2 focus:ring-teal-100">
        <option value="">전체 카테고리</option>
        <option th:each="categoryOption : ${searchCategories}"
                th:value="${categoryOption}" th:text="${categoryOption}"
                th:selected="${category == categoryOption}">지갑</option>
      </select>
      <input name="area" th:value="${area}" placeholder="지역 또는 장소"
             class="rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none transition focus:border-teal-500 focus:ring-2 focus:ring-teal-100">
      <select name="status"
              class="rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none transition focus:border-teal-500 focus:ring-2 focus:ring-teal-100">
        <option value="">전체 상태</option>
        <option value="KEEPING" th:selected="${status == 'KEEPING'}">보관중</option>
        <option value="MATCHING" th:selected="${status == 'MATCHING'}">매칭중</option>
        <option value="RETURNED" th:selected="${status == 'RETURNED'}">수령완료</option>
      </select>
      <button type="submit"
              class="rounded-lg bg-slate-900 px-4 py-2 text-sm font-semibold text-white transition hover:bg-slate-700 active:scale-[0.97]">
        검색
      </button>
    </form>

    <section class="grid gap-4 sm:grid-cols-2 xl:grid-cols-3">
      <a th:each="item : ${foundItems}" th:href="@{/found-items/{id}(id=${item.id})}"
         class="group overflow-hidden rounded-xl border border-slate-200 bg-white shadow-sm transition hover:-translate-y-0.5 hover:shadow-md">
        <div class="relative h-44 overflow-hidden bg-slate-100">
          <img th:if="${item.imageUrl}" th:src="${item.imageUrl}" alt=""
               class="h-full w-full object-cover transition duration-300 group-hover:scale-105">
          <div th:unless="${item.imageUrl}"
               class="flex h-full w-full items-center justify-center text-slate-300">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
          </div>
          <span th:text="${item.statusLabel}"
                th:classappend="${item.status == 'RETURNED' ? ' bg-emerald-500' : (item.status == 'MATCHING' ? ' bg-amber-500' : ' bg-slate-600')}"
                class="absolute right-2 top-2 rounded-full px-2.5 py-0.5 text-xs font-bold text-white shadow">보관중</span>
        </div>
        <div class="p-4">
          <span th:text="${item.category ?: '미분류'}"
                class="inline-block rounded-md bg-teal-50 px-2 py-0.5 text-xs font-semibold text-teal-700">지갑</span>
          <h2 th:text="${item.title}" class="mt-2 line-clamp-1 text-base font-bold">검정 카드지갑을 주웠습니다</h2>
          <div class="mt-2 flex items-center gap-1.5 text-sm text-slate-500">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a2 2 0 01-2.828 0l-4.243-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
            <span th:text="${item.place ?: item.area ?: '-'}" class="truncate">강남역 11번 출구</span>
          </div>
          <div class="mt-1 flex items-center gap-1.5 text-sm text-slate-400">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
            <span th:text="${#temporals.format(item.foundAt, 'yyyy.MM.dd HH:mm')}">2026.05.02 14:30</span>
          </div>
        </div>
      </a>
    </section>

    <div th:if="${#lists.isEmpty(foundItems)}"
         class="mt-4 flex flex-col items-center rounded-xl border border-dashed border-slate-300 bg-white px-5 py-14 text-center">
      <svg xmlns="http://www.w3.org/2000/svg" class="mb-3 h-12 w-12 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1"><path stroke-linecap="round" stroke-linejoin="round" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      <p class="text-sm font-medium text-slate-500">검색 결과가 없습니다.</p>
      <p class="mt-1 text-xs text-slate-400">다른 키워드로 검색하거나 필터를 변경해보세요.</p>
    </div>

    <nav th:if="${foundItemPage != null && foundItemPage.totalPages > 1}"
         class="mt-8 flex items-center justify-center gap-2 text-sm">
      <a th:classappend="${foundItemPage.first} ? ' pointer-events-none opacity-40'"
         th:href="@{/found-items(keyword=${keyword}, category=${category}, area=${area}, status=${status}, page=${page - 1}, size=${size})}"
         class="rounded-lg border border-slate-300 bg-white px-3 py-2 font-semibold text-slate-700 transition hover:bg-slate-50">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
      </a>
      <span class="rounded-lg bg-white px-3 py-2 font-medium text-slate-600">
        <span th:text="${page + 1}">1</span>
        <span class="text-slate-300">/</span>
        <span th:text="${foundItemPage.totalPages}">1</span>
      </span>
      <a th:classappend="${foundItemPage.last} ? ' pointer-events-none opacity-40'"
         th:href="@{/found-items(keyword=${keyword}, category=${category}, area=${area}, status=${status}, page=${page + 1}, size=${size})}"
         class="rounded-lg border border-slate-300 bg-white px-3 py-2 font-semibold text-slate-700 transition hover:bg-slate-50">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
      </a>
    </nav>
  </th:block>
</th:block>
</html>
