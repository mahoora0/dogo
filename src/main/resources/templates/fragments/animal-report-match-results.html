<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="matchResults">
  <div th:if="${matchCandidates != null && !matchCandidates.isEmpty()}" class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
    <a th:each="candidate : ${matchCandidates}"
       th:href="${'/animal-reports/' + candidate.reportId()}"
       class="group flex gap-4 rounded-2xl border border-slate-200 bg-white p-4 shadow-sm transition hover:border-slate-300 hover:shadow-md">
      <div class="h-20 w-20 shrink-0 overflow-hidden rounded-xl bg-slate-100">
        <img th:src="${candidate.imageUrl()}" alt="후보 이미지"
             class="h-full w-full object-cover transition group-hover:scale-105">
      </div>
      <div class="flex min-w-0 flex-col justify-between">
        <div>
          <div class="mb-1 flex flex-wrap gap-1">
            <th:block th:if="${candidate.reportType() == 'PROTECTING'}">
              <span class="rounded-full bg-indigo-100 px-2 py-0.5 text-xs font-bold text-indigo-700">목격</span>
              <span class="rounded-full bg-emerald-100 px-2 py-0.5 text-xs font-bold text-emerald-700">보호</span>
            </th:block>
            <th:block th:if="${candidate.reportType() != 'PROTECTING'}">
              <span th:text="${candidate.reportTypeLabel()}"
                    th:classappend="${candidate.reportType() == 'MISSING' ? ' bg-rose-100 text-rose-700' : (candidate.reportType() == 'SIGHTING' ? ' bg-indigo-100 text-indigo-700' : (candidate.reportType() == 'RETURNED' ? ' bg-sky-100 text-sky-700' : ' bg-amber-100 text-amber-700'))}"
                    class="rounded-full px-2 py-0.5 text-xs font-bold">실종</span>
            </th:block>
            <span th:text="${candidate.statusLabel()}"
                  class="rounded-full bg-slate-100 px-2 py-0.5 text-xs font-semibold text-slate-600">진행중</span>
          </div>
          <p th:text="${candidate.title()}" class="truncate text-sm font-bold text-slate-800 group-hover:text-slate-900">제목</p>
          <p class="mt-0.5 text-xs text-slate-500">
            <span th:text="${candidate.animalTypeLabel()}">개</span>
            <span th:if="${candidate.breedName() != null}" th:text="${' · ' + candidate.breedName()}"> · 말티즈</span>
          </p>
        </div>
        <div class="flex items-center justify-between">
          <span class="text-xs text-slate-400" th:text="${candidate.regionName() + ' · ' + #temporals.format(candidate.eventDate(), 'MM/dd')}">지역 · 날짜</span>
          <span class="text-xs font-bold text-indigo-600" th:text="${#numbers.formatDecimal(candidate.score(), 1, 1) + '점'}">유사도</span>
        </div>
      </div>
    </a>
  </div>
  <div th:unless="${matchCandidates != null && !matchCandidates.isEmpty()}" class="rounded-3xl border border-dashed border-slate-300 bg-slate-50/50 px-6 py-16 text-center backdrop-blur-sm">
    <div class="mx-auto mb-4 flex h-16 w-16 items-center justify-center rounded-full bg-white shadow-sm">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
    </div>
    <p class="text-base font-bold text-slate-600" th:text="${reportType == 'MISSING' ? '매칭된 목격 후보가 없습니다' : '매칭된 실종 후보가 없습니다'}">매칭 후보가 없습니다</p>
    <p class="mt-2 text-sm text-slate-500">비슷한 신고가 등록되면 시스템이 자동으로 추천해 드립니다.</p>
  </div>
</th:block>
</body>
</html>
