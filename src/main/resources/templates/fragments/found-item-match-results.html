<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="matchResults">
  <div th:if="${matchCandidates != null && !matchCandidates.isEmpty()}" class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
    <div class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
      <a th:each="match : ${matchCandidates}" th:href="${'/lost-items/' + match.id()}"
         class="group block rounded-xl border border-slate-200 bg-white p-4 transition hover:border-slate-300 hover:shadow-md">
        <div class="flex gap-4">
          <div class="relative h-24 w-24 shrink-0 overflow-hidden rounded-xl bg-slate-100">
            <img th:if="${match.imageUrl() != null}" th:src="${match.imageUrl()}" alt="" class="h-full w-full object-cover transition-transform group-hover:scale-110">
            <div th:unless="${match.imageUrl() != null}" class="flex h-full w-full items-center justify-center text-slate-300">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
            </div>
            <div class="absolute bottom-1 right-1 flex h-7 items-center justify-center rounded-lg bg-slate-900 px-2 text-xs font-bold text-white shadow-sm">
              <span th:text="${match.score()}">85</span>점
            </div>
          </div>
          <div class="flex flex-col justify-center">
            <p class="line-clamp-1 text-base font-bold text-slate-900" th:text="${match.name()}">검정 반지갑</p>
            <p th:if="${match.place() != null}" class="mt-1 truncate text-xs text-slate-500" th:text="${match.place()}">강남역</p>
            <div th:if="${match.matchReasons() != null && !match.matchReasons().isEmpty()}" class="mt-2 flex flex-wrap gap-1">
              <span th:each="reason, iterStat : ${match.matchReasons()}" th:if="${iterStat.index < 2}"
                    class="rounded bg-slate-100 px-1.5 py-0.5 text-[10px] font-medium text-slate-600"
                    th:text="${reason}">카테고리 일치</span>
              <span th:if="${#lists.size(match.matchReasons()) > 2}" class="rounded bg-slate-100 px-1.5 py-0.5 text-[10px] text-slate-500">...</span>
            </div>
          </div>
        </div>
      </a>
    </div>
  </div>
  <div th:unless="${matchCandidates != null && !matchCandidates.isEmpty()}" class="rounded-3xl border border-dashed border-slate-300 bg-slate-50/50 px-6 py-16 text-center backdrop-blur-sm">
    <div class="mx-auto mb-4 flex h-16 w-16 items-center justify-center rounded-full bg-white shadow-sm">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
    </div>
    <p class="text-base font-bold text-slate-600">매칭된 분실 신고가 없습니다</p>
    <p class="mt-2 text-sm text-slate-500">비슷한 분실 신고가 등록되면 시스템이 자동으로 추천해 드립니다.</p>
  </div>
</th:block>
</body>
</html>
