<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<th:block th:replace="~{layout/base :: setContent(~{this::content})}">
  <th:block th:fragment="content">
    <div class="mb-6 flex items-center justify-between">
      <a th:href="@{/animal-reports}" class="group inline-flex items-center gap-2 text-sm font-semibold text-slate-500 transition-colors hover:text-slate-900">
        <div class="flex h-8 w-8 items-center justify-center rounded-full bg-slate-100 transition-all group-hover:bg-slate-200">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
        </div>
        목록으로 돌아가기
      </a>
    </div>

    <section class="grid items-start gap-10 lg:grid-cols-[1.2fr_0.8fr]">
      <div class="flex flex-col gap-4 lg:sticky lg:top-24">
        <div class="relative overflow-hidden rounded-3xl bg-black/5 shadow-inner">
          <div class="absolute left-4 top-4 z-20 rounded-full bg-slate-950/70 px-3 py-1.5 text-xs font-bold text-white shadow-sm">
            <span id="animalImageCurrent">1</span> / <span th:text="${#lists.size(report.imageUrls)}">1</span>
          </div>

          <div id="animalMainImageBlur"
               class="absolute inset-0 scale-110 bg-cover bg-center bg-no-repeat opacity-50 blur-xl"
               th:style="'background-image: url(' + ${report.imageUrls[0]} + ');'"></div>

          <button type="button" id="animalMainImageButton" class="group relative z-10 block w-full" aria-label="이미지 크게 보기">
            <img id="animalMainImage" th:src="${report.imageUrls[0]}" alt="대표 이미지"
                 class="relative z-10 h-80 w-full object-contain backdrop-blur-sm transition group-hover:scale-[1.01] lg:h-[500px]">
          </button>

          <button type="button" id="animalPrevImage"
                  class="absolute left-4 top-1/2 z-20 flex h-11 w-11 -translate-y-1/2 items-center justify-center rounded-full bg-slate-950/55 text-white shadow-sm transition hover:bg-slate-950/75"
                  aria-label="이전 이미지">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
          </button>
          <button type="button" id="animalNextImage"
                  class="absolute right-4 top-1/2 z-20 flex h-11 w-11 -translate-y-1/2 items-center justify-center rounded-full bg-slate-950/55 text-white shadow-sm transition hover:bg-slate-950/75"
                  aria-label="다음 이미지">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
          </button>
        </div>

        <div th:if="${#lists.size(report.imageUrls) > 1}" class="grid grid-cols-5 gap-3">
          <button type="button" th:each="imageUrl, stat : ${report.imageUrls}"
                  class="animal-gallery-thumb group relative aspect-square overflow-hidden rounded-xl border-2 border-transparent transition-all hover:border-slate-400 focus:outline-none focus:border-slate-500"
                  th:classappend="${stat.index == 0 ? ' is-active border-slate-900' : ''}"
                  th:attr="data-image-url=${imageUrl}, data-image-index=${stat.index}"
                  th:aria-label="${stat.index + 1} + '번 이미지 보기'">
            <img th:src="${imageUrl}" alt="썸네일" class="h-full w-full object-cover transition-transform group-hover:scale-110 group-focus:scale-110">
          </button>
        </div>

        <div class="hidden rounded-2xl border border-slate-200 bg-slate-50 p-6 lg:block">
          <h3 class="mb-2 text-sm font-bold text-slate-700">특징</h3>
          <p th:text="${report.distinctiveMarks ?: '등록된 특징이 없습니다.'}"
             class="whitespace-pre-line text-sm leading-relaxed text-slate-700">특징</p>
          <div class="my-5 border-t border-slate-200"></div>
          <h3 class="mb-2 text-sm font-bold text-slate-700">상세한 내용</h3>
          <p th:text="${report.content ?: '등록된 상세 내용이 없습니다.'}"
             class="whitespace-pre-line text-sm leading-relaxed text-slate-700">상세한 내용</p>
        </div>
      </div>

      <div class="flex flex-col gap-6">
        <div>
          <div class="mb-4 flex flex-wrap items-center gap-2">
            <span th:text="${report.reportTypeLabel}"
                  th:classappend="${report.reportType == 'MISSING' ? ' bg-rose-100 text-rose-800 ring-rose-200' : ' bg-indigo-100 text-indigo-800 ring-indigo-200'}"
                  class="rounded-full px-3 py-1.5 text-xs font-bold ring-1 ring-inset shadow-sm">실종</span>
            <span th:text="${report.statusLabel}" class="rounded-full bg-slate-100 px-3 py-1.5 text-xs font-bold text-slate-700 ring-1 ring-inset ring-slate-200 shadow-sm">진행중</span>
            <span th:if="${report.sightingCareStatusLabel}" th:text="${report.sightingCareStatusLabel}"
                  class="rounded-full bg-emerald-100 px-3 py-1.5 text-xs font-bold text-emerald-800 ring-1 ring-inset ring-emerald-200 shadow-sm">보호 중</span>
          </div>

          <h1 th:text="${report.title}" class="text-3xl font-extrabold leading-tight text-slate-900">제목</h1>

          <div class="mt-4 flex flex-wrap items-center gap-2 text-sm font-medium text-slate-500">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            <span th:text="${#temporals.format(report.eventDate, 'yyyy년 MM월 dd일')}">2026년 05월 16일</span>
            <span th:if="${report.eventTime != null}" th:text="${#temporals.format(report.eventTime, 'HH:mm')}">12:00</span>
            <span class="mx-1 text-slate-300">•</span>
            <span th:text="${report.regionName}">서울특별시</span>
          </div>
        </div>

        <div class="rounded-2xl border border-slate-200 bg-slate-50 p-6 lg:hidden">
          <h3 class="mb-2 text-sm font-bold text-slate-700">특징</h3>
          <p th:text="${report.distinctiveMarks ?: '등록된 특징이 없습니다.'}"
             class="whitespace-pre-line text-sm leading-relaxed text-slate-700">특징</p>
          <div class="my-5 border-t border-slate-200"></div>
          <h3 class="mb-2 text-sm font-bold text-slate-700">상세한 내용</h3>
          <p th:text="${report.content ?: '등록된 상세 내용이 없습니다.'}"
             class="whitespace-pre-line text-sm leading-relaxed text-slate-700">상세한 내용</p>
        </div>

        <div class="overflow-hidden rounded-3xl border border-slate-200 bg-white shadow-sm">
          <ul class="divide-y divide-slate-100">
            <li class="flex items-center gap-4 px-6 py-4 transition-colors hover:bg-slate-50">
              <div class="flex h-10 w-10 shrink-0 items-center justify-center rounded-full bg-slate-100 text-slate-500">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
              </div>
              <div class="flex flex-col">
                <span class="text-xs font-semibold text-slate-400">동물 종류</span>
                <span th:text="${report.animalTypeLabel}" class="font-bold text-slate-800">개</span>
              </div>
            </li>
            <li class="flex items-center gap-4 px-6 py-4 transition-colors hover:bg-slate-50">
              <div class="flex h-10 w-10 shrink-0 items-center justify-center rounded-full bg-slate-100 text-slate-500">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/></svg>
              </div>
              <div class="flex flex-col">
                <span class="text-xs font-semibold text-slate-400">품종</span>
                <span th:text="${report.breedName ?: '-'}" class="font-bold text-slate-800">-</span>
              </div>
            </li>
            <li class="flex items-center gap-4 px-6 py-4 transition-colors hover:bg-slate-50">
              <div class="flex h-10 w-10 shrink-0 items-center justify-center rounded-full bg-slate-100 text-slate-500">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 14c3.866 0 7 1.79 7 4v1H5v-1c0-2.21 3.134-4 7-4z"/><path stroke-linecap="round" stroke-linejoin="round" d="M12 12a4 4 0 100-8 4 4 0 000 8z"/></svg>
              </div>
              <div class="flex flex-col">
                <span class="text-xs font-semibold text-slate-400">성별</span>
                <span th:text="${report.genderLabel}" class="font-bold text-slate-800">모름</span>
              </div>
            </li>
            <li class="flex items-center gap-4 px-6 py-4 transition-colors hover:bg-slate-50">
              <div class="flex h-10 w-10 shrink-0 items-center justify-center rounded-full bg-slate-100 text-slate-500">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4"/><path stroke-linecap="round" stroke-linejoin="round" d="M12 3l7 4v5c0 4.5-3 7.5-7 9-4-1.5-7-4.5-7-9V7l7-4z"/></svg>
              </div>
              <div class="flex flex-col">
                <span class="text-xs font-semibold text-slate-400">중성화</span>
                <span th:text="${report.neuteredStatusLabel}" class="font-bold text-slate-800">모름</span>
              </div>
            </li>
            <li class="flex items-center gap-4 px-6 py-4 transition-colors hover:bg-slate-50">
              <div class="flex h-10 w-10 shrink-0 items-center justify-center rounded-full bg-slate-100 text-slate-500">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v8m-4-4h8"/><path stroke-linecap="round" stroke-linejoin="round" d="M4 12a8 8 0 1016 0 8 8 0 00-16 0z"/></svg>
              </div>
              <div class="flex flex-col">
                <span class="text-xs font-semibold text-slate-400">나이/몸무게</span>
                <span class="font-bold text-slate-800">
                  <span th:text="${report.ageDisplay}">3살</span>
                  <span th:if="${report.weightDisplay != null}" th:text="${' · ' + report.weightDisplay}"> · 4kg</span>
                </span>
              </div>
            </li>
            <li class="flex items-center gap-4 px-6 py-4 transition-colors hover:bg-slate-50">
              <div class="flex h-10 w-10 shrink-0 items-center justify-center rounded-full bg-slate-100 text-slate-500">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01"/></svg>
              </div>
              <div class="flex flex-col">
                <span class="text-xs font-semibold text-slate-400">털색</span>
                <span th:text="${report.furColor ?: '-'}" class="font-bold text-slate-800">-</span>
              </div>
            </li>
            <li class="flex items-center gap-4 px-6 py-4 transition-colors hover:bg-slate-50">
              <div class="flex h-10 w-10 shrink-0 items-center justify-center rounded-full bg-slate-100 text-slate-500">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a2 2 0 01-2.828 0l-4.243-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
              </div>
              <div class="flex flex-col">
                <span class="text-xs font-semibold text-slate-400">장소</span>
                <span th:text="${report.detailPlace}" class="font-bold text-slate-800">장소</span>
              </div>
            </li>
            <li class="flex items-center gap-4 px-6 py-4 transition-colors hover:bg-slate-50">
              <div class="flex h-10 w-10 shrink-0 items-center justify-center rounded-full bg-slate-100 text-slate-500">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
              </div>
              <div class="flex flex-col">
                <span class="text-xs font-semibold text-slate-400">연락처</span>
                <span th:text="${report.displayContact}" class="font-bold text-slate-800">비공개</span>
              </div>
            </li>
          </ul>
        </div>

        <div class="mt-4 flex flex-col gap-3 sm:flex-row">
          <a th:href="@{/animal-reports}" class="flex flex-1 items-center justify-center rounded-2xl border-2 border-slate-200 bg-white px-8 py-4 font-bold text-slate-600 transition-all hover:bg-slate-50 hover:text-slate-900 active:scale-95">
            목록
          </a>
        </div>
      </div>
    </section>

    <div id="animalImageModal" class="fixed inset-0 z-50 hidden bg-slate-950/70 backdrop-blur-md" aria-hidden="true">
      <div class="absolute left-5 top-5 z-20 rounded-full bg-black/45 px-3 py-1.5 text-sm font-bold text-white">
        <span id="animalModalCurrent">1</span> / <span th:text="${#lists.size(report.imageUrls)}">1</span>
      </div>
      <button type="button" id="animalModalClose"
              class="absolute right-5 top-5 z-20 inline-flex h-11 items-center justify-center gap-2 rounded-full bg-black/45 px-4 text-sm font-bold text-white transition hover:bg-black/65"
              onclick="document.getElementById('animalImageModal').classList.add('hidden'); document.getElementById('animalImageModal').setAttribute('aria-hidden', 'true'); document.body.classList.remove('overflow-hidden');"
              onpointerdown="document.getElementById('animalImageModal').classList.add('hidden'); document.getElementById('animalImageModal').setAttribute('aria-hidden', 'true'); document.body.classList.remove('overflow-hidden');"
              aria-label="이미지 크게 보기 닫기">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
        <span>닫기</span>
      </button>

      <div class="flex h-full w-full items-center justify-center px-4 pb-28 pt-16 sm:px-16">
        <img id="animalModalImage" th:src="${report.imageUrls[0]}" alt="확대 이미지" class="max-h-full max-w-full object-contain shadow-2xl">
      </div>

      <button type="button" id="animalModalPrev"
              class="absolute left-5 top-1/2 z-20 flex h-12 w-12 -translate-y-1/2 items-center justify-center rounded-full bg-black/45 text-white transition hover:bg-black/65"
              aria-label="이전 이미지">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
      </button>
      <button type="button" id="animalModalNext"
              class="absolute right-5 top-1/2 z-20 flex h-12 w-12 -translate-y-1/2 items-center justify-center rounded-full bg-black/45 text-white transition hover:bg-black/65"
              aria-label="다음 이미지">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
      </button>

      <div id="animalModalThumbsWrapper" th:if="${#lists.size(report.imageUrls) > 1}" class="absolute inset-x-0 bottom-0 z-20 bg-black/35 px-4 py-4">
        <div class="mx-auto flex max-w-3xl justify-center gap-3 overflow-x-auto">
          <button type="button" th:each="imageUrl, stat : ${report.imageUrls}"
                  class="animal-modal-thumb h-16 w-16 shrink-0 overflow-hidden rounded-lg border-2 border-transparent transition hover:border-white/70 focus:outline-none focus:border-white"
                  th:classappend="${stat.index == 0 ? ' is-active border-white' : ''}"
                  th:attr="data-image-url=${imageUrl}, data-image-index=${stat.index}"
                  th:aria-label="${stat.index + 1} + '번 확대 이미지 보기'">
            <img th:src="${imageUrl}" alt="확대 썸네일" class="h-full w-full object-cover">
          </button>
        </div>
      </div>
    </div>

    <script>
      (function() {
        var mainImage = document.getElementById('animalMainImage');
        var mainImageBlur = document.getElementById('animalMainImageBlur');
        var mainImageButton = document.getElementById('animalMainImageButton');
        var currentLabel = document.getElementById('animalImageCurrent');
        var prevButton = document.getElementById('animalPrevImage');
        var nextButton = document.getElementById('animalNextImage');
        var modal = document.getElementById('animalImageModal');
        var modalImage = document.getElementById('animalModalImage');
        var modalCurrentLabel = document.getElementById('animalModalCurrent');
        var modalClose = document.getElementById('animalModalClose');
        var modalPrev = document.getElementById('animalModalPrev');
        var modalNext = document.getElementById('animalModalNext');
        var thumbs = Array.prototype.slice.call(document.querySelectorAll('.animal-gallery-thumb'));
        var modalThumbs = Array.prototype.slice.call(document.querySelectorAll('.animal-modal-thumb'));
        var imageUrls = thumbs.length > 0 ? thumbs.map(function(button) { return button.dataset.imageUrl; }) : [mainImage.src];
        var currentIndex = 0;

        function setButtonVisibility() {
          var hidden = imageUrls.length <= 1;
          [prevButton, nextButton, modalPrev, modalNext].forEach(function(button) {
            if (!button) return;
            button.style.display = hidden ? 'none' : 'flex';
          });
        }

        function syncThumbs() {
          thumbs.concat(modalThumbs).forEach(function(button) {
            var isActive = Number(button.dataset.imageIndex) === currentIndex;
            button.classList.toggle('is-active', isActive);
            button.classList.toggle('border-slate-900', isActive && button.classList.contains('animal-gallery-thumb'));
            button.classList.toggle('border-transparent', !isActive);
            button.classList.toggle('border-white', isActive && button.classList.contains('animal-modal-thumb'));
          });
        }

        function renderImage(index) {
          currentIndex = (index + imageUrls.length) % imageUrls.length;
          var imageUrl = imageUrls[currentIndex];
          mainImage.src = imageUrl;
          modalImage.src = imageUrl;
          mainImageBlur.style.backgroundImage = "url('" + imageUrl.replace(/'/g, "\\'") + "')";
          currentLabel.textContent = currentIndex + 1;
          modalCurrentLabel.textContent = currentIndex + 1;
          syncThumbs();
        }

        function move(delta) {
          renderImage(currentIndex + delta);
        }

        function openModal() {
          modal.classList.remove('hidden');
          modal.setAttribute('aria-hidden', 'false');
          document.body.classList.add('overflow-hidden');
        }

        function closeModal() {
          modal.classList.add('hidden');
          modal.setAttribute('aria-hidden', 'true');
          document.body.classList.remove('overflow-hidden');
        }

        function closeModalFromControl(event) {
          if (event) {
            event.preventDefault();
            event.stopPropagation();
          }
          closeModal();
        }

        window.closeAnimalImageModal = closeModal;

        thumbs.concat(modalThumbs).forEach(function(button) {
          button.addEventListener('click', function() {
            renderImage(Number(button.dataset.imageIndex));
          });
        });
        prevButton.addEventListener('click', function() { move(-1); });
        nextButton.addEventListener('click', function() { move(1); });
        modalPrev.addEventListener('click', function() { move(-1); });
        modalNext.addEventListener('click', function() { move(1); });
        mainImageButton.addEventListener('click', openModal);
        modalClose.addEventListener('click', closeModalFromControl);
        modalClose.addEventListener('pointerdown', closeModalFromControl);
        modal.addEventListener('click', function(event) {
          if (event.target === modalImage || event.target.closest('button') || event.target.closest('#animalModalThumbsWrapper')) {
            return;
          }
          closeModal();
        });
        document.addEventListener('keydown', function(event) {
          if (modal.classList.contains('hidden')) return;
          if (event.key === 'Escape') closeModal();
          if (event.key === 'ArrowLeft') move(-1);
          if (event.key === 'ArrowRight') move(1);
        });

        setButtonVisibility();
        renderImage(0);
      })();
    </script>
  </th:block>
</th:block>
</html>
