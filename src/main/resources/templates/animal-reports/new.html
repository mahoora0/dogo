<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<th:block th:replace="~{layout/base :: setContent(~{this::content})}">
  <th:block th:fragment="content">
    <div class="mb-6">
      <a th:href="@{/animal-reports}" class="inline-flex items-center gap-1 text-sm font-medium text-slate-500 transition hover:text-slate-900">
        목록으로 돌아가기
      </a>
    </div>

    <div class="mb-8">
      <span class="mb-2 inline-block text-sm font-semibold text-slate-500">실종/목격 신고</span>
      <h1 class="text-2xl font-bold tracking-tight text-slate-900 sm:text-3xl">동물 신고 등록</h1>
      <p class="mt-2 text-sm text-slate-500">실종 또는 목격 정보를 선택하고 동물 정보를 입력해주세요.</p>
    </div>

    <div th:if="${errorMessage}" class="mb-5 rounded-lg border border-red-200 bg-red-50 px-4 py-3">
      <p th:text="${errorMessage}" class="text-sm font-medium text-red-700">입력값을 확인해주세요.</p>
    </div>

    <form th:action="@{/animal-reports}" method="post" enctype="multipart/form-data"
          class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm sm:p-8">
      <fieldset class="grid gap-5 md:grid-cols-2">
        <legend class="sr-only">동물 신고 기본 정보</legend>

        <div class="md:col-span-2">
          <span class="text-sm font-semibold text-slate-700">구분 <span class="text-red-400">*</span></span>
          <div class="mt-2 grid gap-3 sm:grid-cols-2">
            <label th:each="option : ${reportTypeOptions}"
                   class="flex cursor-pointer items-center gap-3 rounded-lg border border-slate-200 bg-slate-50 px-4 py-3 text-sm font-semibold text-slate-700 transition has-[:checked]:border-slate-900 has-[:checked]:bg-slate-900 has-[:checked]:text-white">
              <input type="radio" name="reportType" th:value="${option.value}"
                     th:checked="${(request == null || request.reportType == null) ? option.value == 'MISSING' : request.reportType == option.value}"
                     class="sr-only report-type-radio">
              <span th:text="${option.label}">실종</span>
            </label>
          </div>
        </div>

        <label class="block md:col-span-2">
          <span class="text-sm font-semibold text-slate-700">제목</span>
          <input name="title" th:value="${request != null ? request.title : ''}"
                 placeholder="비워두면 입력한 동물 정보로 자동 생성됩니다"
                 class="mt-1.5 w-full rounded-lg border border-slate-200 bg-slate-50 px-4 py-3 text-sm font-medium text-slate-800 outline-none transition focus:border-slate-400 focus:bg-white focus:ring-2 focus:ring-slate-100">
        </label>

        <label class="block">
          <span class="text-sm font-semibold text-slate-700">날짜 <span class="text-red-400">*</span></span>
          <input type="date" name="eventDate"
                 th:value="${request != null && request.eventDate != null ? #temporals.format(request.eventDate, 'yyyy-MM-dd') : ''}"
                 required
                 class="mt-1.5 w-full rounded-lg border border-slate-200 bg-slate-50 px-4 py-3 text-sm font-medium text-slate-800 outline-none transition focus:border-slate-400 focus:bg-white focus:ring-2 focus:ring-slate-100">
        </label>

        <label class="block">
          <span class="text-sm font-semibold text-slate-700">시간</span>
          <input type="time" name="eventTime"
                 th:value="${request != null && request.eventTime != null ? #temporals.format(request.eventTime, 'HH:mm') : ''}"
                 class="mt-1.5 w-full rounded-lg border border-slate-200 bg-slate-50 px-4 py-3 text-sm font-medium text-slate-800 outline-none transition focus:border-slate-400 focus:bg-white focus:ring-2 focus:ring-slate-100">
        </label>

        <label class="block">
          <span class="text-sm font-semibold text-slate-700">지역 <span class="text-red-400">*</span></span>
          <select name="regionName" required
                  class="mt-1.5 w-full rounded-lg border border-slate-200 bg-slate-50 px-4 py-3 text-sm font-medium text-slate-800 outline-none transition focus:border-slate-400 focus:bg-white focus:ring-2 focus:ring-slate-100">
            <option value="">광역시/도 선택</option>
            <option th:each="regionOption : ${regionOptions}" th:value="${regionOption}" th:text="${regionOption}"
                    th:selected="${request != null && request.regionName == regionOption}">서울특별시</option>
          </select>
        </label>

        <label class="block">
          <span class="text-sm font-semibold text-slate-700">구체적인 장소 <span class="text-red-400">*</span></span>
          <input name="detailPlace" th:value="${request != null ? request.detailPlace : ''}" required
                 placeholder="예: 한강공원 3주차장 근처"
                 class="mt-1.5 w-full rounded-lg border border-slate-200 bg-slate-50 px-4 py-3 text-sm font-medium text-slate-800 outline-none transition focus:border-slate-400 focus:bg-white focus:ring-2 focus:ring-slate-100">
        </label>

        <label class="block">
          <span class="text-sm font-semibold text-slate-700">연락처</span>
          <input type="tel" name="contactPhone" th:value="${request != null ? request.contactPhone : ''}"
                 placeholder="010-0000-0000" maxlength="13" oninput="formatPhoneNumber(this)"
                 class="mt-1.5 w-full rounded-lg border border-slate-200 bg-slate-50 px-4 py-3 text-sm font-medium text-slate-800 outline-none transition focus:border-slate-400 focus:bg-white focus:ring-2 focus:ring-slate-100">
        </label>

        <div class="flex items-end">
          <label class="flex w-full cursor-pointer items-center justify-between rounded-lg border border-slate-200 bg-slate-50 px-4 py-3 text-sm font-semibold text-slate-700">
            <span>연락처 공개</span>
            <input type="checkbox" name="contactPublic" value="true"
                   th:checked="${request == null || request.contactPublic}"
                   class="h-4 w-4 rounded border-slate-300 text-slate-900">
          </label>
        </div>

        <label id="careStatusField" class="block md:col-span-2">
          <span class="text-sm font-semibold text-slate-700">목격 상태</span>
          <select name="sightingCareStatus"
                  class="mt-1.5 w-full rounded-lg border border-slate-200 bg-slate-50 px-4 py-3 text-sm font-medium text-slate-800 outline-none transition focus:border-slate-400 focus:bg-white focus:ring-2 focus:ring-slate-100">
            <option th:each="option : ${careStatusOptions}" th:value="${option.value}" th:text="${option.label}"
                    th:selected="${request != null && request.sightingCareStatus == option.value}">확인 필요</option>
          </select>
        </label>
      </fieldset>

      <div class="my-8 border-t border-slate-100"></div>

      <fieldset class="grid gap-5 md:grid-cols-2">
        <legend class="mb-4 text-lg font-bold text-slate-900 md:col-span-2">동물 정보</legend>

        <label class="block">
          <span class="text-sm font-semibold text-slate-700">종류 <span class="text-red-400">*</span></span>
          <select name="animalType" required
                  class="mt-1.5 w-full rounded-lg border border-slate-200 bg-slate-50 px-4 py-3 text-sm font-medium text-slate-800 outline-none transition focus:border-slate-400 focus:bg-white focus:ring-2 focus:ring-slate-100">
            <option value="">선택</option>
            <option th:each="option : ${animalTypeOptions}" th:value="${option.value}" th:text="${option.label}"
                    th:selected="${request != null && request.animalType == option.value}">개</option>
          </select>
        </label>

        <label class="block">
          <span class="text-sm font-semibold text-slate-700">품종</span>
          <input name="breedName" th:value="${request != null ? request.breedName : ''}" placeholder="예: 말티즈, 코리안숏헤어"
                 class="mt-1.5 w-full rounded-lg border border-slate-200 bg-slate-50 px-4 py-3 text-sm font-medium text-slate-800 outline-none transition focus:border-slate-400 focus:bg-white focus:ring-2 focus:ring-slate-100">
        </label>

        <label class="block">
          <span class="text-sm font-semibold text-slate-700">성별</span>
          <select name="gender"
                  class="mt-1.5 w-full rounded-lg border border-slate-200 bg-slate-50 px-4 py-3 text-sm font-medium text-slate-800 outline-none transition focus:border-slate-400 focus:bg-white focus:ring-2 focus:ring-slate-100">
            <option th:each="option : ${genderOptions}" th:value="${option.value}" th:text="${option.label}"
                    th:selected="${request != null && request.gender == option.value}">모름</option>
          </select>
        </label>

        <label class="block">
          <span class="text-sm font-semibold text-slate-700">중성화</span>
          <select name="neuteredStatus"
                  class="mt-1.5 w-full rounded-lg border border-slate-200 bg-slate-50 px-4 py-3 text-sm font-medium text-slate-800 outline-none transition focus:border-slate-400 focus:bg-white focus:ring-2 focus:ring-slate-100">
            <option th:each="option : ${neuteredStatusOptions}" th:value="${option.value}" th:text="${option.label}"
                    th:selected="${request != null && request.neuteredStatus == option.value}">모름</option>
          </select>
        </label>

        <div class="grid gap-3 sm:grid-cols-2">
          <label class="block">
            <span class="text-sm font-semibold text-slate-700">나이</span>
            <select name="ageValue" id="ageValueSelect"
                    class="mt-1.5 w-full rounded-lg border border-slate-200 bg-slate-50 px-4 py-3 text-sm font-medium text-slate-800 outline-none transition focus:border-slate-400 focus:bg-white focus:ring-2 focus:ring-slate-100">
              <option value="">모름</option>
              <option value="0" th:selected="${request != null && request.ageValue == 0}">1년 미만</option>
              <option th:each="i : ${#numbers.sequence(1, 20)}" th:value="${i}" th:text="${i + '살'}"
                      th:selected="${request != null && request.ageValue == i}"></option>
            </select>
            <input type="hidden" name="ageUnit" id="ageUnitHidden" th:value="${request != null && request.ageUnit != null ? request.ageUnit : 'UNKNOWN'}">
          </label>

          <label class="block">
            <span class="text-sm font-semibold text-slate-700">몸무게</span>
            <select name="weightKg"
                    class="mt-1.5 w-full rounded-lg border border-slate-200 bg-slate-50 px-4 py-3 text-sm font-medium text-slate-800 outline-none transition focus:border-slate-400 focus:bg-white focus:ring-2 focus:ring-slate-100">
              <option value="">모름</option>
              <option value="0.5" th:selected="${request != null && request.weightKg != null && request.weightKg.doubleValue() == 0.5}">1kg 미만</option>
              <option th:each="i : ${#numbers.sequence(1, 30)}" th:value="${i}" th:text="${i + 'kg'}"
                      th:selected="${request != null && request.weightKg != null && request.weightKg.doubleValue() == i}"></option>
            </select>
          </label>
        </div>

        <label class="block">
          <span class="text-sm font-semibold text-slate-700">털색</span>
          <input name="furColor" th:value="${request != null ? request.furColor : ''}" placeholder="예: 흰색, 갈색 섞임"
                 class="mt-1.5 w-full rounded-lg border border-slate-200 bg-slate-50 px-4 py-3 text-sm font-medium text-slate-800 outline-none transition focus:border-slate-400 focus:bg-white focus:ring-2 focus:ring-slate-100">
        </label>

        <label class="block md:col-span-2">
          <span class="text-sm font-semibold text-slate-700">특징</span>
          <input name="distinctiveMarks" th:value="${request != null ? request.distinctiveMarks : ''}"
                 placeholder="예: 빨간 목줄, 왼쪽 귀 접힘, 꼬리 짧음"
                 class="mt-1.5 w-full rounded-lg border border-slate-200 bg-slate-50 px-4 py-3 text-sm font-medium text-slate-800 outline-none transition focus:border-slate-400 focus:bg-white focus:ring-2 focus:ring-slate-100">
        </label>

        <label class="block md:col-span-2">
          <span class="text-sm font-semibold text-slate-700">상세한 내용</span>
          <textarea name="content" rows="5" th:text="${request != null ? request.content : ''}"
                    placeholder="상황, 이동 방향, 성격, 구조 여부 등 추가 정보를 적어주세요."
                    class="mt-1.5 w-full rounded-lg border border-slate-200 bg-slate-50 px-4 py-3 text-sm font-medium text-slate-800 outline-none transition focus:border-slate-400 focus:bg-white focus:ring-2 focus:ring-slate-100"></textarea>
        </label>

        <div class="md:col-span-2">
          <span class="text-sm font-semibold text-slate-700">사진</span>
          <div id="imageDropZone" class="relative mt-1.5 flex w-full items-center justify-center rounded-lg border-2 border-dashed border-slate-300 bg-slate-50 px-4 py-8 transition hover:border-slate-400">
            <div class="text-center">
              <p class="text-sm font-medium text-slate-600">클릭하여 이미지를 선택하세요</p>
              <p class="mt-1 text-xs text-slate-400">여러 장 등록 가능</p>
              <input type="file" id="imageInput" name="images" accept="image/*" multiple class="absolute inset-0 cursor-pointer opacity-0">
            </div>
          </div>
          <div id="imagePreview" class="mt-3 hidden">
            <div class="mb-2 flex items-center gap-2">
              <span id="imageCount" class="text-sm font-medium text-slate-700"></span>
              <button type="button" id="imageClear" class="text-xs font-semibold text-red-500 transition hover:text-red-700">전체 삭제</button>
            </div>
            <div id="imageList" class="grid grid-cols-4 gap-3 sm:grid-cols-5 lg:grid-cols-6"></div>
          </div>
        </div>
      </fieldset>

      <div class="mt-8 flex justify-end gap-3 border-t border-slate-100 pt-6">
        <a th:href="@{/animal-reports}" class="rounded-lg border border-slate-200 bg-white px-5 py-2.5 text-sm font-semibold text-slate-700 shadow-sm transition hover:bg-slate-50">취소</a>
        <button type="submit" class="rounded-lg bg-slate-900 px-5 py-2.5 text-sm font-semibold text-white shadow-sm transition hover:bg-slate-700">등록하기</button>
      </div>
    </form>

    <script>
      (function() {
        var careStatusField = document.getElementById('careStatusField');
        var radios = document.querySelectorAll('.report-type-radio');
        function syncCareStatus() {
          var selected = document.querySelector('.report-type-radio:checked');
          careStatusField.style.display = selected && selected.value === 'SIGHTING' ? 'block' : 'none';
        }
        radios.forEach(function(radio) { radio.addEventListener('change', syncCareStatus); });
        syncCareStatus();
      })();

      (function() {
        var input = document.getElementById('imageInput');
        var preview = document.getElementById('imagePreview');
        var list = document.getElementById('imageList');
        var count = document.getElementById('imageCount');
        var clear = document.getElementById('imageClear');
        var dropZone = document.getElementById('imageDropZone');
        function render() {
          var files = input.files;
          list.innerHTML = '';
          if (files.length === 0) {
            preview.classList.add('hidden');
            dropZone.querySelector('p').textContent = '클릭하여 이미지를 선택하세요';
            return;
          }
          preview.classList.remove('hidden');
          count.textContent = files.length + '장 선택됨';
          dropZone.querySelector('p').textContent = '클릭하여 이미지를 변경하세요';
          for (var i = 0; i < files.length; i++) {
            (function(file) {
              var wrap = document.createElement('div');
              var img = document.createElement('img');
              img.className = 'h-20 w-full rounded-lg border border-slate-200 object-cover';
              img.alt = file.name;
              var reader = new FileReader();
              reader.onload = function(e) { img.src = e.target.result; };
              reader.readAsDataURL(file);
              wrap.appendChild(img);
              list.appendChild(wrap);
            })(files[i]);
          }
        }
        input.addEventListener('change', render);
        clear.addEventListener('click', function() {
          input.value = '';
          render();
        });
      })();

      (function() {
        var ageSelect = document.getElementById('ageValueSelect');
        var ageUnitHidden = document.getElementById('ageUnitHidden');
        if (!ageSelect || !ageUnitHidden) return;

        function syncAgeUnit() {
          if (ageSelect.value === "") {
            ageUnitHidden.value = "UNKNOWN";
          } else {
            ageUnitHidden.value = "YEAR";
          }
        }
        ageSelect.addEventListener('change', syncAgeUnit);
        syncAgeUnit();
      })();

      function formatPhoneNumber(input) {
        var number = input.value.replace(/[^0-9]/g, "");
        var res = "";
        if (number.length < 4) {
          res = number;
        } else if (number.length < 7) {
          res = number.substr(0, 3) + "-" + number.substr(3);
        } else {
          res = number.substr(0, 3) + "-" + number.substr(3, 4) + "-" + number.substr(7);
        }
        input.value = res.substr(0, 13);
      }
    </script>
  </th:block>
</th:block>
</html>
