<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<th:block th:replace="~{layout/base :: setContent(~{this::content})}">
  <th:block th:fragment="content">
    <div class="mb-6">
      <a th:href="@{/animal-reports/{id}(id=${editData.id()})}" class="inline-flex items-center gap-1 text-sm font-medium text-slate-500 transition hover:text-slate-900">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
        상세보기로 돌아가기
      </a>
    </div>

    <div class="mb-8">
      <span class="mb-2 inline-block text-sm font-semibold text-slate-500">실종/목격 제보</span>
      <h1 class="text-2xl font-bold tracking-tight text-slate-900 sm:text-3xl">동물 신고 수정</h1>
    </div>

    <div th:if="${errorMessage}" class="mb-5 rounded-lg border border-red-200 bg-red-50 px-4 py-3">
      <p th:text="${errorMessage}" class="text-sm font-medium text-red-700">입력값을 확인해주세요.</p>
    </div>

    <form th:action="@{/animal-reports/{id}/edit(id=${editData.id()})}" method="post" enctype="multipart/form-data"
          class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm sm:p-8 item-form">
      <fieldset class="grid gap-5 md:grid-cols-2">
        <legend class="sr-only">동물 신고 기본 정보</legend>

        <div class="md:col-span-2">
          <span class="text-sm font-semibold text-slate-700">구분 <span class="text-red-400">*</span></span>
          <div class="mt-2 flex flex-wrap gap-2">
            <label th:each="option : ${reportTypeOptions}"
                   class="flex cursor-pointer items-center gap-3 rounded-full border border-slate-200 bg-slate-50 px-4 py-2 text-xs font-bold text-slate-600 transition hover:bg-slate-100 has-[:checked]:border-slate-900 has-[:checked]:bg-slate-900">
              <input type="radio" name="reportType" th:value="${option.value}"
                     th:checked="${editData.reportType() == option.value}"
                     class="peer sr-only report-type-radio">
              <span th:text="${option.label}"
                    class="text-slate-600 transition peer-checked:text-white">실종</span>
            </label>
          </div>
        </div>

        <label class="block md:col-span-2">
          <span class="text-sm font-semibold text-slate-700">제목</span>
          <input name="title" th:value="${editData.title()}"
                 placeholder="비워두면 입력한 동물 정보로 자동 생성됩니다"
                 class="mt-1.5 w-full rounded-full border border-slate-200 bg-slate-50 px-6 py-3 text-sm font-medium text-slate-800 outline-none transition focus:border-slate-400 focus:bg-white focus:ring-2 focus:ring-slate-100">
        </label>

        <div class="block">
          <label class="block">
            <span class="text-sm font-semibold text-slate-700"><span id="eventDateTimeLabel">발생 일시</span> <span class="text-red-400">*</span></span>
            <input type="datetime-local" id="eventDateTimeCombined"
                   th:attr="max=${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd''T''HH:mm')}"
                   th:value="${editData.eventDate() != null ? #temporals.format(editData.eventDate(), 'yyyy-MM-dd') + 'T' + (editData.eventTime() != null ? #temporals.format(editData.eventTime(), 'HH:mm') : '00:00') : ''}"
                   required
                   class="mt-1.5 w-full rounded-full border border-slate-200 bg-slate-50 px-6 py-3 text-sm font-medium text-slate-800 outline-none transition focus:border-slate-400 focus:bg-white focus:ring-2 focus:ring-slate-100">
          </label>
          <input type="hidden" name="eventDate" id="eventDateHidden">
          <input type="hidden" name="eventTime" id="eventTimeHidden">
        </div>

        <label class="block">
          <span class="text-sm font-semibold text-slate-700">지역 <span class="text-red-400">*</span></span>
          <select name="regionName" required
                  class="mt-1.5 w-full rounded-full border border-slate-200 bg-slate-50 px-6 py-3 text-sm font-medium text-slate-800 outline-none transition focus:border-slate-400 focus:bg-white focus:ring-2 focus:ring-slate-100">
            <option value="">광역시/도 선택</option>
            <option th:each="regionOption : ${regionOptions}" th:value="${regionOption}" th:text="${regionOption}"
                    th:selected="${editData.regionName() == regionOption}">서울특별시</option>
          </select>
        </label>

        <label class="block">
          <span class="text-sm font-semibold text-slate-700"><span id="detailPlaceLabel">구체적인 장소</span> <span class="text-red-400">*</span></span>
          <input name="detailPlace" th:value="${editData.detailPlace()}" required
                 id="detailPlaceInput"
                 placeholder="예: 한강공원 3주차장 근처"
                 class="mt-1.5 w-full rounded-full border border-slate-200 bg-slate-50 px-6 py-3 text-sm font-medium text-slate-800 outline-none transition focus:border-slate-400 focus:bg-white focus:ring-2 focus:ring-slate-100">
        </label>

        <div class="block">
          <div class="flex h-5 items-center justify-between">
            <span class="text-sm font-semibold text-slate-700">연락처</span>
            <label class="group flex cursor-pointer items-center gap-2">
              <input type="checkbox" name="contactPublic" value="true"
                     th:checked="${editData.contactPublic()}"
                     class="h-4 w-4 rounded border-slate-300 text-slate-900 focus:ring-slate-900 transition-all">
              <span class="text-xs font-medium text-slate-500 group-hover:text-slate-900 transition-colors">공개</span>
            </label>
          </div>
          <input type="tel" name="contactPhone" th:value="${editData.contactPhone()}"
                 placeholder="010-0000-0000" maxlength="13" oninput="formatPhoneNumber(this)"
                 class="mt-1.5 w-full rounded-full border border-slate-200 bg-slate-50 px-6 py-3 text-sm font-medium text-slate-800 outline-none transition focus:border-slate-400 focus:bg-white focus:ring-2 focus:ring-slate-100">
        </div>

        <label id="careStatusField" class="block">
          <span class="text-sm font-semibold text-slate-700">목격/보호 상태</span>
          <select name="sightingCareStatus"
                  id="careStatusSelect"
                  class="mt-1.5 w-full rounded-full border border-slate-200 bg-slate-50 px-6 py-3 text-sm font-medium text-slate-800 outline-none transition focus:border-slate-400 focus:bg-white focus:ring-2 focus:ring-slate-100">
            <option th:each="option : ${careStatusOptions}" th:value="${option.value}" th:text="${option.label}"
                    th:selected="${editData.sightingCareStatus() == option.value}">단순 목격</option>
          </select>
        </label>

        <fieldset id="careLocationField" class="hidden rounded-3xl border border-slate-200 bg-slate-50 p-4 md:col-span-2">
          <legend class="px-1 text-sm font-semibold text-slate-700">인계 장소</legend>
          <div class="mt-3 grid gap-4 md:grid-cols-2">
            <label class="block">
              <span class="text-sm font-semibold text-slate-700">인계처명</span>
              <input name="careLocationName" th:value="${editData.careLocationName()}"
                     placeholder="예: OO동물병원, OO보호소"
                     class="mt-1.5 w-full rounded-full border border-slate-200 bg-white px-6 py-3 text-sm font-medium text-slate-800 outline-none transition focus:border-slate-400 focus:ring-2 focus:ring-slate-100">
            </label>
            <label class="block">
              <span class="text-sm font-semibold text-slate-700">인계처 연락처</span>
              <input type="tel" name="careContactPhone" th:value="${editData.careContactPhone()}"
                     placeholder="010-0000-0000" maxlength="13" oninput="formatPhoneNumber(this)"
                     class="mt-1.5 w-full rounded-full border border-slate-200 bg-white px-6 py-3 text-sm font-medium text-slate-800 outline-none transition focus:border-slate-400 focus:ring-2 focus:ring-slate-100">
            </label>
            <label class="block md:col-span-2">
              <span class="text-sm font-semibold text-slate-700">인계처 주소 <span class="text-red-400">*</span></span>
              <input name="careLocationAddress" th:value="${editData.careLocationAddress()}"
                     placeholder="동물을 인계한 기관 주소"
                     class="mt-1.5 w-full rounded-full border border-slate-200 bg-white px-6 py-3 text-sm font-medium text-slate-800 outline-none transition focus:border-slate-400 focus:ring-2 focus:ring-slate-100">
            </label>
          </div>
        </fieldset>

      </fieldset>

      <div class="my-8 border-t border-slate-100"></div>

      <fieldset class="grid gap-5 md:grid-cols-2">
        <legend class="mb-4 text-lg font-bold text-slate-900 md:col-span-2">동물 정보</legend>

        <label class="block">
          <span class="text-sm font-semibold text-slate-700">종류 <span class="text-red-400">*</span></span>
          <select name="animalType" required
                  class="mt-1.5 w-full rounded-full border border-slate-200 bg-slate-50 px-6 py-3 text-sm font-medium text-slate-800 outline-none transition focus:border-slate-400 focus:bg-white focus:ring-2 focus:ring-slate-100">
            <option value="">선택</option>
            <option th:each="option : ${animalTypeOptions}" th:value="${option.value}" th:text="${option.label}"
                    th:selected="${editData.animalType() == option.value}">개</option>
          </select>
        </label>

        <label class="block">
          <span class="text-sm font-semibold text-slate-700">품종</span>
          <input name="breedName" th:value="${editData.breedName()}" placeholder="예: 말티즈, 코리안숏헤어"
                 class="mt-1.5 w-full rounded-full border border-slate-200 bg-slate-50 px-6 py-3 text-sm font-medium text-slate-800 outline-none transition focus:border-slate-400 focus:bg-white focus:ring-2 focus:ring-slate-100">
        </label>

        <label class="block">
          <span class="text-sm font-semibold text-slate-700">성별</span>
          <select name="gender"
                  class="mt-1.5 w-full rounded-full border border-slate-200 bg-slate-50 px-6 py-3 text-sm font-medium text-slate-800 outline-none transition focus:border-slate-400 focus:bg-white focus:ring-2 focus:ring-slate-100">
            <option th:each="option : ${genderOptions}" th:value="${option.value}" th:text="${option.label}"
                    th:selected="${editData.gender() == option.value}">모름</option>
          </select>
        </label>

        <label class="block">
          <span class="text-sm font-semibold text-slate-700">중성화</span>
          <select name="neuteredStatus"
                  class="mt-1.5 w-full rounded-full border border-slate-200 bg-slate-50 px-6 py-3 text-sm font-medium text-slate-800 outline-none transition focus:border-slate-400 focus:bg-white focus:ring-2 focus:ring-slate-100">
            <option th:each="option : ${neuteredStatusOptions}" th:value="${option.value}" th:text="${option.label}"
                    th:selected="${editData.neuteredStatus() == option.value}">모름</option>
          </select>
        </label>

        <div class="grid gap-3 sm:grid-cols-2">
          <label class="block">
            <span class="text-sm font-semibold text-slate-700">나이</span>
            <select name="ageUnit"
                    class="mt-1.5 w-full rounded-full border border-slate-200 bg-slate-50 px-6 py-3 text-sm font-medium text-slate-800 outline-none transition focus:border-slate-400 focus:bg-white focus:ring-2 focus:ring-slate-100">
              <option value="UNKNOWN" th:selected="${editData.ageUnit() == null || editData.ageUnit() == 'UNKNOWN'}">모름</option>
              <option value="RANGE_0_1" th:selected="${editData.ageUnit() == 'RANGE_0_1'}">0~1세</option>
              <option value="RANGE_2_5" th:selected="${editData.ageUnit() == 'RANGE_2_5'}">2~5세</option>
              <option value="RANGE_6_10" th:selected="${editData.ageUnit() == 'RANGE_6_10'}">6~10세</option>
              <option value="RANGE_10_OVER" th:selected="${editData.ageUnit() == 'RANGE_10_OVER'}">10세 이상</option>
              <option value="ESTIMATED" th:selected="${editData.ageUnit() == 'ESTIMATED'}">미상</option>
            </select>
          </label>

          <label class="block">
            <span class="text-sm font-semibold text-slate-700">몸무게</span>
            <select name="weightKg"
                    class="mt-1.5 w-full rounded-full border border-slate-200 bg-slate-50 px-6 py-3 text-sm font-medium text-slate-800 outline-none transition focus:border-slate-400 focus:bg-white focus:ring-2 focus:ring-slate-100">
              <option value="">모름</option>
              <option value="0.5" th:selected="${editData.weightKg() != null && editData.weightKg().doubleValue() >= 0 && editData.weightKg().doubleValue() <= 1.0}">0~1kg</option>
              <option value="2.0" th:selected="${editData.weightKg() != null && editData.weightKg().doubleValue() > 1.0 && editData.weightKg().doubleValue() <= 3.0}">1~3kg</option>
              <option value="4.0" th:selected="${editData.weightKg() != null && editData.weightKg().doubleValue() > 3.0 && editData.weightKg().doubleValue() <= 5.0}">3~5kg</option>
              <option value="7.5" th:selected="${editData.weightKg() != null && editData.weightKg().doubleValue() > 5.0 && editData.weightKg().doubleValue() <= 10.0}">5~10kg</option>
              <option value="12.5" th:selected="${editData.weightKg() != null && editData.weightKg().doubleValue() > 10.0 && editData.weightKg().doubleValue() <= 15.0}">10~15kg</option>
              <option value="17.5" th:selected="${editData.weightKg() != null && editData.weightKg().doubleValue() > 15.0 && editData.weightKg().doubleValue() <= 20.0}">15~20kg</option>
              <option value="22.5" th:selected="${editData.weightKg() != null && editData.weightKg().doubleValue() > 20.0 && editData.weightKg().doubleValue() <= 25.0}">20~25kg</option>
              <option value="27.5" th:selected="${editData.weightKg() != null && editData.weightKg().doubleValue() > 25.0 && editData.weightKg().doubleValue() <= 30.0}">25~30kg</option>
              <option value="35.0" th:selected="${editData.weightKg() != null && editData.weightKg().doubleValue() > 30.0}">30kg 이상</option>
            </select>
          </label>
        </div>

        <label class="block">
          <span class="text-sm font-semibold text-slate-700">털색</span>
          <input name="furColor" th:value="${editData.furColor()}" placeholder="예: 흰색, 갈색 섞임"
                 class="mt-1.5 w-full rounded-full border border-slate-200 bg-slate-50 px-6 py-3 text-sm font-medium text-slate-800 outline-none transition focus:border-slate-400 focus:bg-white focus:ring-2 focus:ring-slate-100">
        </label>

        <label class="block md:col-span-2">
          <span class="text-sm font-semibold text-slate-700">특징</span>
          <input name="distinctiveMarks" th:value="${editData.distinctiveMarks()}"
                 placeholder="예: 빨간 목줄, 왼쪽 귀 접힘, 꼬리 짧음"
                 class="mt-1.5 w-full rounded-full border border-slate-200 bg-slate-50 px-6 py-3 text-sm font-medium text-slate-800 outline-none transition focus:border-slate-400 focus:bg-white focus:ring-2 focus:ring-slate-100">
        </label>

        <label class="block md:col-span-2">
          <span class="text-sm font-semibold text-slate-700">상세한 내용</span>
          <textarea name="content" id="contentInput" rows="5" th:text="${editData.content()}"
                    placeholder="상황, 이동 방향, 성격, 구조 여부 등 추가 정보를 적어주세요."
                    class="mt-1.5 w-full rounded-3xl border border-slate-200 bg-slate-50 px-6 py-4 text-sm font-medium text-slate-800 outline-none transition focus:border-slate-400 focus:bg-white focus:ring-2 focus:ring-slate-100"></textarea>
        </label>

        <div class="md:col-span-2">
          <span class="text-sm font-semibold text-slate-700">사진</span>

          <div th:if="${editData.existingImageUrls() != null && !editData.existingImageUrls().isEmpty()}" class="mt-2 mb-3">
            <p class="mb-1.5 text-xs font-medium text-slate-500">현재 이미지</p>
            <div class="grid grid-cols-4 gap-3 sm:grid-cols-5 lg:grid-cols-6">
              <div th:each="imgUrl : ${editData.existingImageUrls()}" class="relative">
                <img th:src="${imgUrl}" alt="현재 이미지" class="h-20 w-full rounded-lg border border-slate-200 object-cover">
              </div>
            </div>
            <p class="mt-1.5 text-xs text-slate-400">새 이미지를 선택하면 위 이미지가 모두 교체됩니다.</p>
          </div>

          <div id="imageDropZone" class="relative mt-1.5 flex w-full items-center justify-center rounded-3xl border-2 border-dashed border-slate-300 bg-slate-50 px-4 py-8 transition hover:border-slate-400">
            <div class="text-center">
              <p class="text-sm font-medium text-slate-600" data-filled-text="클릭하여 이미지를 추가하세요">새 이미지 선택 (선택하면 기존 이미지 교체)</p>
              <p class="mt-1 text-xs text-slate-400">여러 장 등록 가능</p>
              <input type="file" id="imageInput" name="images" accept="image/*" multiple class="absolute inset-0 cursor-pointer opacity-0">
            </div>
          </div>
          <div id="imagePreview" class="mt-3 hidden">
            <div class="mb-2 flex items-center gap-2">
              <span id="imageCount" class="text-sm font-medium text-slate-700"></span>
              <button type="button" id="imageClear" class="text-xs font-semibold text-red-500 transition hover:text-red-700">전체 삭제</button>
            </div>
            <div id="imageList" class="grid grid-cols-4 gap-3 sm:grid-cols-5 lg:grid-cols-6"></div>
          </div>
        </div>
      </fieldset>

      <div class="mt-8 flex justify-end gap-3 border-t border-slate-100 pt-6">
        <a th:href="@{/animal-reports/{id}(id=${editData.id()})}" class="rounded-full border-2 border-slate-200 bg-white px-8 py-3 text-sm font-bold text-slate-600 transition hover:bg-slate-50 hover:text-slate-900 active:scale-95">취소</a>
        <button type="submit" class="rounded-full bg-slate-900 px-8 py-3 text-sm font-bold text-white shadow-md transition hover:bg-slate-700 hover:shadow-lg active:scale-[0.98]">수정하기</button>
      </div>
    </form>

    <script>
      (function() {
        var careStatusField = document.getElementById('careStatusField');
        var careStatusSelect = document.getElementById('careStatusSelect');
        var careLocationField = document.getElementById('careLocationField');
        var careLocationInputs = careLocationField ? careLocationField.querySelectorAll('input') : [];
        var careLocationAddress = careLocationField ? careLocationField.querySelector('input[name="careLocationAddress"]') : null;
        var eventDateTimeLabel = document.getElementById('eventDateTimeLabel');
        var detailPlaceLabel = document.getElementById('detailPlaceLabel');
        var detailPlaceInput = document.getElementById('detailPlaceInput');
        var contentInput = document.getElementById('contentInput');
        var radios = document.querySelectorAll('.report-type-radio');
        var copyByType = {
          MISSING: { eventDateTimeLabel: '실종 일시', detailPlaceLabel: '실종 장소', detailPlacePlaceholder: '예: 한강공원 3주차장 근처', contentPlaceholder: '마지막으로 본 상황, 이동 방향, 성격, 특징 등을 적어주세요.' },
          SIGHTING: { eventDateTimeLabel: '목격 일시', detailPlaceLabel: '목격/보호 장소', detailPlacePlaceholder: '예: 한강공원 3주차장 근처', contentPlaceholder: '목격 상황, 이동 방향, 보호 또는 인계 경위 등을 적어주세요.' }
        };

        function syncCareLocationFields(enabled) {
          if (!careLocationField) return;
          careLocationField.classList.toggle('hidden', !enabled);
          careLocationField.setAttribute('aria-hidden', enabled ? 'false' : 'true');
          careLocationInputs.forEach(function(input) {
            input.disabled = !enabled;
          });
          if (careLocationAddress) {
            careLocationAddress.required = enabled;
          }
        }

        function syncReportTypeFields() {
          var selected = document.querySelector('.report-type-radio:checked');
          var selectedType = selected ? selected.value : 'MISSING';
          var copy = (selectedType === 'MISSING') ? copyByType.MISSING : copyByType.SIGHTING;
          var isSighting = selectedType === 'SIGHTING';
          if (careStatusField) {
            careStatusField.style.display = isSighting ? 'block' : 'none';
            careStatusField.setAttribute('aria-hidden', isSighting ? 'false' : 'true');
            if (careStatusSelect) {
              careStatusSelect.disabled = !isSighting;
            }
          }
          syncCareLocationFields(isSighting && careStatusSelect && careStatusSelect.value === 'TRANSFERRED');

          if (eventDateTimeLabel) eventDateTimeLabel.textContent = copy.eventDateTimeLabel;
          if (detailPlaceLabel) detailPlaceLabel.textContent = copy.detailPlaceLabel;
          if (detailPlaceInput) detailPlaceInput.placeholder = copy.detailPlacePlaceholder;
          if (contentInput) contentInput.placeholder = copy.contentPlaceholder;
        }

        if (radios.length > 0) {
          radios.forEach(function(radio) { radio.addEventListener('change', syncReportTypeFields); });
          if (careStatusSelect) careStatusSelect.addEventListener('change', syncReportTypeFields);
          syncReportTypeFields();
        }

        const combinedInput = document.getElementById('eventDateTimeCombined');
        const dateHidden = document.getElementById('eventDateHidden');
        const timeHidden = document.getElementById('eventTimeHidden');

        if (combinedInput) {
          const setMax = () => {
            const now = new Date();
            const offset = now.getTimezoneOffset() * 60000;
            const localISOTime = (new Date(now - offset)).toISOString().slice(0, 16);
            combinedInput.setAttribute('max', localISOTime);
            return localISOTime;
          };
          setMax();
          combinedInput.addEventListener('change', function() {
            const maxVal = setMax();
            if (this.value > maxVal) { alert('미래의 시간은 선택할 수 없습니다.'); this.value = maxVal; }
            if (this.value) {
              const [date, time] = this.value.split('T');
              dateHidden.value = date;
              timeHidden.value = time;
            } else {
              dateHidden.value = '';
              timeHidden.value = '';
            }
          });
          if (combinedInput.value) {
            const parts = combinedInput.value.split('T');
            dateHidden.value = parts[0] || '';
            timeHidden.value = parts[1] || '';
          }
        }
      })();

      (function() {
        var ageInput = document.getElementById('ageValueInput');
        var ageUnitSelect = document.getElementById('ageUnitSelect');
        if (!ageInput || !ageUnitSelect) return;

        function syncAge() {
          if (ageInput.value !== '') {
            if (ageUnitSelect.value === 'UNKNOWN') {
              ageUnitSelect.value = 'YEAR';
            }
          } else {
            ageUnitSelect.value = 'UNKNOWN';
          }
        }

        ageInput.addEventListener('input', syncAge);

        ageUnitSelect.addEventListener('change', function() {
          if (ageUnitSelect.value === 'UNKNOWN') {
            ageInput.value = '';
          } else {
            if (ageInput.value === '') {
              ageInput.value = '1';
            }
          }
        });
      })();

      function formatPhoneNumber(input) {
        var number = input.value.replace(/[^0-9]/g, "");
        var res = "";
        if (number.length < 4) { res = number; }
        else if (number.length < 7) { res = number.substr(0, 3) + "-" + number.substr(3); }
        else { res = number.substr(0, 3) + "-" + number.substr(3, 4) + "-" + number.substr(7); }
        input.value = res.substr(0, 13);
      }

      // 엔터키 submit 방지
      (function() {
        document.querySelectorAll('form').forEach(function(f) {
          f.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && e.target.nodeName === 'INPUT') {
              e.preventDefault();
            }
          });
        });
      })();
    </script>
    <script th:src="@{/js/image-upload.js}"></script>
  </th:block>
</th:block>
</html>
