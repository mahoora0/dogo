<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<th:block th:replace="~{layout/base :: setContent(~{this::content})}">
  <th:block th:fragment="content">
    <section class="mb-8 rounded-2xl border border-slate-200 bg-white px-6 py-8 shadow-sm">
      <div class="flex flex-col gap-5 sm:flex-row sm:items-end sm:justify-between">
        <div>
          <span class="mb-2 inline-block text-sm font-semibold text-slate-500">실종/목격 동물 신고</span>
          <h1 class="text-2xl font-bold tracking-tight text-slate-900 sm:text-3xl">실종동물 검색</h1>
          <p class="mt-2 text-sm text-slate-500">실종 동물과 목격 제보를 한 곳에서 확인합니다.</p>
        </div>
        <div class="flex flex-col gap-2 sm:items-stretch">
          <a th:href="@{/lost-report}" target="_blank"
             class="inline-flex items-center justify-center gap-2 rounded-full bg-rose-600 px-6 py-3 text-sm font-bold text-white shadow-md transition hover:bg-rose-500 hover:shadow-lg active:scale-[0.98]">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
            실종전단지 제작
          </a>
          <a th:href="@{/animal-reports/new}"
             class="inline-flex items-center justify-center gap-2 rounded-full bg-slate-900 px-6 py-3 text-sm font-bold text-white shadow-md transition hover:bg-slate-700 hover:shadow-lg active:scale-[0.98]">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
            실종동물 제보
          </a>
        </div>
      </div>
    </section>

    <!-- Search Filters Card -->
    <form th:action="@{/animal-reports}" method="get" id="searchForm"
          class="mb-8 rounded-2xl border border-slate-200 bg-white p-5 shadow-sm space-y-4">
        
        <!-- Top Row: Category Selection (Chips) -->
        <div class="grid gap-4 sm:grid-cols-2">
          
          <!-- 상태 Chips -->
          <div class="space-y-2">
            <label class="text-xs font-bold uppercase tracking-wider text-slate-400">상태</label>
            <div class="flex flex-wrap gap-2">
              <label class="shrink-0 cursor-pointer">
                <input type="radio" name="reportType" value="" class="peer sr-only" th:checked="${reportType == null || reportType == ''}" onchange="this.closest('form').submit()">
                <span class="inline-block whitespace-nowrap rounded-full border border-slate-200 bg-white px-3.5 py-1.5 text-xs font-bold text-slate-600 transition peer-checked:border-slate-900 peer-checked:bg-slate-900 peer-checked:text-white hover:bg-slate-50">전체</span>
              </label>
              <label class="shrink-0 cursor-pointer">
                <input type="radio" name="reportType" value="MISSING" class="peer sr-only" th:checked="${reportType == 'MISSING'}" onchange="this.closest('form').submit()">
                <span class="inline-block whitespace-nowrap rounded-full border border-slate-200 bg-white px-3.5 py-1.5 text-xs font-bold text-slate-600 transition peer-checked:border-rose-600 peer-checked:bg-rose-600 peer-checked:text-white hover:bg-slate-50">실종</span>
              </label>
              <label class="shrink-0 cursor-pointer">
                <input type="radio" name="reportType" value="SIGHTING" class="peer sr-only" th:checked="${reportType == 'SIGHTING'}" onchange="this.closest('form').submit()">
                <span class="inline-block whitespace-nowrap rounded-full border border-slate-200 bg-white px-3.5 py-1.5 text-xs font-bold text-slate-600 transition peer-checked:border-indigo-600 peer-checked:bg-indigo-600 peer-checked:text-white hover:bg-slate-50">목격</span>
              </label>
              <label class="shrink-0 cursor-pointer">
                <input type="radio" name="reportType" value="PROTECTING" class="peer sr-only" th:checked="${reportType == 'PROTECTING'}" onchange="this.closest('form').submit()">
                <span class="inline-block whitespace-nowrap rounded-full border border-slate-200 bg-white px-3.5 py-1.5 text-xs font-bold text-slate-600 transition peer-checked:border-emerald-600 peer-checked:bg-emerald-600 peer-checked:text-white hover:bg-slate-50">보호</span>
              </label>
              <label class="shrink-0 cursor-pointer">
                <input type="radio" name="reportType" value="TRANSFERRED" class="peer sr-only" th:checked="${reportType == 'TRANSFERRED'}" onchange="this.closest('form').submit()">
                <span class="inline-block whitespace-nowrap rounded-full border border-slate-200 bg-white px-3.5 py-1.5 text-xs font-bold text-slate-600 transition peer-checked:border-amber-600 peer-checked:bg-amber-600 peer-checked:text-white hover:bg-slate-50">연계</span>
              </label>
              <label class="shrink-0 cursor-pointer">
                <input type="radio" name="reportType" value="RETURNED" class="peer sr-only" th:checked="${reportType == 'RETURNED'}" onchange="this.closest('form').submit()">
                <span class="inline-block whitespace-nowrap rounded-full border border-slate-200 bg-white px-3.5 py-1.5 text-xs font-bold text-slate-600 transition peer-checked:border-sky-600 peer-checked:bg-sky-600 peer-checked:text-white hover:bg-slate-50">귀가</span>
              </label>
            </div>
          </div>

          <!-- 동물 종류 Chips -->
          <div class="space-y-2">
            <label class="text-xs font-bold uppercase tracking-wider text-slate-400">동물 종류</label>
            <div class="flex flex-wrap gap-2">
              <label class="shrink-0 cursor-pointer">
                <input type="radio" name="animalType" value="" class="peer sr-only" th:checked="${animalType == null || animalType == ''}" onchange="this.closest('form').submit()">
                <span class="inline-block whitespace-nowrap rounded-full border border-slate-200 bg-white px-3.5 py-1.5 text-xs font-bold text-slate-600 transition peer-checked:border-slate-900 peer-checked:bg-slate-900 peer-checked:text-white hover:bg-slate-50">전체</span>
              </label>
              <label class="shrink-0 cursor-pointer">
                <input type="radio" name="animalType" value="DOG" class="peer sr-only" th:checked="${animalType == 'DOG'}" onchange="this.closest('form').submit()">
                <span class="inline-block whitespace-nowrap rounded-full border border-slate-200 bg-white px-3.5 py-1.5 text-xs font-bold text-slate-600 transition peer-checked:border-slate-900 peer-checked:bg-slate-900 peer-checked:text-white hover:bg-slate-50">개</span>
              </label>
              <label class="shrink-0 cursor-pointer">
                <input type="radio" name="animalType" value="CAT" class="peer sr-only" th:checked="${animalType == 'CAT'}" onchange="this.closest('form').submit()">
                <span class="inline-block whitespace-nowrap rounded-full border border-slate-200 bg-white px-3.5 py-1.5 text-xs font-bold text-slate-600 transition peer-checked:border-slate-900 peer-checked:bg-slate-900 peer-checked:text-white hover:bg-slate-50">고양이</span>
              </label>
              <label class="shrink-0 cursor-pointer">
                <input type="radio" name="animalType" value="OTHER" class="peer sr-only" th:checked="${animalType == 'OTHER'}" onchange="this.closest('form').submit()">
                <span class="inline-block whitespace-nowrap rounded-full border border-slate-200 bg-white px-3.5 py-1.5 text-xs font-bold text-slate-600 transition peer-checked:border-slate-900 peer-checked:bg-slate-900 peer-checked:text-white hover:bg-slate-50">기타</span>
              </label>
            </div>
          </div>

        </div>

        <!-- Middle Row: Filters & Detailed Location -->
        <div class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3 border-t border-slate-100 pt-4">
          
          <!-- 발생일 -->
          <div class="space-y-2">
            <label class="text-xs font-bold uppercase tracking-wider text-slate-400">발생일</label>
            <div class="relative">
              <input type="date" name="startDate" th:value="${startDate}" class="w-full rounded-full border border-slate-200 bg-slate-50 px-4 py-2.5 text-sm font-medium text-slate-800 outline-none transition focus:border-slate-400 focus:bg-white">
            </div>
          </div>

          <!-- 지역 Dropdown -->
          <div class="space-y-2">
            <label class="text-xs font-bold uppercase tracking-wider text-slate-400">지역</label>
            <div class="relative">
              <select name="region" onchange="this.closest('form').submit()" class="w-full appearance-none rounded-full border border-slate-200 bg-slate-50 px-4 py-2.5 text-sm font-medium text-slate-800 outline-none transition focus:border-slate-400 focus:bg-white">
                <option value="">전체 지역</option>
                <option th:each="regionOption : ${regionOptions}" th:value="${regionOption}" th:text="${regionOption}" th:selected="${region == regionOption}">서울특별시</option>
              </select>
              <svg xmlns="http://www.w3.org/2000/svg" class="pointer-events-none absolute right-4 top-1/2 h-4 w-4 -translate-y-1/2 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
            </div>
          </div>

          <!-- 상세 장소 검색 -->
          <div class="space-y-2">
            <label class="text-xs font-bold uppercase tracking-wider text-slate-400">상세 장소</label>
            <div class="relative">
              <input type="text" name="detailPlace" th:value="${detailPlace}" placeholder="건물명, 공원명, 상세 주소 등" class="w-full rounded-full border border-slate-200 bg-slate-50 px-4 py-2.5 text-sm font-medium text-slate-800 outline-none transition focus:border-slate-400 focus:bg-white">
            </div>
          </div>

        </div>

        <!-- Bottom Row: Text Search Input ("품종, 털색, 특징, 장소로 검색하세요") -->
        <div class="border-t border-slate-100 pt-4">
          <div class="grid gap-3 lg:grid-cols-12">
            <div class="flex min-w-0 overflow-hidden rounded-xl border border-slate-200 bg-slate-50 transition focus-within:border-slate-400 focus-within:bg-white focus-within:ring-4 focus-within:ring-slate-100 lg:col-span-8">
              <div class="relative min-w-0 flex-1 group">
                <svg xmlns="http://www.w3.org/2000/svg" class="pointer-events-none absolute left-4 top-1/2 h-5 w-5 -translate-y-1/2 text-slate-400 transition-colors group-focus-within:text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M11 19a8 8 0 100-16 8 8 0 000 16z"/></svg>
                <input id="keywordInput" name="keyword" th:value="${keyword}" placeholder="품종, 털색, 특징, 장소로 검색하세요"
                       class="w-full bg-transparent py-3.5 pl-11 pr-4 text-sm font-medium text-slate-800 outline-none">
              </div>
            </div>
            <div class="grid grid-cols-2 gap-2 lg:col-span-4">
              <button type="submit"
                      class="flex items-center justify-center gap-2 rounded-full bg-slate-900 px-6 py-3.5 text-sm font-bold text-white shadow-sm transition hover:bg-slate-700 active:scale-[0.98]">
                검색하기
              </button>
              <a th:href="@{/animal-reports}"
                 class="flex items-center justify-center gap-2 rounded-full border border-slate-200 bg-white px-4 py-3.5 text-sm font-bold text-slate-700 transition hover:bg-slate-50">
                초기화
              </a>
            </div>
          </div>
        </div>

      </form>

    <!-- Image Search Card (Separate Block) -->
    <div id="imageSearchSection" class="mb-8 rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
      <button type="button" onclick="toggleImageSearch()"
              class="flex w-full items-center justify-between py-2 text-sm font-bold text-slate-700 transition hover:text-slate-900">
        <div class="flex items-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
          사진으로 비슷한 동물 찾기
        </div>
        <svg id="imageSearchChevron" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-slate-400 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
      </button>
      <div id="imageSearchPanel" class="hidden mt-3 pt-3 border-t border-dashed border-slate-100">
        <form action="/animal-reports/image-search" method="post" enctype="multipart/form-data"
              onsubmit="return submitImageSearch(this)"
              class="flex flex-col gap-4 sm:flex-row sm:items-end">
          <div class="flex-1">
            <label class="mb-1.5 block text-xs font-bold uppercase tracking-wider text-slate-400">사진 업로드</label>
            <label class="flex cursor-pointer items-center gap-3 rounded-xl border border-dashed border-slate-300 bg-slate-50 px-4 py-3 transition hover:border-slate-400 hover:bg-slate-100">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
              <span id="imageSearchFileName" class="truncate text-sm text-slate-500">파일을 선택하세요</span>
              <input type="file" name="image" accept="image/*" class="hidden" onchange="updateImageSearchFileName(this)">
            </label>
          </div>
          <button type="submit"
                  class="shrink-0 rounded-full bg-slate-900 px-6 py-3 text-sm font-bold text-white shadow-sm transition hover:bg-slate-700 active:scale-[0.98]">
            유사 동물 검색
          </button>
        </form>
      </div>

    <!-- Result Header -->
    <div class="mb-5 flex items-center justify-between px-1" th:if="${reportPage != null}">
      <div class="flex items-center gap-2">
        <span class="h-2 w-2 rounded-full bg-violet-500"></span>
        <h3 class="text-sm font-bold text-slate-600">
          총 <span class="text-slate-900" th:text="${reportPage.totalElements}">0</span>건의 신고
        </h3>
      </div>
      <select onchange="applySort(this.value)"
              class="cursor-pointer rounded-full border border-slate-200 bg-white pl-4 pr-10 py-2 text-xs font-bold text-slate-600 outline-none transition hover:border-slate-300 focus:border-slate-400 appearance-none bg-[url('data:image/svg+xml;charset=utf-8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20fill%3D%22none%22%20viewBox%3D%220%200%2024%2024%22%20stroke%3D%22currentColor%22%3E%3Cpath%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%20stroke-width%3D%222%22%20d%3D%22M19%209l-7%207-7-7%22%2F%3E%3C%2Fsvg%3E')] bg-[length:1rem_1rem] bg-[right_0.75rem_center] bg-no-repeat">
        <option value="regdate,desc" th:selected="${sortBy == 'regdate' and sortDir == 'desc'}">등록일 최신순</option>
        <option value="regdate,asc"  th:selected="${sortBy == 'regdate' and sortDir == 'asc'}">등록일 오래된순</option>
        <option value="eventDate,desc" th:selected="${sortBy == 'eventDate' and sortDir == 'desc'}">발생일 최신순</option>
        <option value="eventDate,asc"  th:selected="${sortBy == 'eventDate' and sortDir == 'asc'}">발생일 오래된순</option>
      </select>
    </div>

    <!-- Grid -->
    <section th:if="${!#lists.isEmpty(reports)}" class="grid gap-5 sm:grid-cols-2 xl:grid-cols-3">
      <a th:each="report : ${reports}" th:href="@{/animal-reports/{id}(id=${report.id}, reportType=${reportType}, animalType=${animalType}, region=${region}, keyword=${keyword}, keywordScope=${keywordScope}, startDate=${startDate}, endDate=${endDate}, detailPlace=${detailPlace}, sortBy=${sortBy}, sortDir=${sortDir}, page=${page}, size=${size})}"
         class="group overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm transition hover:border-slate-300 hover:shadow-md">
        <div class="relative h-44 w-full overflow-hidden bg-slate-50">
          <img th:src="${report.imageUrl}" alt="" class="h-full w-full object-cover transition-transform duration-700 group-hover:scale-110">
          <div class="absolute left-3 top-3 flex gap-1.5">
            <th:block th:if="${report.reportType == 'PROTECTING'}">
              <span class="rounded-full bg-indigo-500 px-3 py-1 text-xs font-bold text-white shadow-sm">목격</span>
              <span class="rounded-full bg-emerald-500 px-3 py-1 text-xs font-bold text-white shadow-sm">보호</span>
            </th:block>
            <th:block th:if="${report.reportType != 'PROTECTING'}">
              <span th:text="${report.reportTypeLabel}"
                    th:classappend="${report.reportType == 'MISSING' ? ' bg-rose-500' : (report.reportType == 'SIGHTING' ? ' bg-indigo-500' : (report.reportType == 'RETURNED' ? ' bg-sky-500' : ' bg-amber-500'))}"
                    class="rounded-full px-3 py-1 text-xs font-bold text-white shadow-sm">실종</span>
            </th:block>
          </div>
          <!-- status badge removed -->
        </div>
        <div class="p-4">
          <h2 th:text="${report.title}" class="line-clamp-1 text-base font-bold text-slate-900">제목</h2>
          <div class="mt-2 flex flex-wrap gap-1.5">
            <span th:text="${report.animalTypeLabel}" class="rounded bg-slate-100 px-2 py-0.5 text-xs font-semibold text-slate-600">개</span>
            <span th:if="${report.breedName}" th:text="${report.breedName}" class="rounded bg-slate-100 px-2 py-0.5 text-xs font-semibold text-slate-600">믹스</span>
            <span th:if="${report.furColor}" th:text="${report.furColor}" class="rounded bg-slate-100 px-2 py-0.5 text-xs font-semibold text-slate-600">갈색</span>
          </div>
          <div class="mt-3 space-y-1.5 text-sm text-slate-500">
            <div class="flex min-w-0 items-center gap-1.5">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 shrink-0 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a2 2 0 01-2.828 0l-4.243-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
              <span class="truncate" th:text="${report.regionName + ' · ' + report.detailPlace}">서울특별시 · 공원</span>
            </div>
            <div class="flex items-center gap-1.5">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 shrink-0 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
              <span th:text="${#temporals.format(report.eventDate, 'yyyy.MM.dd')}">2026.05.16</span>
              <span th:if="${report.eventTime != null}" th:text="${#temporals.format(report.eventTime, 'HH:mm')}">12:00</span>
            </div>
          </div>
        </div>
      </a>
    </section>

    <!-- Empty State -->
    <div th:if="${#lists.isEmpty(reports)}"
         class="mt-8 flex flex-col items-center justify-center rounded-3xl border border-slate-200 bg-white/50 px-5 py-24 text-center backdrop-blur-sm">
      <div class="mb-5 flex h-20 w-20 items-center justify-center rounded-full bg-slate-100 text-slate-300">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      </div>
      <p class="text-lg font-bold text-slate-700">검색 결과가 없습니다</p>
      <p class="mt-2 text-sm text-slate-500">다른 키워드로 검색하거나 필터를 변경해보세요.</p>
    </div>

    <!-- Pagination -->
    <nav th:if="${reportPage != null && reportPage.totalPages > 1}"
         th:with="startPage=${T(java.lang.Math).max(0, T(java.lang.Math).min(page - 4, reportPage.totalPages - 10))}, endPage=${T(java.lang.Math).min(reportPage.totalPages - 1, startPage + 9)}"
         class="mt-12 flex justify-center text-sm">
      <div class="inline-flex items-stretch overflow-hidden rounded-lg border border-slate-200 bg-white shadow-sm divide-x divide-slate-200">

        <!-- 맨 처음 -->
        <a th:classappend="${reportPage.first} ? ' pointer-events-none opacity-40'"
           th:href="@{/animal-reports(keyword=${keyword}, keywordScope=${keywordScope}, reportType=${reportType}, animalType=${animalType}, region=${region}, startDate=${startDate}, endDate=${endDate}, detailPlace=${detailPlace}, sortBy=${sortBy}, sortDir=${sortDir}, page=0, size=${size})}"
           aria-label="첫 페이지"
           class="flex h-10 w-10 items-center justify-center text-slate-600 transition-colors hover:bg-slate-100 hover:text-slate-900">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M11 19l-7-7 7-7m8 14l-7-7 7-7"/></svg>
        </a>

        <!-- 이전 -->
        <a th:classappend="${reportPage.first} ? ' pointer-events-none opacity-40'"
           th:href="@{/animal-reports(keyword=${keyword}, keywordScope=${keywordScope}, reportType=${reportType}, animalType=${animalType}, region=${region}, startDate=${startDate}, endDate=${endDate}, detailPlace=${detailPlace}, sortBy=${sortBy}, sortDir=${sortDir}, page=${page - 1}, size=${size})}"
           aria-label="이전 페이지"
           class="flex h-10 w-10 items-center justify-center text-slate-600 transition-colors hover:bg-slate-100 hover:text-slate-900">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
        </a>

        <!-- 번호 윈도우 (현재 페이지 주변 최대 10칸) -->
        <a th:each="i : ${#numbers.sequence(startPage, endPage)}"
           th:href="@{/animal-reports(keyword=${keyword}, keywordScope=${keywordScope}, reportType=${reportType}, animalType=${animalType}, region=${region}, startDate=${startDate}, endDate=${endDate}, detailPlace=${detailPlace}, sortBy=${sortBy}, sortDir=${sortDir}, page=${i}, size=${size})}"
           th:text="${i + 1}"
           th:classappend="${i == page} ? ' bg-slate-900 text-white font-semibold' : ' text-slate-600 hover:bg-slate-100 hover:text-slate-900'"
           class="flex h-10 w-10 items-center justify-center transition-colors">1</a>

        <!-- 다음 -->
        <a th:classappend="${reportPage.last} ? ' pointer-events-none opacity-40'"
           th:href="@{/animal-reports(keyword=${keyword}, keywordScope=${keywordScope}, reportType=${reportType}, animalType=${animalType}, region=${region}, startDate=${startDate}, endDate=${endDate}, detailPlace=${detailPlace}, sortBy=${sortBy}, sortDir=${sortDir}, page=${page + 1}, size=${size})}"
           aria-label="다음 페이지"
           class="flex h-10 w-10 items-center justify-center text-slate-600 transition-colors hover:bg-slate-100 hover:text-slate-900">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
        </a>

        <!-- 맨 끝 -->
        <a th:classappend="${reportPage.last} ? ' pointer-events-none opacity-40'"
           th:href="@{/animal-reports(keyword=${keyword}, keywordScope=${keywordScope}, reportType=${reportType}, animalType=${animalType}, region=${region}, startDate=${startDate}, endDate=${endDate}, detailPlace=${detailPlace}, sortBy=${sortBy}, sortDir=${sortDir}, page=${reportPage.totalPages - 1}, size=${size})}"
           aria-label="마지막 페이지"
           class="flex h-10 w-10 items-center justify-center text-slate-600 transition-colors hover:bg-slate-100 hover:text-slate-900">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 5l7 7-7 7M5 5l7 7-7 7"/></svg>
        </a>
      </div>
    </nav>

    <script>
      function toggleImageSearch() {
        const panel = document.getElementById('imageSearchPanel');
        const chevron = document.getElementById('imageSearchChevron');
        panel.classList.toggle('hidden');
        chevron.style.transform = panel.classList.contains('hidden') ? '' : 'rotate(180deg)';
      }
      function updateImageSearchFileName(input) {
        const label = document.getElementById('imageSearchFileName');
        label.textContent = input.files.length > 0 ? input.files[0].name : '파일을 선택하세요';
      }
      function submitImageSearch(form) {
        const searchForm = document.getElementById('searchForm');
        if (searchForm) {
          const filters = ['reportType', 'animalType', 'region', 'startDate', 'detailPlace', 'keyword', 'keywordScope'];
          filters.forEach(name => {
            let val = '';
            if (name === 'reportType' || name === 'animalType') {
              const checked = searchForm.querySelector(`input[name="${name}"]:checked`);
              val = checked ? checked.value : '';
            } else {
              const el = searchForm.querySelector(`[name="${name}"]`);
              val = el ? el.value : '';
            }
            if (val) {
              let hiddenInput = form.querySelector(`input[type="hidden"][name="${name}"]`);
              if (!hiddenInput) {
                hiddenInput = document.createElement('input');
                hiddenInput.type = 'hidden';
                hiddenInput.name = name;
                form.appendChild(hiddenInput);
              }
              hiddenInput.value = val;
            }
          });
        }
        return true;
      }
      function applySort(value) {
        const [sortBy, sortDir] = value.split(',');
        const url = new URL(window.location.href);
        url.searchParams.set('sortBy', sortBy);
        url.searchParams.set('sortDir', sortDir);
        url.searchParams.set('page', '0');
        window.location.href = url.toString();
      }

    </script>
  </th:block>
</th:block>
</html>
