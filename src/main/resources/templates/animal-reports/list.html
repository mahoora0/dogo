<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<th:block th:replace="~{layout/base :: setContent(~{this::content})}">
  <th:block th:fragment="content">
    <div class="mb-8 flex flex-col gap-4 sm:flex-row sm:items-end sm:justify-between">
      <div>
        <span class="mb-2 inline-block text-sm font-semibold text-slate-500">실종/목격 동물 신고</span>
        <h1 class="text-2xl font-bold tracking-tight text-slate-900 sm:text-3xl">동물 신고 게시판</h1>
        <p class="mt-2 text-sm text-slate-500">실종 동물과 목격 제보를 한 곳에서 확인합니다.</p>
      </div>
      <a th:href="@{/animal-reports/new}"
         class="inline-flex items-center justify-center rounded-lg bg-slate-900 px-5 py-3 text-sm font-semibold text-white shadow-sm transition hover:bg-slate-700">
        신고 등록
      </a>
    </div>

    <form th:action="@{/animal-reports}" method="get"
          class="mb-8 grid gap-3 rounded-2xl border border-slate-200 bg-white p-4 shadow-sm md:grid-cols-5">
      <input name="keyword" th:value="${keyword}" placeholder="품종, 특징, 장소 검색"
             class="rounded-lg border border-slate-200 bg-slate-50 px-4 py-3 text-sm font-medium text-slate-800 outline-none transition focus:border-slate-400 focus:bg-white focus:ring-2 focus:ring-slate-100 md:col-span-2">
      <select name="reportType"
              class="rounded-lg border border-slate-200 bg-slate-50 px-4 py-3 text-sm font-medium text-slate-800 outline-none transition focus:border-slate-400 focus:bg-white focus:ring-2 focus:ring-slate-100">
        <option value="">전체 구분</option>
        <option th:each="option : ${reportTypeOptions}" th:value="${option.value}" th:text="${option.label}"
                th:selected="${reportType == option.value}">실종</option>
      </select>
      <select name="animalType"
              class="rounded-lg border border-slate-200 bg-slate-50 px-4 py-3 text-sm font-medium text-slate-800 outline-none transition focus:border-slate-400 focus:bg-white focus:ring-2 focus:ring-slate-100">
        <option value="">전체 동물</option>
        <option th:each="option : ${animalTypeOptions}" th:value="${option.value}" th:text="${option.label}"
                th:selected="${animalType == option.value}">개</option>
      </select>
      <select name="region"
              class="rounded-lg border border-slate-200 bg-slate-50 px-4 py-3 text-sm font-medium text-slate-800 outline-none transition focus:border-slate-400 focus:bg-white focus:ring-2 focus:ring-slate-100">
        <option value="">전체 지역</option>
        <option th:each="regionOption : ${regionOptions}" th:value="${regionOption}" th:text="${regionOption}"
                th:selected="${region == regionOption}">서울특별시</option>
      </select>
      <button type="submit"
              class="rounded-lg bg-slate-900 px-4 py-3 text-sm font-semibold text-white shadow-sm transition hover:bg-slate-700 md:col-span-5">
        검색
      </button>
    </form>

    <section th:if="${!#lists.isEmpty(reports)}" class="grid gap-5 sm:grid-cols-2 xl:grid-cols-3">
      <a th:each="report : ${reports}" th:href="@{/animal-reports/{id}(id=${report.id})}"
         class="group overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm transition hover:border-slate-300 hover:shadow-md">
        <div class="relative h-44 w-full overflow-hidden bg-slate-50">
          <img th:src="${report.imageUrl}" alt="" class="h-full w-full object-cover transition-transform duration-700 group-hover:scale-110">
          <div class="absolute left-3 top-3 flex gap-1.5">
            <span th:text="${report.reportTypeLabel}"
                  th:classappend="${report.reportType == 'MISSING' ? ' bg-rose-500' : ' bg-indigo-500'}"
                  class="rounded-md px-2 py-1 text-xs font-bold text-white shadow-sm">실종</span>
            <span th:if="${report.sightingCareStatus == 'PROTECTING'}"
                  class="rounded-md bg-emerald-500 px-2 py-1 text-xs font-bold text-white shadow-sm">보호 중</span>
          </div>
          <div class="absolute right-3 top-3">
            <span th:text="${report.statusLabel}" class="rounded-full bg-slate-800 px-3 py-1 text-xs font-bold text-white shadow-sm">진행중</span>
          </div>
        </div>
        <div class="p-4">
          <h2 th:text="${report.title}" class="line-clamp-1 text-base font-bold text-slate-900">제목</h2>
          <div class="mt-2 flex flex-wrap gap-1.5">
            <span th:text="${report.animalTypeLabel}" class="rounded bg-slate-100 px-2 py-0.5 text-xs font-semibold text-slate-600">개</span>
            <span th:if="${report.breedName}" th:text="${report.breedName}" class="rounded bg-slate-100 px-2 py-0.5 text-xs font-semibold text-slate-600">믹스</span>
            <span th:if="${report.furColor}" th:text="${report.furColor}" class="rounded bg-slate-100 px-2 py-0.5 text-xs font-semibold text-slate-600">갈색</span>
          </div>
          <div class="mt-3 space-y-1.5 text-sm text-slate-500">
            <div class="flex min-w-0 items-center gap-1.5">
              <span class="font-semibold text-slate-400">지역</span>
              <span th:text="${report.regionName}" class="truncate">서울특별시</span>
            </div>
            <div class="flex min-w-0 items-center gap-1.5">
              <span class="font-semibold text-slate-400">장소</span>
              <span th:text="${report.detailPlace}" class="truncate">공원</span>
            </div>
            <div>
              <span th:text="${#temporals.format(report.eventDate, 'yyyy.MM.dd')}">2026.05.16</span>
              <span th:if="${report.eventTime != null}" th:text="${#temporals.format(report.eventTime, ' HH:mm')}"> 12:00</span>
            </div>
          </div>
        </div>
      </a>
    </section>

    <div th:if="${#lists.isEmpty(reports)}"
         class="flex flex-col items-center justify-center rounded-3xl border border-slate-200 bg-white px-5 py-20 text-center shadow-sm">
      <p class="text-base font-bold text-slate-700">등록된 동물 신고가 없습니다</p>
      <a th:href="@{/animal-reports/new}" class="mt-4 text-sm font-semibold text-slate-900 underline">첫 신고 등록하기</a>
    </div>

    <nav th:if="${reportPage != null && reportPage.totalPages > 1}"
         class="mt-8 flex items-center justify-center gap-3">
      <a th:classappend="${reportPage.first} ? ' pointer-events-none opacity-40'"
         th:href="@{/animal-reports(keyword=${keyword}, reportType=${reportType}, animalType=${animalType}, region=${region}, page=${page - 1}, size=${size})}"
         class="rounded-lg border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-600 shadow-sm hover:bg-slate-50">이전</a>
      <span class="text-sm font-medium text-slate-500">
        <span th:text="${page + 1}">1</span> / <span th:text="${reportPage.totalPages}">1</span>
      </span>
      <a th:classappend="${reportPage.last} ? ' pointer-events-none opacity-40'"
         th:href="@{/animal-reports(keyword=${keyword}, reportType=${reportType}, animalType=${animalType}, region=${region}, page=${page + 1}, size=${size})}"
         class="rounded-lg border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-600 shadow-sm hover:bg-slate-50">다음</a>
    </nav>
  </th:block>
</th:block>
</html>
