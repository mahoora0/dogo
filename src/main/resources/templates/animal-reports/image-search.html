<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<th:block th:replace="~{layout/base :: setContent(~{this::content})}">
  <th:block th:fragment="content">
    <section class="mb-8 rounded-2xl border border-slate-200 bg-white px-6 py-8 shadow-sm">
      <div class="flex flex-col gap-5 sm:flex-row sm:items-end sm:justify-between">
        <div>
          <span class="mb-2 inline-block text-sm font-semibold text-slate-500">이미지 유사도 검색</span>
          <h1 class="text-2xl font-bold tracking-tight text-slate-900 sm:text-3xl">사진으로 비슷한 동물 찾기</h1>
          <p class="mt-2 text-sm text-slate-500">업로드한 사진과 외형이 비슷한 동물 게시글을 보여줍니다.</p>
        </div>
        <a th:href="@{/animal-reports(keyword=${keyword}, keywordScope=${keywordScope}, reportType=${reportType}, animalType=${animalType}, region=${region}, startDate=${startDate}, endDate=${endDate}, detailPlace=${detailPlace})}"
           class="inline-flex items-center justify-center gap-2 rounded-full border border-slate-200 bg-white px-6 py-3 text-sm font-bold text-slate-700 shadow-sm transition hover:bg-slate-50">
          목록으로
        </a>
      </div>
    </section>

    <!-- Re-search Form -->
    <div class="mb-8 overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm">
      <div class="px-6 py-5">
        <form action="/animal-reports/image-search" method="post" enctype="multipart/form-data"
              class="flex flex-col gap-4 sm:flex-row sm:items-end">
          <input type="hidden" name="reportType" th:value="${reportType}">
          <input type="hidden" name="animalType" th:value="${animalType}">
          <input type="hidden" name="region" th:value="${region}">
          <input type="hidden" name="keyword" th:value="${keyword}">
          <input type="hidden" name="keywordScope" th:value="${keywordScope}">
          <input type="hidden" name="startDate" th:value="${startDate}">
          <input type="hidden" name="endDate" th:value="${endDate}">
          <input type="hidden" name="detailPlace" th:value="${detailPlace}">
          <div class="flex-1">
            <label class="mb-1.5 block text-xs font-bold uppercase tracking-wider text-slate-400">다른 사진으로 검색</label>
            <label class="flex cursor-pointer items-center gap-3 rounded-xl border border-dashed border-slate-300 bg-slate-50 px-4 py-3 transition hover:border-slate-400 hover:bg-slate-100">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
              <span id="fileNameLabel" class="truncate text-sm text-slate-500">파일을 선택하세요</span>
              <input type="file" name="image" accept="image/*" class="hidden" onchange="document.getElementById('fileNameLabel').textContent = this.files[0]?.name ?? '파일을 선택하세요'">
            </label>
          </div>
          <button type="submit"
                  class="shrink-0 rounded-full bg-slate-900 px-6 py-3 text-sm font-bold text-white shadow-sm transition hover:bg-slate-700 active:scale-[0.98]">
            유사 동물 검색
          </button>
        </form>
      </div>
    </div>

    <!-- Error -->
    <div th:if="${error}" class="mb-6 rounded-2xl border border-rose-200 bg-rose-50 px-5 py-4 text-sm font-medium text-rose-700">
      <span th:text="${error}"></span>
    </div>

    <!-- Result Header -->
    <div class="mb-5 flex items-center gap-2 px-1" th:if="${results != null}">
      <span class="h-2 w-2 rounded-full bg-violet-500"></span>
      <h3 class="text-sm font-bold text-slate-600">
        유사 동물 <span class="text-slate-900" th:text="${#lists.size(results)}">0</span>건
      </h3>
    </div>

    <!-- Grid -->
    <section th:if="${results != null and not #lists.isEmpty(results)}" class="grid gap-5 sm:grid-cols-2 xl:grid-cols-3">
      <a th:each="result : ${results}" th:href="@{/animal-reports/{id}(id=${result.report.id})}"
         class="group overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm transition hover:border-slate-300 hover:shadow-md">
        <div class="relative h-44 w-full overflow-hidden bg-slate-50">
          <img th:src="${result.report.imageUrl}" alt="" class="h-full w-full object-cover transition-transform duration-700 group-hover:scale-110">
          <div class="absolute left-3 top-3 flex gap-1.5">
            <th:block th:if="${result.report.reportType == 'PROTECTING'}">
              <span class="rounded-full bg-indigo-500 px-3 py-1 text-xs font-bold text-white shadow-sm">목격</span>
              <span class="rounded-full bg-emerald-500 px-3 py-1 text-xs font-bold text-white shadow-sm">보호</span>
            </th:block>
            <th:block th:if="${result.report.reportType != 'PROTECTING'}">
              <span th:text="${result.report.reportTypeLabel}"
                    th:classappend="${result.report.reportType == 'MISSING' ? ' bg-rose-500' : (result.report.reportType == 'SIGHTING' ? ' bg-indigo-500' : (result.report.reportType == 'RETURNED' ? ' bg-sky-500' : ' bg-amber-500'))}"
                    class="rounded-full px-3 py-1 text-xs font-bold text-white shadow-sm">실종</span>
            </th:block>
          </div>
          <div class="absolute right-3 top-3">
            <span th:text="${result.score + '%'}" class="rounded-full bg-violet-600 px-3 py-1 text-xs font-bold text-white shadow-sm">유사도</span>
          </div>
        </div>
        <div class="p-4">
          <h2 th:text="${result.report.title}" class="line-clamp-1 text-base font-bold text-slate-900">제목</h2>
          <div class="mt-2 flex flex-wrap gap-1.5">
            <span th:text="${result.report.animalTypeLabel}" class="rounded bg-slate-100 px-2 py-0.5 text-xs font-semibold text-slate-600">개</span>
            <span th:if="${result.report.breedName}" th:text="${result.report.breedName}" class="rounded bg-slate-100 px-2 py-0.5 text-xs font-semibold text-slate-600">믹스</span>
            <span th:if="${result.report.furColor}" th:text="${result.report.furColor}" class="rounded bg-slate-100 px-2 py-0.5 text-xs font-semibold text-slate-600">갈색</span>
          </div>
          <div class="mt-3 space-y-1.5 text-sm text-slate-500">
            <div class="flex min-w-0 items-center gap-1.5">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 shrink-0 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a2 2 0 01-2.828 0l-4.243-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
              <span class="truncate" th:text="${result.report.regionName + ' · ' + result.report.detailPlace}">서울특별시 · 공원</span>
            </div>
            <div class="flex items-center gap-1.5">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 shrink-0 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
              <span th:text="${#temporals.format(result.report.eventDate, 'yyyy.MM.dd')}">2026.05.16</span>
            </div>
          </div>
        </div>
      </a>
    </section>

    <!-- Empty State -->
    <div th:if="${results != null and #lists.isEmpty(results) and error == null}"
         class="mt-8 flex flex-col items-center justify-center rounded-3xl border border-slate-200 bg-white/50 px-5 py-24 text-center">
      <div class="mb-5 flex h-20 w-20 items-center justify-center rounded-full bg-slate-100 text-slate-300">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      </div>
      <p class="text-lg font-bold text-slate-700">비슷한 동물을 찾지 못했습니다</p>
      <p class="mt-2 text-sm text-slate-500">다른 사진으로 다시 시도해보세요.</p>
    </div>
  </th:block>
</th:block>
</html>
