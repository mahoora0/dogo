<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: setContent(~{::content})}">
<th:block th:fragment="content">

    <div class="guide-detail-container max-w-4xl mx-auto px-4 py-6">
        
        <div class="bg-white rounded-2xl border border-slate-200/80 shadow-sm p-6 sm:p-8">
            
            <!-- 상단 영역: 제목 및 카테고리 -->
            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3 pb-5 border-b border-slate-100">
                <h2 class="text-2xl sm:text-3xl font-extrabold text-slate-900 break-words flex-grow" th:text="${guide.title}">
                    가이드 제목
                </h2>
                <div>
                    <span th:text="${guide.category}"
                          th:classappend="${guide.category == '분실자' ? 'bg-indigo-50 text-indigo-700 border-indigo-200' : (guide.category == '습득자' ? 'bg-emerald-50 text-emerald-700 border-emerald-200' : 'bg-slate-50 text-slate-700 border-slate-200')}"
                          class="inline-block px-3 py-1 rounded-full text-xs font-bold border whitespace-nowrap">
                        분실자
                    </span>
                </div>
            </div>

            <!-- 정보 영역: 작성자 및 작성일 -->
            <div class="flex items-center gap-4 pt-3 pb-6 text-sm text-slate-500 font-medium">
                <div>
                    <span class="text-slate-400 font-normal">작성자</span> 
                    <strong class="text-slate-700 font-semibold ml-1" th:text="${guide.writer}">관리자</strong>
                </div>
                <div class="w-px h-3 bg-slate-200"></div>
                <div>
                    <span class="text-slate-400 font-normal">등록일</span> 
                    <strong class="text-slate-700 font-semibold ml-1" th:text="${#temporals.format(guide.createdAt, 'yyyy-MM-dd HH:mm')}">2026-05-18 01:20</strong>
                </div>
            </div>

            <!-- 본문 내용 영역 -->
            <div class="py-6 border-t border-slate-100 min-h-[220px]">
                <!-- 이미지 노출 -->
                <div th:if="${guide.imageUrl != null}" class="mb-6 max-w-2xl mx-auto rounded-2xl overflow-hidden border border-slate-200 shadow-sm bg-slate-50 flex items-center justify-center">
                    <img th:src="${guide.imageUrl}" alt="가이드 대표 이미지" class="max-h-[400px] w-full object-cover">
                </div>
                <div class="text-slate-700 leading-relaxed whitespace-pre-line text-base" th:text="${guide.content}">
                    가이드 본문 내용이 이곳에 출력됩니다.
                </div>
            </div>

            <!-- 하단 버튼 영역 -->
            <div class="mt-8 pt-5 border-t border-slate-100 flex items-center justify-between">
                
                <!-- 왼쪽: 돌아가기 버튼 -->
                <div>
                    <a th:href="${isAdmin ? '/admin/guide' : '/guide'}" class="inline-flex items-center justify-center px-5 py-2.5 rounded-xl border border-slate-300 bg-white text-slate-700 hover:bg-slate-50 font-bold text-sm transition-colors shadow-sm active:scale-[0.98]">
                        돌아가기
                    </a>
                </div>

                <!-- 오른쪽: 관리자용 수정/삭제 버튼 분기 -->
                <div th:if="${isAdmin}" class="flex items-center gap-2">
                    <!-- 수정 버튼 -->
                    <a th:href="@{/admin/guide/{id}/edit(id=${guide.id})}"
                       class="inline-flex items-center justify-center px-4 py-2.5 rounded-xl bg-indigo-50 text-indigo-700 hover:bg-indigo-100 font-bold text-sm transition-colors border border-indigo-200 active:scale-[0.98]">
                        수정
                    </a>
                    <!-- 삭제 버튼 (Form submit 방식) -->
                    <form th:action="@{/admin/guide/{id}/delete(id=${guide.id})}" method="post" data-confirm="이 이용가이드를 정말 삭제하시겠습니까?" class="margin-0 padding-0">
                        <button type="submit" class="inline-flex items-center justify-center px-4 py-2.5 rounded-xl bg-red-50 text-red-600 hover:bg-red-100 font-bold text-sm transition-colors border border-red-200 active:scale-[0.98]">
                            삭제
                        </button>
                    </form>
                </div>

            </div>

        </div>

    </div>

</th:block>
</html>
