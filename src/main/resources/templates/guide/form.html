<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: setContent(~{::content})}">
<th:block th:fragment="content">

    <div class="guide-form-container max-w-4xl mx-auto px-4 py-6">
        
        <div class="mb-8">
            <h2 class="text-3xl font-extrabold text-slate-900 mb-2" th:text="${guide.id == null ? '이용가이드 등록' : '이용가이드 수정'}">이용가이드 등록</h2>
            <p class="text-slate-500 text-lg" th:text="${guide.id == null ? '새로운 이용안내 및 가이드 문서를 작성하여 업로드합니다.' : '기존에 작성된 이용가이드 문서를 수정합니다.'}">설명 텍스트</p>
        </div>

        <div class="bg-white rounded-2xl border border-slate-200/80 shadow-sm p-6 sm:p-8">
            <form th:action="${guide.id == null ? '/admin/guide' : '/admin/guide/' + guide.id + '/edit'}" method="post" class="space-y-6">
                
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                    <!-- 카테고리 -->
                    <div>
                        <label for="category" class="block text-sm font-bold text-slate-700 mb-2">카테고리 <span class="text-red-500">*</span></label>
                        <select id="category" name="category" required
                                class="w-full bg-white border border-slate-300 rounded-xl px-4 py-3 text-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition duration-200">
                            <option value="분실자" th:selected="${guide.category == '분실자'}">분실자 가이드</option>
                            <option value="습득자" th:selected="${guide.category == '습득자'}">습득자 가이드</option>
                            <option value="기타" th:selected="${guide.category == '기타'}">기타 안내</option>
                        </select>
                    </div>

                    <!-- 작성자 -->
                    <div th:if="${guide.id == null}">
                        <label for="writer" class="block text-sm font-bold text-slate-700 mb-2">작성자 <span class="text-red-500">*</span></label>
                        <input type="text" id="writer" name="writer" value="관리자" required placeholder="작성자명"
                               class="w-full bg-white border border-slate-300 rounded-xl px-4 py-3 text-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition duration-200">
                    </div>
                    <div th:unless="${guide.id == null}">
                        <label class="block text-sm font-bold text-slate-700 mb-2">작성자</label>
                        <input type="text" disabled th:value="${guide.writer}"
                               class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-slate-500 cursor-not-allowed">
                    </div>
                </div>

                <!-- 제목 -->
                <div>
                    <label for="title" class="block text-sm font-bold text-slate-700 mb-2">제목 <span class="text-red-500">*</span></label>
                    <input type="text" id="title" name="title" th:value="${guide.title}" required placeholder="가이드 제목을 입력하세요"
                           class="w-full bg-white border border-slate-300 rounded-xl px-4 py-3 text-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition duration-200">
                </div>

                <!-- 내용 -->
                <div>
                    <label for="content" class="block text-sm font-bold text-slate-700 mb-2">내용 <span class="text-red-500">*</span></label>
                    <textarea id="content" name="content" required rows="10" placeholder="가이드 본문 내용을 상세하게 작성해주세요."
                              class="w-full bg-white border border-slate-300 rounded-xl px-4 py-3 text-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition duration-200 resize-none"
                              th:text="${guide.content}"></textarea>
                </div>

                <!-- 하단 버튼 -->
                <div class="flex items-center justify-end gap-3 pt-4 border-t border-slate-100">
                    <a th:href="${guide.id == null ? '/admin/guide' : '/admin/guide/' + guide.id}"
                       class="px-5 py-2.5 rounded-xl border border-slate-300 bg-white text-slate-700 hover:bg-slate-50 font-bold text-sm transition-colors active:scale-[0.98]">
                        취소
                    </a>
                    <button type="submit"
                            class="px-6 py-2.5 rounded-xl bg-slate-900 hover:bg-slate-800 text-white font-bold text-sm transition-colors shadow-sm active:scale-[0.98]">
                        <span th:text="${guide.id == null ? '등록 완료' : '수정 완료'}">등록 완료</span>
                    </button>
                </div>

            </form>
        </div>

    </div>

</th:block>
</html>
