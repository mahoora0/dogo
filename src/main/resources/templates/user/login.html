<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 - 두고내림</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" th:href="@{/css/user-style.css}">
</head>

<body class="bg-[#F8F9FA] flex items-center justify-center min-h-screen p-4">

  <div class="w-full max-w-[550px]">

    <div class="bg-white w-full py-6 mb-6 rounded-xl shadow-sm border border-gray-100 flex items-center justify-center">
      <a th:href="@{/}" class="flex items-center">
        <img th:src="@{/images/logo.png}" class="w-10 h-10 object-contain" alt="로고">
      </a>
    </div>

    <div class="bg-white p-12 rounded-[24px] shadow-sm border border-gray-100">

      <div class="text-center mb-8">
        <h1 class="text-3xl font-extrabold text-gray-900 mb-2">로그인</h1>
        <p class="text-gray-500 text-sm">분실물센터 계정으로 로그인하세요</p>
      </div>

      <!-- 에러 메시지 표시 -->
      <div id="error-message-box"
        th:class="${error == null ? 'mb-6 p-4 bg-red-50 border border-red-100 rounded-custom hidden' : 'mb-6 p-4 bg-red-50 border border-red-100 rounded-custom'}">
        <p id="error-text" class="text-red-500 text-sm font-semibold text-center" th:text="${message}">에러 메시지</p>
      </div>

      <form id="loginForm" action="#" th:action="@{/loginProcess}" method="post" class="space-y-5">
        <div class="space-y-2">
          <label class="block text-sm font-bold text-gray-700 ml-1">아이디</label>
          <input type="text" name="loginId" id="loginId" placeholder="아이디 입력"
            class="w-full px-4 py-3 bg-[#F1F3F5] border-none rounded-custom focus:ring-2 focus:ring-blue-400 outline-none transition-all placeholder:text-gray-400">
        </div>

        <div class="space-y-2">
          <label class="block text-sm font-bold text-gray-700 ml-1">비밀번호</label>
          <div class="relative">
            <input type="password" name="password" id="password" placeholder="비밀번호 입력"
              class="w-full pr-12 pl-4 py-3 bg-[#F1F3F5] border-none rounded-custom focus:ring-2 focus:ring-blue-400 outline-none transition-all placeholder:text-gray-400">
            <button type="button" onclick="togglePasswordVisibility('password', this)" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 focus:outline-none">
              <!-- 눈 감긴 아이콘 (기본: 숨겨진 상태 - 속눈썹 디자인) -->
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 eye-icon-closed" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 10c3 5.5 15 5.5 18 0" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M5.5 13.5L4 16.5" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M9.5 15.5L8.5 19" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M14.5 15.5L15.5 19" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M18.5 13.5L20 16.5" />
              </svg>
              <!-- 눈 뜬 아이콘 (보이는 상태) -->
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 eye-icon-open hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
              </svg>
            </button>
          </div>
        </div>

        <div class="flex justify-between items-center text-xs px-1">
          <label class="flex items-center gap-2 text-gray-500 cursor-pointer">
            <input type="checkbox" name="remember-me" class="rounded border-gray-300"> 로그인 상태 유지
          </label>
          <a href="#" class="text-gray-600 font-semibold border-b border-gray-400">아이디/비밀번호 찾기</a>
        </div>

        <button type="submit"
          class="w-full bg-[#333333] text-white py-4 rounded-custom font-bold text-md hover:bg-black transition-all mt-4">
          로그인
        </button>
      </form>

      <script>
        const loginForm = document.getElementById('loginForm');
        const loginIdInput = document.getElementById('loginId');
        const passwordInput = document.getElementById('password');
        const errorMessageBox = document.getElementById('error-message-box');
        const errorText = document.getElementById('error-text');

        loginForm.addEventListener('submit', function (e) {
          if (!loginIdInput.value.trim()) {
            e.preventDefault();
            errorMessageBox.classList.remove('hidden');
            errorText.textContent = "아이디를 입력해주세요.";
            loginIdInput.focus();
            return;
          }

          if (!passwordInput.value.trim()) {
            e.preventDefault();
            errorMessageBox.classList.remove('hidden');
            errorText.textContent = "비밀번호를 입력해주세요.";
            passwordInput.focus();
            return;
          }
        });

        function togglePasswordVisibility(inputId, btn) {
          const input = document.getElementById(inputId);
          const closedIcon = btn.querySelector('.eye-icon-closed');
          const openIcon = btn.querySelector('.eye-icon-open');
          
          if (input.type === 'password') {
            input.type = 'text';
            closedIcon.classList.add('hidden');
            openIcon.classList.remove('hidden');
          } else {
            input.type = 'password';
            closedIcon.classList.remove('hidden');
            openIcon.classList.add('hidden');
          }
        }
      </script>

      <div class="relative my-10">
        <div class="absolute inset-0 flex items-center">
          <div class="w-full border-t border-gray-100"></div>
        </div>
        <div class="relative flex justify-center text-[11px] font-bold text-gray-400 uppercase tracking-tighter">
          <span class="bg-white px-4">또는 SNS 계정으로 로그인</span>
        </div>
      </div>

      <!-- SNS 로그인 전체 컨테이너 -->
      <div class="sns-login-container">

        <!-- 구글 로그인 버튼 -->
        <a th:href="@{/oauth2/authorization/google}" class="sns-button google-btn" title="Google 로그인">
          <img th:src="@{/images/google-svg.svg}" alt="Google" class="sns-logo">
        </a>

        <!-- 네이버 로그인 버튼 -->
        <a th:href="@{/oauth2/authorization/naver}" class="sns-button naver-btn" title="네이버 로그인">
          <img th:src="@{/images/naver-svg.svg}" alt="네이버" class="sns-logo">
        </a>

        <!-- 카카오 로그인 버튼 -->
        <a th:href="@{/oauth2/authorization/kakao}" class="sns-button kakao-btn" title="카카오 로그인">
          <img th:src="@{/images/kakao-svg.svg}" alt="카카오" class="sns-logo">
        </a>

      </div>

      <div class="mt-10 text-center">
        <p class="text-sm text-gray-500">
          아직 회원이 아니신가요?
          <a th:href="@{/join}" class="text-gray-900 font-bold ml-2 border-b-2 border-gray-900 pb-0.5">회원가입</a>
        </p>
      </div>
    </div>
  </div>

</body>

</html>
