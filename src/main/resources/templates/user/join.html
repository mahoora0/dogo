<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회원가입 - 두고내림</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* SNS 로그인 전체 컨테이너 */
    .sns-login-container {
      display: flex;
      justify-content: center;
      gap: 24px;
      width: 100%;
      box-sizing: border-box;
      margin-top: 10px;
    }

    /* SNS 버튼 공통 스타일 (원형) */
    .sns-button {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      text-decoration: none;
      flex: none;
      box-shadow: 0 2px 5px rgba(0,0,0,0.08);
    }

    .sns-button:hover {
      transform: translateY(-3px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.15);
    }

    .sns-button:active {
      transform: translateY(-1px);
    }

    /* 개별 로고 이미지 스타일 */
    .sns-logo {
      width: 24px;
      height: 24px;
      object-fit: contain;
    }

    /* 기업별 브랜드 컬러 매칭 */
    .google-btn {
      background-color: #FFFFFF;
      border: 1px solid #f1f3f5 !important;
    }

    .naver-btn {
      background-color: #03C75A;
    }

    .kakao-btn {
      background-color: #FEE500;
    }

    /* 이미지 느낌의 둥근 모서리 */
    .rounded-custom {
      border-radius: 12px;
    }
  </style>
</head>

<body class="bg-[#F8F9FA] flex items-center justify-center min-h-screen p-4">

  <div class="w-full max-w-[550px]">

    <!-- 로고 영역 (로그인 페이지와 동일한 구조) -->
    <div class="bg-white w-full py-6 mb-6 rounded-xl shadow-sm border border-gray-100 flex items-center justify-center">
      <a th:href="@{/}" class="flex items-center">
        <img th:src="@{/images/logo.png}" class="w-10 h-10 object-contain" alt="로고">
      </a>
    </div>

    <div class="bg-white p-8 sm:p-12 rounded-[24px] shadow-sm border border-gray-100">

      <div class="text-center mb-8">
        <h1 class="text-3xl font-extrabold text-gray-900 mb-2">회원가입</h1>
        <p class="text-gray-500 text-sm">분실물 센터 계정을 만들어보세요</p>
      </div>

      <!-- 회원가입 폼 -->
      <form action="#" th:action="@{/join}" method="post" enctype="multipart/form-data" class="space-y-5">

        <!-- 프로필 -->
        <div class="space-y-3 flex flex-col items-center">
          <div class="w-full text-left">
            <label class="block text-sm font-bold text-gray-900 ml-1">프로필</label>
          </div>
          <div id="profilePreview"
            class="w-24 h-24 bg-[#D9D9D9] rounded-full flex items-center justify-center text-gray-500 mt-2 mb-2 overflow-hidden relative">
            <!-- 기본 카메라 아이콘 -->
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd"
                d="M4 5a2 2 0 00-2 2v8a2 2 0 002 2h12a2 2 0 002-2V7a2 2 0 00-2-2h-1.586a1 1 0 01-.707-.293l-1.121-1.121A2 2 0 0011.172 3H8.828a2 2 0 00-1.414.586L6.293 4.707A1 1 0 015.586 5H4zm6 9a3 3 0 100-6 3 3 0 000 6z"
                clip-rule="evenodd" />
            </svg>
          </div>
          <label
            class="cursor-pointer border border-gray-300 text-gray-700 px-4 py-1.5 rounded-custom text-sm hover:bg-gray-50 transition-all font-semibold">
            프로필 사진 업로드
            <input type="file" name="profileImage" class="hidden" accept="image/*" onchange="previewImage(event)">
          </label>
        </div>

        <!-- 닉네임 -->
        <div class="space-y-2">
          <label class="block text-sm font-bold text-gray-900 ml-1">닉네임</label>
          <div class="flex gap-2">
            <input type="text" id="nickname" name="nickname" placeholder="닉네임 입력"
              class="flex-1 px-4 py-3 bg-[#E9ECEF] border-none rounded-custom focus:ring-2 focus:ring-blue-400 outline-none transition-all placeholder:text-gray-500 text-sm">
            <button type="button" onclick="checkNickname()"
              class="bg-[#868E96] hover:bg-[#495057] text-white px-5 py-3 rounded-custom text-sm font-semibold transition-all whitespace-nowrap">
              중복 확인
            </button>
          </div>
          <p id="nicknameMessage" class="text-xs ml-1 hidden"></p>
        </div>

        <!-- 아이디 -->
        <div class="space-y-2">
          <label class="block text-sm font-bold text-gray-900 ml-1">아이디</label>
          <input type="text" id="loginId" name="loginId" placeholder="아이디 입력"
            class="w-full px-4 py-3 bg-[#E9ECEF] border-none rounded-custom focus:ring-2 focus:ring-blue-400 outline-none transition-all placeholder:text-gray-500 text-sm">
          <p id="loginIdError" class="text-red-500 text-xs ml-1 hidden">4~20자의 영문 소문자, 숫자만 사용 가능합니다.</p>
        </div>

        <!-- 비밀번호 -->
        <div class="space-y-2">
          <label class="block text-sm font-bold text-gray-900 ml-1">비밀번호</label>
          <div class="relative">
            <input type="password" id="password" name="password" placeholder="••••••••"
              class="w-full pr-12 pl-4 py-3 bg-[#E9ECEF] border-none rounded-custom focus:ring-2 focus:ring-blue-400 outline-none transition-all placeholder:text-gray-500 text-sm">
            <button type="button" onclick="togglePasswordVisibility('password', this)" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 focus:outline-none">
              <!-- 눈 감긴 아이콘 (기본: 숨겨진 상태 - 속눈썹 디자인) -->
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 eye-icon-closed" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 10c3 5.5 15 5.5 18 0" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M5.5 13.5L4 16.5" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M9.5 15.5L8.5 19" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M14.5 15.5L15.5 19" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M18.5 13.5L20 16.5" />
              </svg>
              <!-- 눈 뜬 아이콘 (보이는 상태) -->
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 eye-icon-open hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
              </svg>
            </button>
          </div>
          <p id="passwordError" class="text-red-500 text-xs ml-1 hidden">특수문자 포함 8자 이상 써주세요</p>
        </div>

        <!-- 비밀번호 확인 -->
        <div class="space-y-2">
          <label class="block text-sm font-bold text-gray-900 ml-1">비밀번호 확인</label>
          <div class="flex gap-2">
            <div class="relative flex-1">
              <input type="password" id="passwordConfirm" name="passwordConfirm" placeholder="비밀번호 재입력"
                class="w-full pr-12 pl-4 py-3 bg-[#E9ECEF] border-none rounded-custom focus:ring-2 focus:ring-blue-400 outline-none transition-all placeholder:text-gray-500 text-sm">
              <button type="button" onclick="togglePasswordVisibility('passwordConfirm', this)" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 focus:outline-none">
                <!-- 눈 감긴 아이콘 (기본: 숨겨진 상태 - 속눈썹 디자인) -->
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 eye-icon-closed" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M3 10c3 5.5 15 5.5 18 0" />
                  <path stroke-linecap="round" stroke-linejoin="round" d="M5.5 13.5L4 16.5" />
                  <path stroke-linecap="round" stroke-linejoin="round" d="M9.5 15.5L8.5 19" />
                  <path stroke-linecap="round" stroke-linejoin="round" d="M14.5 15.5L15.5 19" />
                  <path stroke-linecap="round" stroke-linejoin="round" d="M18.5 13.5L20 16.5" />
                </svg>
                <!-- 눈 뜬 아이콘 (보이는 상태) -->
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 eye-icon-open hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                  <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                </svg>
              </button>
            </div>
            <button type="button" onclick="checkPasswordMatch()"
              class="bg-[#868E96] hover:bg-[#495057] text-white px-5 py-3 rounded-custom text-sm font-semibold transition-all whitespace-nowrap">
              일치 확인
            </button>
          </div>
          <p id="passwordMatchMessage" class="text-xs ml-1 hidden"></p>
        </div>

        <!-- 이메일 -->
        <div class="space-y-2">
          <label class="block text-sm font-bold text-gray-900 ml-1">이메일</label>
          <div class="flex gap-2">
            <input type="email" id="email" name="email" placeholder="이메일 입력"
              class="flex-1 px-4 py-3 bg-[#E9ECEF] border-none rounded-custom focus:ring-2 focus:ring-blue-400 outline-none transition-all placeholder:text-gray-500 text-sm">
            <button type="button" id="sendMailBtn" onclick="sendVerificationMail()"
              class="bg-[#868E96] hover:bg-[#495057] text-white px-5 py-3 rounded-custom text-sm font-semibold transition-all whitespace-nowrap">
              인증 요청
            </button>
          </div>
          <p id="emailError" class="text-red-500 text-xs ml-1 hidden"></p>
        </div>

        <!-- 이메일 인증 번호 -->
        <div id="emailVerifySection" class="space-y-2 hidden">
          <label class="block text-sm font-bold text-gray-900 ml-1">인증 번호</label>
          <div class="flex gap-2">
            <input type="text" id="verificationCode" placeholder="6자리 번호 입력"
              class="flex-1 px-4 py-3 bg-[#E9ECEF] border-none rounded-custom focus:ring-2 focus:ring-blue-400 outline-none transition-all placeholder:text-gray-500 text-sm">
            <button type="button" id="verifyMailBtn" onclick="verifyMailCode()"
              class="bg-[#343A40] hover:bg-black text-white px-5 py-3 rounded-custom text-sm font-semibold transition-all whitespace-nowrap">
              인증 확인
            </button>
          </div>
          <p id="verificationMessage" class="text-xs ml-1 hidden"></p>
        </div>

        <!-- 연락처 -->
        <div class="space-y-2">
          <label class="block text-sm font-bold text-gray-900 ml-1">연락처</label>
          <div class="flex gap-2">
            <input type="text" id="phone" name="phone" placeholder="연락처 입력"
              class="flex-1 px-4 py-3 bg-[#E9ECEF] border-none rounded-custom focus:ring-2 focus:ring-blue-400 outline-none transition-all placeholder:text-gray-500 text-sm">
            <button type="button" id="sendSmsBtn" onclick="sendVerificationSms()"
              class="bg-[#868E96] hover:bg-[#495057] text-white px-5 py-3 rounded-custom text-sm font-semibold transition-all whitespace-nowrap">
              인증 요청
            </button>
          </div>
          <p id="phoneError" class="text-red-500 text-xs ml-1 hidden"></p>
        </div>

        <!-- 연락처 인증 번호 -->
        <div id="smsVerifySection" class="space-y-2 hidden">
          <label class="block text-sm font-bold text-gray-900 ml-1">인증 번호</label>
          <div class="flex gap-2">
            <input type="text" id="smsCode" placeholder="6자리 번호 입력"
              class="flex-1 px-4 py-3 bg-[#E9ECEF] border-none rounded-custom focus:ring-2 focus:ring-blue-400 outline-none transition-all placeholder:text-gray-500 text-sm">
            <button type="button" id="verifySmsBtn" onclick="verifySmsCode()"
              class="bg-[#343A40] hover:bg-black text-white px-5 py-3 rounded-custom text-sm font-semibold transition-all whitespace-nowrap">
              인증 확인
            </button>
          </div>
          <p id="smsMessage" class="text-xs ml-1 hidden"></p>
        </div>

        <!-- 회원가입 완료 버튼 -->
        <button type="submit"
          class="w-full bg-[#343A40] text-white py-4 rounded-custom font-bold text-md hover:bg-black transition-all mt-6">
          회원가입 완료
        </button>

        <!-- 로그인 안내 -->
        <div class="text-center mt-4">
          <span class="text-sm text-gray-600">이미 계정이 있으신가요?</span>
          <a th:href="@{/login}" class="text-sm font-bold text-gray-900 ml-1">로그인하기</a>
        </div>
      </form>

      <div class="relative my-8">
        <div class="absolute inset-0 flex items-center">
          <div class="w-full border-t border-gray-200"></div>
        </div>
        <div class="relative flex justify-center text-[12px] font-bold text-gray-500 tracking-tight">
          <span class="bg-white px-4">또는 SNS 계정으로 회원가입</span>
        </div>
      </div>

      <!-- SNS 로그인 전체 컨테이너 -->
      <div class="sns-login-container">

        <!-- 구글 로그인 버튼 -->
        <a th:href="@{/oauth2/authorization/google}" class="sns-button google-btn" title="Google 로그인">
          <img th:src="@{/images/google-svg.svg}" alt="Google" class="sns-logo">
        </a>

        <!-- 네이버 로그인 버튼 -->
        <a th:href="@{/oauth2/authorization/naver}" class="sns-button naver-btn" title="네이버 로그인">
          <img th:src="@{/images/naver-svg.svg}" alt="네이버" class="sns-logo">
        </a>

        <!-- 카카오 로그인 버튼 -->
        <a th:href="@{/oauth2/authorization/kakao}" class="sns-button kakao-btn" title="카카오 로그인">
          <img th:src="@{/images/kakao-svg.svg}" alt="카카오" class="sns-logo">
        </a>

      </div>

    </div>
  </div>

  <script>
    function previewImage(event) {
      const reader = new FileReader();
      reader.onload = function () {
        const output = document.getElementById('profilePreview');
        output.innerHTML = `<img src="${reader.result}" class="w-full h-full object-cover">`;
      };
      if (event.target.files[0]) {
        reader.readAsDataURL(event.target.files[0]);
      }
    }

    const nicknameInput = document.getElementById('nickname');
    const nicknameMessage = document.getElementById('nicknameMessage');
    const loginIdInput = document.getElementById('loginId');
    const passwordInput = document.getElementById('password');
    const passwordConfirmInput = document.getElementById('passwordConfirm');
    const loginIdError = document.getElementById('loginIdError');
    const passwordError = document.getElementById('passwordError');
    const passwordMatchMessage = document.getElementById('passwordMatchMessage');

    const emailInput = document.getElementById('email');
    const emailError = document.getElementById('emailError');
    const emailVerifySection = document.getElementById('emailVerifySection');
    const verificationCodeInput = document.getElementById('verificationCode');
    const verificationMessage = document.getElementById('verificationMessage');
    const sendMailBtn = document.getElementById('sendMailBtn');

    const phoneInput = document.getElementById('phone');
    const phoneError = document.getElementById('phoneError');
    const smsVerifySection = document.getElementById('smsVerifySection');
    const smsCodeInput = document.getElementById('smsCode');
    const smsMessage = document.getElementById('smsMessage');
    const sendSmsBtn = document.getElementById('sendSmsBtn');

    let isEmailVerified = false;
    let isPhoneVerified = false;
    let isNicknameChecked = false;

    // 닉네임 중복 확인
    async function checkNickname() {
      const nickname = nicknameInput.value.trim();
      if (!nickname) {
        nicknameMessage.textContent = '닉네임을 입력해주세요.';
        nicknameMessage.className = 'text-red-500 text-xs ml-1';
        nicknameMessage.classList.remove('hidden');
        return;
      }

      try {
        const response = await fetch(`/api/user/check-nickname?nickname=${encodeURIComponent(nickname)}`);
        const isDuplicate = await response.json();

        if (isDuplicate) {
          nicknameMessage.textContent = '이미 사용 중인 닉네임입니다.';
          nicknameMessage.className = 'text-red-500 text-xs ml-1';
          isNicknameChecked = false;
        } else {
          nicknameMessage.textContent = '사용 가능한 닉네임입니다.';
          nicknameMessage.className = 'text-green-500 text-xs ml-1';
          isNicknameChecked = true;
        }
        nicknameMessage.classList.remove('hidden');
      } catch (error) {
        alert('중복 확인 중 오류가 발생했습니다.');
      }
    }

    nicknameInput.addEventListener('input', () => {
      isNicknameChecked = false;
      nicknameMessage.classList.add('hidden');
    });

    // 아이디 유효성 검사 (4~20자, 영문 소문자/숫자)
    loginIdInput.addEventListener('input', () => {
      const loginId = loginIdInput.value;
      const regex = /^[a-z0-9]{4,20}$/;
      if (!regex.test(loginId)) {
        loginIdError.classList.remove('hidden');
      } else {
        loginIdError.classList.add('hidden');
      }
    });

    // 비밀번호 유효성 검사 (8자 이상, 특수문자 포함)
    passwordInput.addEventListener('input', () => {
      const password = passwordInput.value;
      const hasSpecialChar = /[!@#$%^&*(),.?":{}|<>]/.test(password);
      if (password.length < 8 || !hasSpecialChar) {
        passwordError.classList.remove('hidden');
      } else {
        passwordError.classList.add('hidden');
      }
    });

    // 비밀번호 일치 확인 버튼 함수
    function checkPasswordMatch() {
      const password = passwordInput.value;
      const confirm = passwordConfirmInput.value;

      if (!confirm) {
        passwordMatchMessage.textContent = '비밀번호를 한 번 더 입력해주세요.';
        passwordMatchMessage.className = 'text-red-500 text-xs ml-1';
        passwordMatchMessage.classList.remove('hidden');
        return;
      }

      if (password === confirm) {
        passwordMatchMessage.textContent = '비밀번호가 일치합니다.';
        passwordMatchMessage.className = 'text-green-500 text-xs ml-1';
      } else {
        passwordMatchMessage.textContent = '비밀번호가 일치하지 않습니다.';
        passwordMatchMessage.className = 'text-red-500 text-xs ml-1';
      }
      passwordMatchMessage.classList.remove('hidden');
    }

    // 메일 인증 요청
    async function sendVerificationMail() {
      const email = emailInput.value;
      if (!email || !email.includes('@')) {
        emailError.textContent = '올바른 이메일 형식을 입력해주세요.';
        emailError.classList.remove('hidden');
        return;
      }

      sendMailBtn.disabled = true;
      sendMailBtn.textContent = '발송 중...';

      try {
        const response = await fetch('/api/mail/send', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });

        const data = await response.text();

        if (response.ok) {
          alert(data);
          emailError.classList.add('hidden');
          emailVerifySection.classList.remove('hidden');
          sendMailBtn.textContent = '재발송';
        } else {
          emailError.textContent = data;
          emailError.classList.remove('hidden');
        }
      } catch (error) {
        alert('메일 발송 중 오류가 발생했습니다.');
      } finally {
        sendMailBtn.disabled = false;
      }
    }

    // 메일 인증 번호 확인
    async function verifyMailCode() {
      const email = emailInput.value;
      const code = verificationCodeInput.value;

      try {
        const response = await fetch('/api/mail/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, code })
        });

        const data = await response.text();

        if (response.ok) {
          verificationMessage.textContent = data;
          verificationMessage.className = 'text-green-500 text-xs ml-1';
          isEmailVerified = true;
          emailInput.readOnly = true;
          verificationCodeInput.readOnly = true;
          sendMailBtn.classList.add('hidden');
          document.getElementById('verifyMailBtn').classList.add('hidden');
        } else {
          verificationMessage.textContent = data;
          verificationMessage.className = 'text-red-500 text-xs ml-1';
        }
        verificationMessage.classList.remove('hidden');
      } catch (error) {
        alert('인증 처리 중 오류가 발생했습니다.');
      }
    }

    // 연락처 인증 요청
    async function sendVerificationSms() {
      const phone = phoneInput.value;
      if (!phone || phone.length < 10) {
        phoneError.textContent = '올바른 연락처를 입력해주세요.';
        phoneError.classList.remove('hidden');
        return;
      }

      sendSmsBtn.disabled = true;
      sendSmsBtn.textContent = '발송 중...';

      try {
        const response = await fetch('/api/sms/send', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone })
        });

        const data = await response.text();

        if (response.ok) {
          alert(data);
          phoneError.classList.add('hidden');
          smsVerifySection.classList.remove('hidden');
          sendSmsBtn.textContent = '재발송';
        } else {
          phoneError.textContent = data;
          phoneError.classList.remove('hidden');
        }
      } catch (error) {
        alert('인증 문자 발송 중 오류가 발생했습니다.');
      } finally {
        sendSmsBtn.disabled = false;
      }
    }

    // 연락처 인증 번호 확인
    async function verifySmsCode() {
      const phone = phoneInput.value;
      const code = smsCodeInput.value;

      try {
        const response = await fetch('/api/sms/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone, code })
        });

        const data = await response.text();

        if (response.ok) {
          smsMessage.textContent = data;
          smsMessage.className = 'text-green-500 text-xs ml-1';
          isPhoneVerified = true;
          phoneInput.readOnly = true;
          smsCodeInput.readOnly = true;
          sendSmsBtn.classList.add('hidden');
          document.getElementById('verifySmsBtn').classList.add('hidden');
        } else {
          smsMessage.textContent = data;
          smsMessage.className = 'text-red-500 text-xs ml-1';
        }
        smsMessage.classList.remove('hidden');
      } catch (error) {
        alert('인증 처리 중 오류가 발생했습니다.');
      }
    }

    // 폼 제출 전 최종 검사
    document.querySelector('form').addEventListener('submit', (e) => {
      const loginId = loginIdInput.value;
      const password = passwordInput.value;
      const confirm = passwordConfirmInput.value;

      const isLoginIdValid = /^[a-z0-9]{4,20}$/.test(loginId);
      const isPasswordValid = password.length >= 8 && /[!@#$%^&*(),.?":{}|<>]/.test(password);
      const isMatch = password === confirm && confirm !== '';

      if (!isLoginIdValid || !isPasswordValid || !isMatch || !isEmailVerified || !isPhoneVerified || !isNicknameChecked) {
        e.preventDefault();

        if (!isNicknameChecked) {
          alert('닉네임 중복 확인을 완료해주세요.');
        } else if (!isEmailVerified) {
          alert('이메일 인증을 완료해주세요.');
        } else if (!isPhoneVerified) {
          alert('연락처 인증을 완료해주세요.');
        } else {
          alert('입력 정보를 다시 확인해주세요.');
        }

        if (!isLoginIdValid) loginIdError.classList.remove('hidden');
        if (!isPasswordValid) passwordError.classList.remove('hidden');
        if (!isMatch) {
          passwordMatchMessage.textContent = '비밀번호가 일치하지 않습니다.';
          passwordMatchMessage.className = 'text-red-500 text-xs ml-1';
          passwordMatchMessage.classList.remove('hidden');
        }
      }
    });

    function togglePasswordVisibility(inputId, btn) {
      const input = document.getElementById(inputId);
      const closedIcon = btn.querySelector('.eye-icon-closed');
      const openIcon = btn.querySelector('.eye-icon-open');
      
      if (input.type === 'password') {
        input.type = 'text';
        closedIcon.classList.add('hidden');
        openIcon.classList.remove('hidden');
      } else {
        input.type = 'password';
        closedIcon.classList.remove('hidden');
        openIcon.classList.add('hidden');
      }
    }
  </script>

</body>

</html>
