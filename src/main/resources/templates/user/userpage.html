<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<th:block th:replace="~{layout/base :: setContent(~{this::content})}">
  <th:block th:fragment="content">
    <div class="max-w-4xl mx-auto py-10">
      <h2 class="text-2xl font-bold mb-6">마이페이지</h2>

      <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-8">
        <h3 class="text-xl font-semibold mb-4">내 정보</h3>
        <p class="text-gray-700 mb-2">
          <strong>닉네임:</strong> <span sec:authentication="principal.user.nickname">닉네임</span>
        </p>
        <p class="text-gray-700 mb-2">
          <strong>이메일:</strong> <span sec:authentication="name">이메일</span>
        </p>
      </div>
      
      <!-- 탈퇴하기 버튼 -->
      <div class="mt-8 flex justify-start">
        <form th:action="@{/user/withdraw}" method="post" onsubmit="return confirm('정말로 탈퇴하시겠습니까? 모든 정보가 삭제됩니다.');">
          <button type="submit" class="text-gray-400 hover:text-red-500 text-sm underline transition-colors">
            탈퇴하기
          </button>
        </form>
      </div>
    </div>
  </th:block>
</th:block>
</html>
