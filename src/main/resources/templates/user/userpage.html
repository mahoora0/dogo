<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<th:block th:replace="~{layout/base :: setContent(~{this::content})}">
  <th:block th:fragment="content">
    <div class="max-w-5xl mx-auto">
      <!-- 프로필 정보 카드 -->
      <div class="bg-[#EBF5FF] rounded-[24px] p-10 flex items-center justify-between mb-10 shadow-sm">
        <div class="flex items-center gap-8">
          <!-- 프로필 이미지 -->
          <div class="relative">
            <img th:if="${#authentication.principal.user.profileImageUrl != null}"
                 th:src="${#authentication.principal.user.profileImageUrl}"
                 referrerpolicy="no-referrer"
                 class="w-32 h-32 rounded-full object-cover border-4 border-white shadow-sm" alt="프로필">
            <div th:unless="${#authentication.principal.user.profileImageUrl != null}"
                 class="w-32 h-32 rounded-full bg-white flex items-center justify-center text-gray-300 border-4 border-white shadow-sm">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-20 w-20" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/>
              </svg>
            </div>
          </div>
          
          <!-- 유저 텍스트 정보 -->
          <div class="space-y-2">
            <div class="flex items-center gap-2">
              <h2 class="text-3xl font-extrabold text-gray-900" sec:authentication="principal.user.nickname">김철수</h2>
              <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-blue-500" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M6.267 3.455a3.066 3.066 0 001.745-.723 3.066 3.066 0 013.976 0 3.066 3.066 0 001.745.723 3.066 3.066 0 012.812 2.812c.051.64.304 1.24.723 1.745a3.066 3.066 0 010 3.976 3.066 3.066 0 00-.723 1.745 3.066 3.066 0 01-2.812 2.812 3.066 3.066 0 00-1.745.723 3.066 3.066 0 01-3.976 0 3.066 3.066 0 00-1.745-.723 3.066 3.066 0 01-2.812-2.812 3.066 3.066 0 00-.723-1.745 3.066 3.066 0 010-3.976 3.066 3.066 0 00.723-1.745 3.066 3.066 0 012.812-2.812zm7.44 5.252a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
              </svg>
            </div>
            <div class="text-gray-600 font-medium">
              <p>가입일: <span th:text="${#authentication.principal.user.regDate != null ? #temporals.format(#authentication.principal.user.regDate, 'yyyy.MM.dd') : '정보 없음'}">2023.01.15</span></p>
              <p>회원등급: <span th:text="${#authentication.principal.user.role == 'ADMIN' ? '관리자' : '일반'}">일반</span></p>
            </div>
          </div>
        </div>
        
        <!-- 정보수정 버튼 -->
        <button id="openEditModal" class="bg-[#333333] text-white px-8 py-3 rounded-xl font-bold hover:bg-black transition-all">
          정보수정
        </button>
      </div>

      <!-- 내 활동 섹션 -->
      <div class="bg-white rounded-[24px] border border-gray-100 p-10 shadow-sm">
        <div class="flex items-center justify-between mb-10">
          <h3 class="text-xl font-extrabold text-gray-900">내 활동</h3>
          <span class="text-sm font-bold text-blue-600 bg-blue-50 px-3 py-1.5 rounded-full" th:text="'총 ' + ${#lists.size(userActivities)} + '건'">총 0건</span>
        </div>
        
        <!-- 활동 목록이 없을 때 -->
        <div th:if="${#lists.isEmpty(userActivities)}" 
             class="min-h-[250px] flex flex-col items-center justify-center border-2 border-dashed border-gray-100 rounded-[20px] bg-slate-50/50">
          <div class="mb-4 text-gray-300">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
            </svg>
          </div>
          <p class="text-gray-400 font-bold text-lg">작성한 활동 내역이 없습니다.</p>
          <p class="text-gray-400 text-sm mt-1">분실물 또는 습득물 게시글을 작성해보세요.</p>
        </div>

        <!-- 활동 목록 그리드 -->
        <div th:unless="${#lists.isEmpty(userActivities)}" 
             class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3">
          <a th:each="activity : ${userActivities}" 
             th:href="@{${activity.type == 'LOST' ? '/lost-items/' + activity.id : (activity.type == 'FOUND' ? '/found-items/' + activity.id : (activity.type == 'ANIMAL_REPORT' ? '/animal-reports/' + activity.id : (activity.type == 'MISSING_PERSON' ? '/missing-persons/' + activity.id : '/inquiry/' + activity.id)))}}"
             class="group flex flex-col overflow-hidden rounded-[20px] border border-gray-100 bg-white shadow-sm transition-all duration-300 hover:-translate-y-1 hover:border-blue-100 hover:shadow-md">
            
            <!-- 썸네일 영역 -->
            <div class="relative h-44 w-full overflow-hidden bg-gray-50">
              <!-- 1:1 문의 전용 데코레이션 그라데이션 백그라운드 -->
              <div th:if="${activity.type == 'INQUIRY'}"
                   class="flex h-full w-full items-center justify-center text-purple-500 bg-gradient-to-br from-purple-50 to-indigo-50">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-14 w-14 opacity-80" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
              </div>

              <!-- 이미지 혹은 기본 대체 아이콘 (LOST/FOUND 용) -->
              <th:block th:unless="${activity.type == 'INQUIRY'}">
                <img th:if="${activity.imageUrl != '/images/noImageSize.png'}" th:src="${activity.imageUrl}" alt=""
                     class="h-full w-full object-cover transition-transform duration-500 group-hover:scale-105">
                <img th:if="${activity.imageUrl == '/images/noImageSize.png'}" th:src="@{/images/noImageSize.png}" alt=""
                     class="h-full w-full object-cover transition-transform duration-500 group-hover:scale-105">
              </th:block>
              
              <!-- 타입 배지 (좌측 상단) -->
              <div class="absolute left-3 top-3 z-10">
                <span th:text="${activity.typeLabel}"
                      th:classappend="${activity.type == 'LOST'} ? 'bg-red-50 text-red-600 border border-red-100' : (${activity.type == 'FOUND'} ? 'bg-blue-50 text-blue-600 border border-blue-100' : (${activity.type == 'ANIMAL_REPORT'} ? 'bg-orange-50 text-orange-600 border border-orange-100' : (${activity.type == 'MISSING_PERSON'} ? 'bg-teal-50 text-teal-600 border border-teal-100' : 'bg-purple-50 text-purple-600 border border-purple-100')))"
                      class="block rounded-full px-3 py-1.5 text-xs font-extrabold shadow-sm">분실물</span>
              </div>

              <!-- 상태 배지 (우측 상단) -->
              <div class="absolute right-3 top-3 z-10">
                <span th:text="${activity.statusLabel}"
                      th:classappend="${activity.status == 'RETURNED' || activity.status == 'FOUND'} ? 'bg-emerald-600 text-white' : (activity.status == 'TRANSFERRED' ? 'bg-blue-600 text-white' : (activity.status == 'MATCHING' ? 'bg-amber-500 text-white' : (activity.status == 'ANSWERED' ? 'bg-indigo-600 text-white' : 'bg-slate-800 text-white')))"
                      class="block rounded-full px-3 py-1.5 text-xs font-extrabold shadow-sm">보관</span>
              </div>
            </div>
            
            <!-- 본문 영역 -->
            <div class="p-5 flex-1 flex flex-col justify-between">
              <div>
                <h4 th:text="${activity.title}" class="line-clamp-1 text-base font-extrabold text-gray-900 group-hover:text-blue-600 transition-colors">검정 지갑</h4>
                
                <!-- 카테고리 -->
                <div class="mt-2.5 flex flex-wrap gap-1.5">
                  <span th:text="${activity.category ?: '미분류'}" class="max-w-full truncate rounded-[6px] bg-gray-50 px-2 py-0.5 text-xs font-bold text-gray-500 border border-gray-100">지갑</span>
                </div>
              </div>
              
              <!-- 위치 및 일시 -->
              <div class="mt-4 pt-4 border-t border-gray-50 space-y-2 text-xs font-semibold text-gray-400">
                <div class="flex items-center gap-2">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 shrink-0 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a2 2 0 01-2.828 0l-4.243-4.243a8 8 0 1111.314 0z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
                  </svg>
                  <span class="truncate" th:text="${activity.place ?: '장소 정보 없음'}">서울 · 홍대</span>
                </div>
                <div class="flex items-center gap-2">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 shrink-0 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                  </svg>
                  <span th:text="${#temporals.format(activity.itemAt, 'yyyy.MM.dd HH:mm')}">2026.05.10 15:00</span>
                </div>
              </div>
            </div>
            
          </a>
        </div>
      </div>
      
      <!-- 탈퇴하기 버튼 -->
      <div class="mt-12 flex justify-center">
        <form th:action="@{/user/withdraw}" method="post" onsubmit="return confirm('정말로 탈퇴하시겠습니까? 모든 정보가 삭제됩니다.');">
          <button type="submit" class="text-gray-400 hover:text-red-500 text-xs underline transition-colors">
            탈퇴하기
          </button>
        </form>
      </div>
    </div>

    <!-- 사용자 정보 편집 모달 -->
    <div id="editModal" class="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-start justify-center hidden overflow-y-auto py-10 px-4">
      <div class="bg-white w-full max-w-[500px] rounded-[32px] shadow-2xl relative my-auto">
        <!-- 닫기 버튼 -->
        <button id="closeEditModal" class="absolute top-6 right-6 text-gray-400 hover:text-gray-600 z-10">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>

        <form th:action="@{/user/profile/update}" method="post" enctype="multipart/form-data" class="p-10">
          <h2 class="text-2xl font-extrabold text-gray-900 mb-8">사용자 정보 편집</h2>

          <!-- 프로필 사진 편집 -->
          <div class="flex flex-col items-center mb-10">
            <div class="relative group cursor-pointer" onclick="document.getElementById('profileImageInput').click()">
              <img id="modalProfilePreview" 
                   th:src="${#authentication.principal.user.profileImageUrl != null ? #authentication.principal.user.profileImageUrl : '/images/default-avatar.svg'}"
                   referrerpolicy="no-referrer"
                   class="w-32 h-32 rounded-full object-cover border-4 border-[#EBF5FF] group-hover:opacity-80 transition-all" alt="미리보기">
              <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all">
                 <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
                 </svg>
              </div>
            </div>
            <input type="file" id="profileImageInput" name="profileImage" class="hidden" accept="image/*">
            <button type="button" onclick="document.getElementById('profileImageInput').click()" 
                    class="mt-4 px-4 py-2 border border-gray-200 rounded-lg text-sm font-bold text-gray-600 hover:bg-gray-50">
              프로필 사진 변경
            </button>
          </div>

          <!-- 입력 필드들 -->
          <div class="space-y-4">
            <!-- 닉네임 -->
            <div class="flex flex-col gap-1.5">
              <label class="text-sm font-bold text-gray-700 ml-1">닉네임</label>
              <div class="flex gap-2">
                <input type="text" name="nickname" id="modalNickname" th:value="${#authentication.principal.user.nickname}"
                       class="flex-1 px-4 py-3 bg-white border border-blue-400 rounded-xl focus:ring-2 focus:ring-blue-100 outline-none font-medium">
                <button type="button" id="checkNicknameBtn" class="px-4 py-2 border border-gray-200 rounded-xl text-sm font-bold text-gray-600 hover:bg-gray-50">
                  중복 확인
                </button>
              </div>
              <p id="nicknameMsg" class="text-xs ml-2 font-medium hidden"></p>
            </div>

            <!-- ID (수정 불가) -->
            <div class="flex flex-col gap-1.5">
              <label class="text-sm font-bold text-gray-700 ml-1">ID</label>
              <input type="text" th:value="${#authentication.principal.user.loginId}" readonly
                     class="w-full px-4 py-3 bg-[#F1F3F5] border-none rounded-xl text-gray-500 font-medium cursor-not-allowed">
            </div>

            <!-- 새 비밀번호 -->
            <div class="flex flex-col gap-1.5">
              <label class="text-sm font-bold text-gray-700 ml-1 flex items-center gap-1">
                새 비밀번호
                <span th:if="${#authentication.principal.user.password == null}" class="text-[10px] text-gray-400 font-normal">(소셜 계정은 수정 불가)</span>
              </label>
              <input type="password" name="password" id="modalPassword" placeholder="********"
                     th:readonly="${#authentication.principal.user.password == null}"
                     th:classappend="${#authentication.principal.user.password == null ? 'bg-[#F1F3F5] cursor-not-allowed' : 'bg-white border border-gray-200'}"
                     class="w-full px-4 py-3 rounded-xl focus:ring-2 focus:ring-blue-100 outline-none font-medium">
              <p id="passwordError" class="text-red-500 text-xs ml-2 font-medium hidden">특수문자 포함 8자 이상 써주세요</p>
            </div>

            <!-- 새 비밀번호 확인 -->
            <div class="flex flex-col gap-1.5">
              <label class="text-sm font-bold text-gray-700 ml-1 flex items-center gap-1">
                새 비밀번호 확인
                <span th:if="${#authentication.principal.user.password == null}" class="text-[10px] text-gray-400 font-normal">(소셜 계정은 수정 불가)</span>
              </label>
              <input type="password" name="confirmPassword" id="modalConfirmPassword" placeholder="********"
                     th:readonly="${#authentication.principal.user.password == null}"
                     th:classappend="${#authentication.principal.user.password == null ? 'bg-[#F1F3F5] cursor-not-allowed' : 'bg-white border border-gray-200'}"
                     class="w-full px-4 py-3 rounded-xl focus:ring-2 focus:ring-blue-100 outline-none font-medium">
              <p id="passwordMatchMessage" class="text-xs ml-2 font-medium hidden"></p>
            </div>

            <!-- 이메일 (수정 불가) -->
            <div class="flex flex-col gap-1.5">
              <label class="text-sm font-bold text-gray-700 ml-1">이메일</label>
              <input type="text" th:value="${#authentication.principal.user.email}" readonly
                     class="w-full px-4 py-3 bg-[#F1F3F5] border-none rounded-xl text-gray-500 font-medium cursor-not-allowed">
            </div>


          </div>

          <!-- 하단 버튼 -->
          <div class="grid grid-cols-2 gap-3 mt-10">
            <button type="submit" class="bg-blue-500 text-white py-4 rounded-xl font-bold hover:bg-blue-600 transition-all">저장</button>
            <button type="button" id="cancelEditModal" class="bg-gray-500 text-white py-4 rounded-xl font-bold hover:bg-gray-600 transition-all">취소</button>
          </div>
        </form>
      </div>
    </div>

    <script>
      const editModal = document.getElementById('editModal');
      const openEditModalBtn = document.getElementById('openEditModal');
      const closeEditModalBtn = document.getElementById('closeEditModal');
      const cancelEditModalBtn = document.getElementById('cancelEditModal');
      const profileImageInput = document.getElementById('profileImageInput');
      const modalProfilePreview = document.getElementById('modalProfilePreview');

      openEditModalBtn.addEventListener('click', () => {
        editModal.classList.remove('hidden');
        document.body.style.overflow = 'hidden'; // 배경 고정
      });

      const closeModal = () => {
        editModal.classList.add('hidden');
        document.body.style.overflow = 'auto'; // 배경 스크롤 복구
      };

      closeEditModalBtn.addEventListener('click', closeModal);
      cancelEditModalBtn.addEventListener('click', closeModal);

      // 모달 바깥 클릭 시 닫기
      editModal.addEventListener('click', (e) => {
        if (e.target === editModal) closeModal();
      });

      // 이미지 미리보기
      profileImageInput.addEventListener('change', function(e) {
        if (e.target.files && e.target.files[0]) {
          const reader = new FileReader();
          reader.onload = function(e) {
            modalProfilePreview.src = e.target.result;
          };
          reader.readAsDataURL(e.target.files[0]);
        }
      });

      // 닉네임 중복 확인
      const checkNicknameBtn = document.getElementById('checkNicknameBtn');
      const modalNickname = document.getElementById('modalNickname');
      const nicknameMsg = document.getElementById('nicknameMsg');
      const currentNickname = modalNickname.value; // 현재 닉네임 저장
      let isNicknameVerified = true; // 처음엔 현재 닉네임이므로 true

      modalNickname.addEventListener('input', () => {
        isNicknameVerified = (modalNickname.value === currentNickname);
        nicknameMsg.classList.add('hidden');
      });

      checkNicknameBtn.addEventListener('click', async () => {
        const nickname = modalNickname.value.trim();
        
        if (!nickname) {
          alert('닉네임을 입력해주세요.');
          return;
        }

        if (nickname === currentNickname) {
          nicknameMsg.textContent = '현재 사용 중인 닉네임입니다.';
          nicknameMsg.className = 'text-xs ml-2 font-medium text-blue-500';
          nicknameMsg.classList.remove('hidden');
          isNicknameVerified = true;
          return;
        }

        try {
          const response = await fetch(`/api/user/check-nickname?nickname=${encodeURIComponent(nickname)}`);
          const isExists = await response.json();

          if (isExists) {
            nicknameMsg.textContent = '이미 사용 중인 닉네임입니다.';
            nicknameMsg.className = 'text-xs ml-2 font-medium text-red-500';
            isNicknameVerified = false;
          } else {
            nicknameMsg.textContent = '사용 가능한 닉네임입니다.';
            nicknameMsg.className = 'text-xs ml-2 font-medium text-green-600';
            isNicknameVerified = true;
          }
          nicknameMsg.classList.remove('hidden');
        } catch (error) {
          console.error('Error checking nickname:', error);
          alert('중복 확인 중 오류가 발생했습니다.');
        }
      });

      // 비밀번호 검증 요소 및 로직 추가
      const passwordInput = document.getElementById('modalPassword');
      const passwordConfirmInput = document.getElementById('modalConfirmPassword');
      const passwordError = document.getElementById('passwordError');
      const passwordMatchMessage = document.getElementById('passwordMatchMessage');

      // 비밀번호 실시간 유효성 검사
      passwordInput.addEventListener('input', () => {
        const password = passwordInput.value;
        if (!password) {
          passwordError.classList.add('hidden');
          passwordMatchMessage.classList.add('hidden');
          return;
        }

        const hasSpecialChar = /[!@#$%^&*(),.?":{}|<>]/.test(password);
        if (password.length < 8 || !hasSpecialChar) {
          passwordError.classList.remove('hidden');
        } else {
          passwordError.classList.add('hidden');
        }

        checkPasswordMatch();
      });

      // 비밀번호 확인 실시간 검사
      passwordConfirmInput.addEventListener('input', checkPasswordMatch);

      function checkPasswordMatch() {
        const password = passwordInput.value;
        const confirm = passwordConfirmInput.value;

        if (!password || !confirm) {
          passwordMatchMessage.classList.add('hidden');
          return;
        }

        if (password === confirm) {
          passwordMatchMessage.textContent = '비밀번호가 일치합니다.';
          passwordMatchMessage.className = 'text-xs ml-2 font-medium text-green-600';
        } else {
          passwordMatchMessage.textContent = '비밀번호가 일치하지 않습니다.';
          passwordMatchMessage.className = 'text-xs ml-2 font-medium text-red-500';
        }
        passwordMatchMessage.classList.remove('hidden');
      }

      // 폼 제출 전 검증
      document.querySelector('#editModal form').addEventListener('submit', (e) => {
        if (!isNicknameVerified) {
          e.preventDefault();
          alert('닉네임 중복 확인을 해주세요.');
          modalNickname.focus();
          return;
        }
        
        const pwd = passwordInput.value;
        const confirmPwd = passwordConfirmInput.value;
        
        if (pwd) {
          const hasSpecialChar = /[!@#$%^&*(),.?":{}|<>]/.test(pwd);
          if (pwd.length < 8 || !hasSpecialChar) {
            e.preventDefault();
            alert('비밀번호는 특수문자 포함 8자 이상이어야 합니다.');
            passwordInput.focus();
            return;
          }
          
          if (pwd !== confirmPwd) {
            e.preventDefault();
            alert('비밀번호가 일치하지 않습니다.');
            passwordConfirmInput.focus();
            return;
          }
        }
      });
    </script>
  </th:block>
</th:block>
</html>
