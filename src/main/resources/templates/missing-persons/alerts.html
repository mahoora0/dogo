<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<th:block th:replace="~{layout/base :: setContent(~{this::content})}">
  <th:block th:fragment="content">
    <section class="missing-alert-hero">
      <div>
        <span class="missing-alert-kicker">안전Dream 실종 경보</span>
        <h1>실시간 실종 경보 확인</h1>
        <p>경찰청 안전Dream 실종 경보를 불러와 최근 발생 정보를 확인하고, 목격 정보가 있다면 바로 제보 글을 작성할 수 있습니다.</p>
      </div>
      <a th:href="@{/missing-persons/new}" class="missing-alert-report-link">실종자 제보</a>
    </section>

    <section class="missing-alert-toolbar" aria-label="실종 경보 조회">
      <label>
        <span>발생일</span>
        <input id="missingAlertDate" type="date">
      </label>
      <label>
        <span>표시 개수</span>
        <select id="missingAlertSize">
          <option value="5">5건</option>
          <option value="10" selected>10건</option>
          <option value="20">20건</option>
        </select>
      </label>
      <button id="missingAlertRefresh" type="button">새로고침</button>
    </section>

    <section class="missing-alert-status" id="missingAlertStatus" role="status">
      실종 경보를 불러오는 중입니다.
    </section>

    <section class="missing-alert-grid" id="missingAlertGrid" aria-live="polite"></section>

    <script th:src="@{/js/missing-alerts.js}"></script>
  </th:block>
</th:block>
</html>
