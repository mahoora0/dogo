<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<th:block th:replace="~{layout/base :: setContent(~{this::content})}">
  <th:block th:fragment="content">
    <section class="mb-8 rounded-2xl border border-slate-200 bg-white px-6 py-8 shadow-sm">
      <div class="flex flex-col gap-5 sm:flex-row sm:items-end sm:justify-between">
        <div>
          <span class="mb-2 inline-block text-sm font-semibold text-slate-500">실종자 제보와 공공데이터 조회</span>
          <h1 class="text-2xl font-bold tracking-tight text-slate-900 sm:text-3xl">실종자 검색</h1>
          <p class="mt-2 text-sm text-slate-500">이름, 발생장소, 국적, 신체 특징, 착의사항으로 등록된 실종자 정보를 검색합니다.</p>
        </div>
        <a th:href="@{/missing-persons/new}"
           class="inline-flex items-center justify-center gap-2 rounded-full bg-slate-900 px-6 py-3 text-sm font-bold text-white shadow-md transition hover:bg-slate-700 hover:shadow-lg active:scale-[0.98]">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
          실종자 제보하기
        </a>
      </div>
    </section>

    <form th:action="@{/missing-persons}" method="get" id="searchForm"
          class="mb-8 rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
      <div class="grid gap-3 lg:grid-cols-12">
        <div class="min-w-0 overflow-hidden rounded-xl border border-slate-200 bg-slate-50 transition focus-within:border-slate-400 focus-within:bg-white lg:col-span-8">
          <input id="keywordInput" name="keyword" th:value="${keyword}" placeholder="이름, 발생장소, 신체 특징, 착의사항으로 검색"
                 class="w-full bg-transparent px-4 py-3.5 text-sm font-medium text-slate-800 outline-none">
        </div>
        <div class="grid grid-cols-2 gap-2 lg:col-span-4">
          <button type="submit"
                  class="rounded-full bg-slate-900 px-6 py-3.5 text-sm font-bold text-white shadow-sm transition hover:bg-slate-700">
            검색
          </button>
          <a th:href="@{/missing-persons}"
             class="flex items-center justify-center rounded-full border border-slate-200 bg-white px-4 py-3.5 text-sm font-bold text-slate-700 transition hover:bg-slate-50">
            초기화
          </a>
        </div>
      </div>

      <div class="mt-4 grid gap-4 border-t border-slate-100 pt-4 md:grid-cols-2">
        <div class="space-y-2">
          <label class="text-xs font-bold uppercase tracking-wider text-slate-400">상태</label>
          <div class="flex flex-nowrap gap-2 overflow-x-auto pb-1">
            <label class="shrink-0 cursor-pointer">
              <input type="radio" name="status" value="" class="peer hidden" th:checked="${status == null || status == ''}">
              <span class="inline-block rounded-full border border-slate-200 bg-white px-3 py-1.5 text-xs font-bold text-slate-600 transition peer-checked:border-slate-900 peer-checked:bg-slate-900 peer-checked:text-white">전체</span>
            </label>
            <label class="shrink-0 cursor-pointer">
              <input type="radio" name="status" value="OPEN" class="peer hidden" th:checked="${status == 'OPEN'}">
              <span class="inline-block rounded-full border border-slate-200 bg-white px-3 py-1.5 text-xs font-bold text-slate-600 transition peer-checked:border-rose-600 peer-checked:bg-rose-600 peer-checked:text-white">실종</span>
            </label>
            <label class="shrink-0 cursor-pointer">
              <input type="radio" name="status" value="CLOSED" class="peer hidden" th:checked="${status == 'CLOSED'}">
              <span class="inline-block rounded-full border border-slate-200 bg-white px-3 py-1.5 text-xs font-bold text-slate-600 transition peer-checked:border-slate-700 peer-checked:bg-slate-700 peer-checked:text-white">귀가</span>
            </label>
          </div>
        </div>
        <div class="space-y-2">
          <label class="text-xs font-bold uppercase tracking-wider text-slate-400">출처</label>
          <div class="flex flex-nowrap gap-2 overflow-x-auto pb-1">
            <label class="shrink-0 cursor-pointer">
              <input type="radio" name="sourceType" value="" class="peer hidden" th:checked="${sourceType == null || sourceType == ''}">
              <span class="inline-block rounded-full border border-slate-200 bg-white px-3 py-1.5 text-xs font-bold text-slate-600 transition peer-checked:border-slate-900 peer-checked:bg-slate-900 peer-checked:text-white">전체</span>
            </label>
            <label class="shrink-0 cursor-pointer">
              <input type="radio" name="sourceType" value="USER" class="peer hidden" th:checked="${sourceType == 'USER'}">
              <span class="inline-block rounded-full border border-slate-200 bg-white px-3 py-1.5 text-xs font-bold text-slate-600 transition peer-checked:border-slate-900 peer-checked:bg-slate-900 peer-checked:text-white">사용자 제보</span>
            </label>
            <label class="shrink-0 cursor-pointer">
              <input type="radio" name="sourceType" value="PUBLIC_API" class="peer hidden" th:checked="${sourceType == 'PUBLIC_API'}">
              <span class="inline-block rounded-full border border-slate-200 bg-white px-3 py-1.5 text-xs font-bold text-slate-600 transition peer-checked:border-slate-900 peer-checked:bg-slate-900 peer-checked:text-white">공공데이터</span>
            </label>
          </div>
        </div>
      </div>
    </form>

    <div class="mb-5 flex items-center justify-between px-1" th:if="${reportPage != null}">
      <h3 class="text-sm font-bold text-slate-600">
        총 <span class="text-slate-900" th:text="${reportPage.totalElements}">0</span>건
      </h3>
      <select onchange="applySort(this.value)"
              class="cursor-pointer rounded-full border border-slate-200 bg-white px-4 py-2 text-xs font-bold text-slate-600 outline-none">
        <option value="occurredAt,desc" th:selected="${sortBy == 'occurredAt' and sortDir == 'desc'}">발생일 최신순</option>
        <option value="occurredAt,asc" th:selected="${sortBy == 'occurredAt' and sortDir == 'asc'}">발생일 오래된순</option>
        <option value="regdate,desc" th:selected="${sortBy == 'regdate' and sortDir == 'desc'}">등록일 최신순</option>
        <option value="regdate,asc" th:selected="${sortBy == 'regdate' and sortDir == 'asc'}">등록일 오래된순</option>
      </select>
    </div>

    <section th:if="${!#lists.isEmpty(reports)}" class="grid gap-5 sm:grid-cols-2 xl:grid-cols-3">
      <a th:each="report : ${reports}" th:href="@{/missing-persons/{id}(id=${report.id})}"
         class="group overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm transition hover:border-slate-300 hover:shadow-md flex flex-col">
        <!-- 실종자 이미지 영역 -->
        <div class="relative h-56 w-full overflow-hidden bg-slate-100 border-b border-slate-100 flex items-center justify-center">
          <img th:src="${report.imageUrls != null and !#lists.isEmpty(report.imageUrls) ? report.imageUrls[0] : (report.base64Image != null ? report.base64Image : '/images/noImageSize.png')}"
               alt="실종자 이미지"
               class="h-full w-full object-cover transition duration-300 group-hover:scale-105" />
        </div>
        <div class="p-5 flex-1 flex flex-col justify-between">
          <div class="flex flex-wrap items-start justify-between gap-2">
            <span th:text="${report.statusLabel}"
                  th:classappend="${report.status == 'CLOSED' ? ' bg-slate-700' : ' bg-rose-500'}"
                  class="rounded-full px-3 py-1 text-xs font-bold text-white shadow-sm">실종</span>
            <span th:text="${report.sourceLabel}"
                  class="rounded-full border border-slate-200 bg-white px-3 py-1 text-xs font-bold text-slate-600 shadow-sm">사용자 제보</span>
          </div>
          <h2 th:text="${report.summary}" class="mt-4 line-clamp-1 text-lg font-bold text-slate-900">13세 Korea 실종</h2>
          <p th:text="${report.occurredPlace}" class="mt-2 line-clamp-1 text-sm font-semibold text-slate-600">Seoul</p>
          <time th:text="${#temporals.format(report.occurredAt, 'yyyy.MM.dd HH:mm')}" class="mt-2 block text-xs font-semibold text-slate-400">2026.05.18 09:30</time>
          <div class="mt-4 flex flex-wrap gap-1.5"
               th:if="${(report.heightCm != null && report.heightCm > 0) || 
                        (report.weightKg != null) || 
                        (report.bodyType != null && report.bodyType != '미상' && report.bodyType != '') || 
                        (report.hairColor != null && report.hairColor != '미상' && report.hairColor != '') || 
                        (report.hairStyle != null && report.hairStyle != '미상' && report.hairStyle != '')}">
            <span th:if="${report.heightCm != null && report.heightCm > 0}" th:text="${report.heightCm + 'cm'}" class="rounded bg-slate-100 px-2 py-0.5 text-xs font-semibold text-slate-600">170cm</span>
            <span th:if="${report.weightKg != null}" th:text="${report.weightKg + 'kg'}" class="rounded bg-slate-100 px-2 py-0.5 text-xs font-semibold text-slate-600">58kg</span>
            <span th:if="${report.bodyType != null && report.bodyType != '미상' && report.bodyType != ''}" th:text="${report.bodyType}" class="rounded bg-slate-100 px-2 py-0.5 text-xs font-semibold text-slate-600">Slim</span>
            <span th:if="${(report.hairColor != null && report.hairColor != '미상' && report.hairColor != '') || (report.hairStyle != null && report.hairStyle != '미상' && report.hairStyle != '')}"
                  th:text="${(report.hairColor != null && report.hairColor != '미상' ? report.hairColor : '') + (report.hairColor != null && report.hairColor != '미상' && report.hairStyle != null && report.hairStyle != '미상' ? ' / ' : '') + (report.hairStyle != null && report.hairStyle != '미상' ? report.hairStyle : '')}"
                  class="rounded bg-slate-100 px-2 py-0.5 text-xs font-semibold text-slate-600">Black / Short</span>
          </div>
          <p th:if="${report.clothing != null && report.clothing != '착의 정보 없음' && report.clothing != '미상' && report.clothing != ''}"
             th:text="${report.clothing}" class="mt-4 line-clamp-2 text-sm leading-6 text-slate-500">Blue hoodie</p>
        </div>
      </a>
    </section>

    <div th:if="${#lists.isEmpty(reports)}"
         class="mt-8 flex flex-col items-center justify-center rounded-3xl border border-slate-200 bg-white/50 px-5 py-24 text-center">
      <p class="text-lg font-bold text-slate-700">검색 결과가 없습니다</p>
      <p class="mt-2 text-sm text-slate-500">다른 검색어로 검색하거나 조건을 초기화해보세요.</p>
    </div>

    <nav th:if="${reportPage != null && reportPage.totalPages > 1}"
         th:with="startPage=${T(java.lang.Math).max(0, T(java.lang.Math).min(page - 4, reportPage.totalPages - 10))}, endPage=${T(java.lang.Math).min(reportPage.totalPages - 1, startPage + 9)}"
         class="mt-12 flex justify-center text-sm">
      <div class="inline-flex items-stretch overflow-hidden rounded-lg border border-slate-200 bg-white shadow-sm divide-x divide-slate-200">

        <!-- 맨 처음 -->
        <a th:classappend="${reportPage.first} ? ' pointer-events-none opacity-40'"
           th:href="@{/missing-persons(keyword=${keyword}, status=${status}, sourceType=${sourceType}, sortBy=${sortBy}, sortDir=${sortDir}, page=0, size=${size})}"
           aria-label="첫 페이지"
           class="flex h-10 w-10 items-center justify-center text-slate-600 transition-colors hover:bg-slate-100 hover:text-slate-900">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M11 19l-7-7 7-7m8 14l-7-7 7-7"/></svg>
        </a>

        <!-- 이전 -->
        <a th:classappend="${reportPage.first} ? ' pointer-events-none opacity-40'"
           th:href="@{/missing-persons(keyword=${keyword}, status=${status}, sourceType=${sourceType}, sortBy=${sortBy}, sortDir=${sortDir}, page=${page - 1}, size=${size})}"
           aria-label="이전 페이지"
           class="flex h-10 w-10 items-center justify-center text-slate-600 transition-colors hover:bg-slate-100 hover:text-slate-900">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
        </a>

        <!-- 번호 윈도우 (현재 페이지 주변 최대 10칸) -->
        <a th:each="i : ${#numbers.sequence(startPage, endPage)}"
           th:href="@{/missing-persons(keyword=${keyword}, status=${status}, sourceType=${sourceType}, sortBy=${sortBy}, sortDir=${sortDir}, page=${i}, size=${size})}"
           th:text="${i + 1}"
           th:classappend="${i == page} ? ' bg-slate-900 text-white font-semibold' : ' text-slate-600 hover:bg-slate-100 hover:text-slate-900'"
           class="flex h-10 w-10 items-center justify-center transition-colors">1</a>

        <!-- 다음 -->
        <a th:classappend="${reportPage.last} ? ' pointer-events-none opacity-40'"
           th:href="@{/missing-persons(keyword=${keyword}, status=${status}, sourceType=${sourceType}, sortBy=${sortBy}, sortDir=${sortDir}, page=${page + 1}, size=${size})}"
           aria-label="다음 페이지"
           class="flex h-10 w-10 items-center justify-center text-slate-600 transition-colors hover:bg-slate-100 hover:text-slate-900">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
        </a>

        <!-- 맨 끝 -->
        <a th:classappend="${reportPage.last} ? ' pointer-events-none opacity-40'"
           th:href="@{/missing-persons(keyword=${keyword}, status=${status}, sourceType=${sourceType}, sortBy=${sortBy}, sortDir=${sortDir}, page=${reportPage.totalPages - 1}, size=${size})}"
           aria-label="마지막 페이지"
           class="flex h-10 w-10 items-center justify-center text-slate-600 transition-colors hover:bg-slate-100 hover:text-slate-900">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 5l7 7-7 7M5 5l7 7-7 7"/></svg>
        </a>
      </div>
    </nav>

    <script>
      function applySort(value) {
        var parts = value.split(',');
        var url = new URL(window.location.href);
        url.searchParams.set('sortBy', parts[0]);
        url.searchParams.set('sortDir', parts[1]);
        url.searchParams.set('page', '0');
        window.location.href = url.toString();
      }
    </script>
  </th:block>
</th:block>
</html>
