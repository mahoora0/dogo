<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<th:block th:replace="~{layout/base :: setContent(~{this::content})}">
  <th:block th:fragment="content">
    <section class="mb-8 rounded-2xl border border-slate-200 bg-white px-6 py-8 shadow-sm">
      <div class="flex flex-col gap-5 sm:flex-row sm:items-end sm:justify-between">
        <div>
          <span class="mb-2 inline-block text-sm font-semibold text-slate-500">실종자 제보와 조회</span>
          <h1 class="text-2xl font-bold tracking-tight text-slate-900 sm:text-3xl">실종자 검색 게시판</h1>
          <p class="mt-2 text-sm text-slate-500">발생장소, 국적, 착의와 신체 특징으로 등록된 실종자 제보를 확인합니다.</p>
        </div>
        <a th:href="@{/missing-persons/new}"
           class="inline-flex items-center justify-center gap-2 rounded-full bg-slate-900 px-6 py-3 text-sm font-bold text-white shadow-md transition hover:bg-slate-700 hover:shadow-lg active:scale-[0.98]">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
          실종자 제보
        </a>
      </div>
    </section>

    <form th:action="@{/missing-persons}" method="get" id="searchForm"
          class="mb-8 rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
      <div class="grid gap-3 lg:grid-cols-12">
        <div class="flex min-w-0 overflow-hidden rounded-xl border border-slate-200 bg-slate-50 transition focus-within:border-slate-400 focus-within:bg-white focus-within:ring-4 focus-within:ring-slate-100 lg:col-span-8">
          <div class="relative min-w-0 flex-1 group">
            <svg xmlns="http://www.w3.org/2000/svg" class="pointer-events-none absolute left-4 top-1/2 h-5 w-5 -translate-y-1/2 text-slate-400 transition-colors group-focus-within:text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M11 19a8 8 0 100-16 8 8 0 000 16z"/></svg>
            <input id="keywordInput" name="keyword" th:value="${keyword}" placeholder="국적, 발생장소, 체격, 착의의상으로 검색하세요"
                   class="w-full bg-transparent py-3.5 pl-11 pr-4 text-sm font-medium text-slate-800 outline-none">
          </div>
        </div>

        <div class="grid grid-cols-2 gap-2 lg:col-span-4">
          <button type="submit"
                  class="flex items-center justify-center gap-2 rounded-full bg-slate-900 px-6 py-3.5 text-sm font-bold text-white shadow-sm transition hover:bg-slate-700 active:scale-[0.98]">
            검색하기
          </button>
          <a th:href="@{/missing-persons}"
             class="flex items-center justify-center gap-2 rounded-full border border-slate-200 bg-white px-4 py-3.5 text-sm font-bold text-slate-700 transition hover:bg-slate-50">
            초기화
          </a>
        </div>
      </div>

      <div class="mt-4 border-t border-slate-100 pt-4">
        <div class="space-y-2">
          <label class="text-xs font-bold uppercase tracking-wider text-slate-400">상태</label>
          <div class="flex flex-nowrap gap-2 overflow-x-auto pb-1">
            <label class="shrink-0 cursor-pointer">
              <input type="radio" name="status" value="" class="peer hidden" th:checked="${status == null || status == ''}">
              <span class="inline-block whitespace-nowrap rounded-full border border-slate-200 bg-white px-3 py-1.5 text-xs font-bold text-slate-600 transition peer-checked:border-slate-900 peer-checked:bg-slate-900 peer-checked:text-white hover:bg-slate-50">전체</span>
            </label>
            <label class="shrink-0 cursor-pointer">
              <input type="radio" name="status" value="OPEN" class="peer hidden" th:checked="${status == 'OPEN'}">
              <span class="inline-block whitespace-nowrap rounded-full border border-slate-200 bg-white px-3 py-1.5 text-xs font-bold text-slate-600 transition peer-checked:border-rose-600 peer-checked:bg-rose-600 peer-checked:text-white hover:bg-slate-50">접수</span>
            </label>
            <label class="shrink-0 cursor-pointer">
              <input type="radio" name="status" value="FOUND" class="peer hidden" th:checked="${status == 'FOUND'}">
              <span class="inline-block whitespace-nowrap rounded-full border border-slate-200 bg-white px-3 py-1.5 text-xs font-bold text-slate-600 transition peer-checked:border-emerald-600 peer-checked:bg-emerald-600 peer-checked:text-white hover:bg-slate-50">발견</span>
            </label>
            <label class="shrink-0 cursor-pointer">
              <input type="radio" name="status" value="CLOSED" class="peer hidden" th:checked="${status == 'CLOSED'}">
              <span class="inline-block whitespace-nowrap rounded-full border border-slate-200 bg-white px-3 py-1.5 text-xs font-bold text-slate-600 transition peer-checked:border-slate-700 peer-checked:bg-slate-700 peer-checked:text-white hover:bg-slate-50">종료</span>
            </label>
          </div>
        </div>
      </div>
      <div class="mt-4 border-t border-slate-100 pt-4">
        <div class="space-y-2">
          <label class="text-xs font-bold uppercase tracking-wider text-slate-400">Source</label>
          <div class="flex flex-nowrap gap-2 overflow-x-auto pb-1">
            <label class="shrink-0 cursor-pointer">
              <input type="radio" name="sourceType" value="" class="peer hidden" th:checked="${sourceType == null || sourceType == ''}">
              <span class="inline-block whitespace-nowrap rounded-full border border-slate-200 bg-white px-3 py-1.5 text-xs font-bold text-slate-600 transition peer-checked:border-slate-900 peer-checked:bg-slate-900 peer-checked:text-white hover:bg-slate-50">All</span>
            </label>
            <label class="shrink-0 cursor-pointer">
              <input type="radio" name="sourceType" value="USER" class="peer hidden" th:checked="${sourceType == 'USER'}">
              <span class="inline-block whitespace-nowrap rounded-full border border-slate-200 bg-white px-3 py-1.5 text-xs font-bold text-slate-600 transition peer-checked:border-slate-900 peer-checked:bg-slate-900 peer-checked:text-white hover:bg-slate-50">사용자 제보</span>
            </label>
            <label class="shrink-0 cursor-pointer">
              <input type="radio" name="sourceType" value="PUBLIC_API" class="peer hidden" th:checked="${sourceType == 'PUBLIC_API'}">
              <span class="inline-block whitespace-nowrap rounded-full border border-slate-200 bg-white px-3 py-1.5 text-xs font-bold text-slate-600 transition peer-checked:border-slate-900 peer-checked:bg-slate-900 peer-checked:text-white hover:bg-slate-50">공공데이터</span>
            </label>
          </div>
        </div>
      </div>
    </form>

    <div class="mb-5 flex items-center justify-between px-1" th:if="${reportPage != null}">
      <div class="flex items-center gap-2">
        <span class="h-2 w-2 rounded-full bg-rose-500"></span>
        <h3 class="text-sm font-bold text-slate-600">
          총 <span class="text-slate-900" th:text="${reportPage.totalElements}">0</span>건의 제보
        </h3>
      </div>
      <select onchange="applySort(this.value)"
              class="cursor-pointer rounded-full border border-slate-200 bg-white px-4 py-2 text-xs font-bold text-slate-600 outline-none transition hover:border-slate-300 focus:border-slate-400">
        <option value="regdate,desc" th:selected="${sortBy == 'regdate' and sortDir == 'desc'}">등록일 최신순</option>
        <option value="regdate,asc" th:selected="${sortBy == 'regdate' and sortDir == 'asc'}">등록일 오래된순</option>
        <option value="occurredAt,desc" th:selected="${sortBy == 'occurredAt' and sortDir == 'desc'}">발생일 최신순</option>
        <option value="occurredAt,asc" th:selected="${sortBy == 'occurredAt' and sortDir == 'asc'}">발생일 오래된순</option>
      </select>
    </div>

    <section th:if="${!#lists.isEmpty(reports)}" class="grid gap-5 sm:grid-cols-2 xl:grid-cols-3">
      <a th:each="report : ${reports}" th:href="@{/missing-persons/{id}(id=${report.id})}"
         class="group overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm transition hover:border-slate-300 hover:shadow-md">
        <div class="p-5">
          <div class="flex items-start justify-between gap-3">
            <span th:text="${report.statusLabel}"
                  th:classappend="${report.status == 'FOUND' ? ' bg-emerald-600' : (report.status == 'CLOSED' ? ' bg-slate-700' : ' bg-rose-500')}"
                  class="rounded-full px-3 py-1 text-xs font-bold text-white shadow-sm">접수</span>
            <span th:text="${report.sourceLabel}"
                  class="rounded-full border border-slate-200 bg-white px-3 py-1 text-xs font-bold text-slate-600 shadow-sm">사용자 제보</span>
            <time th:text="${#temporals.format(report.occurredAt, 'yyyy.MM.dd HH:mm')}" class="text-xs font-semibold text-slate-400">2026.05.18 09:30</time>
          </div>
          <h2 th:text="${report.summary}" class="mt-4 line-clamp-1 text-lg font-bold text-slate-900">13세 대한민국 실종자</h2>
          <p th:text="${report.occurredPlace}" class="mt-2 line-clamp-1 text-sm font-semibold text-slate-600">서울 강남역</p>
          <div class="mt-4 flex flex-wrap gap-1.5">
            <span th:text="${report.heightCm != null ? report.heightCm + 'cm' : '키 미상'}" class="rounded bg-slate-100 px-2 py-0.5 text-xs font-semibold text-slate-600">170cm</span>
            <span th:text="${report.weightKg != null ? report.weightKg + 'kg' : '몸무게 미상'}" class="rounded bg-slate-100 px-2 py-0.5 text-xs font-semibold text-slate-600">58kg</span>
            <span th:text="${report.bodyType}" class="rounded bg-slate-100 px-2 py-0.5 text-xs font-semibold text-slate-600">마른 체형</span>
            <span th:text="${report.hairColor + ' / ' + report.hairStyle}" class="rounded bg-slate-100 px-2 py-0.5 text-xs font-semibold text-slate-600">검정 / 짧은 머리</span>
          </div>
          <p th:text="${report.clothing}" class="mt-4 line-clamp-2 text-sm leading-6 text-slate-500">흰색 후드티</p>
        </div>
      </a>
    </section>

    <div th:if="${#lists.isEmpty(reports)}"
         class="mt-8 flex flex-col items-center justify-center rounded-3xl border border-slate-200 bg-white/50 px-5 py-24 text-center backdrop-blur-sm">
      <div class="mb-5 flex h-20 w-20 items-center justify-center rounded-full bg-slate-100 text-slate-300">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      </div>
      <p class="text-lg font-bold text-slate-700">검색 결과가 없습니다</p>
      <p class="mt-2 text-sm text-slate-500">다른 검색어로 검색하거나 조건을 초기화해보세요.</p>
    </div>

    <nav th:if="${reportPage != null && reportPage.totalPages > 1}" class="mt-12 flex items-center justify-center gap-3 text-sm">
      <a th:classappend="${reportPage.first} ? ' pointer-events-none opacity-40'"
         th:href="@{/missing-persons(keyword=${keyword}, status=${status}, sourceType=${sourceType}, sortBy=${sortBy}, sortDir=${sortDir}, page=${page - 1}, size=${size})}"
         class="flex h-10 w-10 items-center justify-center rounded-full border border-slate-200 bg-white text-slate-600 shadow-sm transition-all hover:bg-slate-100 hover:text-slate-900 hover:border-slate-300 active:scale-95">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
      </a>
      <div class="flex items-center gap-1 rounded-full bg-white px-4 py-2 shadow-sm border border-slate-100 font-semibold">
        <span th:text="${page + 1}" class="text-slate-900">1</span>
        <span class="text-slate-300 mx-1">/</span>
        <span th:text="${reportPage.totalPages}" class="text-slate-500">1</span>
      </div>
      <a th:classappend="${reportPage.last} ? ' pointer-events-none opacity-40'"
         th:href="@{/missing-persons(keyword=${keyword}, status=${status}, sourceType=${sourceType}, sortBy=${sortBy}, sortDir=${sortDir}, page=${page + 1}, size=${size})}"
         class="flex h-10 w-10 items-center justify-center rounded-full border border-slate-200 bg-white text-slate-600 shadow-sm transition-all hover:bg-slate-100 hover:text-slate-900 hover:border-slate-300 active:scale-95">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
      </a>
    </nav>

    <script>
      function applySort(value) {
        var parts = value.split(',');
        var url = new URL(window.location.href);
        url.searchParams.set('sortBy', parts[0]);
        url.searchParams.set('sortDir', parts[1]);
        url.searchParams.set('page', '0');
        window.location.href = url.toString();
      }
    </script>
  </th:block>
</th:block>
</html>
