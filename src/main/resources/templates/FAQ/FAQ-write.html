<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: setContent(~{::content})}">
<th:block th:fragment="content">

    <div class="faq-container max-w-4xl mx-auto">
        
        <div class="mb-8">
            <h2 class="text-3xl font-extrabold text-slate-900 mb-3">FAQ 등록</h2>
            <p class="text-slate-500 text-lg">새로운 자주 묻는 질문(FAQ)을 등록합니다.</p>
        </div>

        <div class="bg-white rounded-lg border border-slate-200 shadow-sm p-6 sm:p-8">
            <form action="/admin/faq" method="post" class="space-y-6">
                
                <div>
                    <label for="category" class="block text-sm font-medium text-slate-700 mb-2">카테고리</label>
                    <select id="category" name="category" required class="w-full bg-white border border-slate-300 rounded-lg px-4 py-3 text-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition duration-200">
                        <option value="분실물 신고">분실물 신고</option>
                        <option value="습득물 등록">습득물 등록</option>
                        <option value="이용 안내">이용 안내</option>
                        <option value="기타">기타</option>
                    </select>
                </div>

                <div>
                    <label for="question" class="block text-sm font-medium text-slate-700 mb-2">질문 (Q)</label>
                    <input type="text" id="question" name="question" required placeholder="질문을 입력하세요." class="w-full bg-white border border-slate-300 rounded-lg px-4 py-3 text-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition duration-200">
                </div>

                <div>
                    <label for="answer" class="block text-sm font-medium text-slate-700 mb-2">답변 (A)</label>
                    <textarea id="answer" name="answer" required rows="6" placeholder="답변을 입력하세요." class="w-full bg-white border border-slate-300 rounded-lg px-4 py-3 text-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition duration-200"></textarea>
                </div>

                <div class="flex justify-end gap-3 pt-4 border-t border-slate-100">
                    <a href="/faq" class="px-6 py-3 bg-white text-slate-600 font-medium rounded-lg border border-slate-300 hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-500 transition-colors">취소</a>
                    <button type="submit" class="px-6 py-3 bg-indigo-600 text-white font-medium rounded-lg hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors shadow-sm">등록하기</button>
                </div>
            </form>
        </div>

    </div>

</th:block>
</html>
