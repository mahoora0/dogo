<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dogo Admin - 회원 관리</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div class="flex h-screen overflow-hidden relative">
        <!-- Mobile Sidebar Backdrop overlay -->
        <div id="sidebarBackdrop" class="fixed inset-0 bg-slate-900/50 z-30 hidden transition-opacity duration-300 opacity-0"></div>

        <!-- Sidebar -->
        <aside id="adminSidebar" class="w-64 bg-white border-r border-slate-200 fixed inset-y-0 left-0 z-40 transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out md:static flex flex-col">
            <div class="p-6 flex items-center justify-between">
                <a href="/" class="flex items-center gap-2 font-bold text-2xl text-blue-600">
                    <i data-lucide="package-search"></i>
                    <span>Dogo Admin</span>
                </a>
                <!-- Close menu button for mobile only -->
                <button id="closeSidebarBtn" class="md:hidden text-slate-500 hover:text-slate-700 p-2 focus:outline-none">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <nav class="flex-1 px-4 space-y-1">
                <a href="/admin" class="flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-50 rounded-xl transition-colors">
                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                    대시보드
                </a>
                <a href="/admin/users" class="flex items-center gap-3 px-4 py-3 bg-blue-50 text-blue-700 rounded-xl font-medium">
                    <i data-lucide="users" class="w-5 h-5"></i>
                    회원 관리
                </a>
                <a href="/admin/lost-items" class="flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-50 rounded-xl transition-colors">
                    <i data-lucide="file-text" class="w-5 h-5"></i>
                    분실물 관리
                </a>
                <a href="/admin/found-items" class="flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-50 rounded-xl transition-colors">
                    <i data-lucide="package" class="w-5 h-5"></i>
                    습득물 관리
                </a>
                <a href="/admin/animals" class="flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-50 rounded-xl transition-colors">
                    <i data-lucide="dog" class="w-5 h-5"></i>
                    실종동물 관리
                </a>
                <a href="/admin/missing-persons" class="flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-50 rounded-xl transition-colors">
                    <i data-lucide="user-round-search" class="w-5 h-5"></i>
                    실종자 관리
                </a>
                <a href="/admin/inquiries" class="flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-50 rounded-xl transition-colors">
                    <i data-lucide="message-square" class="w-5 h-5"></i>
                    1:1 문의
                </a>
                <a href="/admin/notice" class="flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-50 rounded-xl transition-colors">
                    <i data-lucide="message-square" class="w-5 h-5"></i>
                    공지사항 관리
                </a>
                <a href="/admin/faq" class="flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-50 rounded-xl transition-colors">
                    <i data-lucide="message-square" class="w-5 h-5"></i>
                    FAQ 관리
                </a>
            </nav>
            <div class="p-4 border-t border-slate-100">
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="flex items-center gap-3 w-full px-4 py-3 text-red-500 hover:bg-red-50 rounded-xl transition-colors font-medium">
                        <i data-lucide="log-out" class="w-5 h-5"></i>
                        로그아웃
                    </button>
                </form>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto">
            <!-- Top Header -->
            <header class="h-16 bg-white/80 backdrop-blur-md border-b border-slate-200 flex items-center justify-between px-8 sticky top-0 z-10">
                <div class="flex items-center gap-2">
                    <button type="button" id="mobileMenuBtn" class="md:hidden text-slate-500 hover:text-slate-700 focus:outline-none p-1 rounded-lg hover:bg-slate-100 transition-colors">
                        <i data-lucide="menu" class="w-6 h-6"></i>
                    </button>
                    <h1 class="text-xl font-semibold">회원 관리</h1>
                </div>
                <div class="flex items-center gap-4">
                    <div class="flex items-center gap-3 pl-4 border-l border-slate-200">
                        <div class="w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 font-bold">
                            A
                        </div>
                        <span class="font-medium text-sm">관리자님</span>
                    </div>
                </div>
            </header>

            <div class="p-8">
                <!-- Page Table Card -->
                <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
                    <div class="p-6 border-b border-slate-100 flex items-center justify-between">
                        <h2 class="text-lg font-bold">전체 가입 회원 목록</h2>
                        <span class="text-xs font-bold bg-blue-50 text-blue-600 px-3 py-1.5 rounded-full" th:text="'총 ' + ${#lists.size(users)} + '명'">총 0명</span>
                    </div>
                    
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="bg-slate-50 text-slate-500 text-sm uppercase font-semibold">
                                <tr>
                                    <th class="px-6 py-4">No.</th>
                                    <th class="px-6 py-4">프로필</th>
                                    <th class="px-6 py-4">로그인 ID</th>
                                    <th class="px-6 py-4">닉네임</th>
                                    <th class="px-6 py-4">이메일</th>
                                    <th class="px-6 py-4">전화번호</th>
                                    <th class="px-6 py-4">가입일</th>
                                    <th class="px-6 py-4">권한 변경</th>
                                    <th class="px-6 py-4">상태 관리</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-slate-100">
                                <tr th:each="user : ${users}" class="hover:bg-slate-50 transition-colors">
                                    <!-- No -->
                                    <td class="px-6 py-4 font-bold text-slate-400" th:text="${user.userNo}">#</td>
                                    
                                    <!-- Profile Avatar -->
                                    <td class="px-6 py-4 whitespace-nowrap">
                                        <div class="flex items-center gap-3">
                                            <img th:if="${user.profileImageUrl != null and !#strings.isEmpty(user.profileImageUrl)}" 
                                                 th:src="${user.profileImageUrl}" 
                                                 class="w-10 h-10 rounded-full object-cover border border-slate-200" 
                                                 alt="프로필"/>
                                            <div th:unless="${user.profileImageUrl != null and !#strings.isEmpty(user.profileImageUrl)}" 
                                                 class="w-10 h-10 rounded-full bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center text-white font-bold text-sm shadow-sm"
                                                 th:text="${#strings.substring(user.nickname, 0, 1)}">
                                                U
                                            </div>
                                        </div>
                                    </td>
                                    
                                    <!-- Login ID -->
                                    <td class="px-6 py-4 font-semibold text-slate-900 text-sm whitespace-nowrap" th:text="${user.loginId != null ? user.loginId : '(소셜 회원)'}">loginId</td>
                                    
                                    <!-- Nickname -->
                                    <td class="px-6 py-4 text-slate-700 text-sm font-medium whitespace-nowrap" th:text="${user.nickname}">닉네임</td>
                                    
                                    <!-- Email -->
                                    <td class="px-6 py-4 text-slate-600 text-sm whitespace-nowrap" th:text="${user.email}">이메일</td>
                                    
                                    <!-- Phone -->
                                    <td class="px-6 py-4 text-slate-600 text-sm whitespace-nowrap" th:text="${user.phone != null ? user.phone : '-'}">전화번호</td>
                                    
                                    <!-- RegDate -->
                                    <td class="px-6 py-4 text-slate-500 text-sm whitespace-nowrap" th:text="${#temporals.format(user.regDate, 'yyyy-MM-dd HH:mm')}">날짜</td>
                                    
                                    <!-- Role Update Form -->
                                    <td class="px-6 py-4 whitespace-nowrap">
                                        <form th:action="@{/admin/users/{id}/role(id=${user.userNo})}" method="post">
                                            <select name="role" onchange="this.form.submit()" 
                                                    th:class="${user.role == 'ADMIN' ? 'bg-amber-50 text-amber-700 border-amber-200' : 'bg-slate-50 text-slate-700 border-slate-200'} + ' text-xs font-bold rounded-lg border px-2 py-1.5 focus:outline-none focus:ring-2 focus:ring-blue-500'">
                                                <option value="USER" th:selected="${user.role == 'USER'}">일반 사용자</option>
                                                <option value="ADMIN" th:selected="${user.role == 'ADMIN'}">시스템 관리자</option>
                                            </select>
                                        </form>
                                    </td>
                                    
                                    <!-- Status Update Form -->
                                    <td class="px-6 py-4 whitespace-nowrap">
                                        <form th:action="@{/admin/users/{id}/status(id=${user.userNo})}" method="post">
                                            <select name="status" onchange="this.form.submit()" 
                                                    th:class="${user.status == 'ACTIVE' ? 'bg-emerald-50 text-emerald-700 border-emerald-200' : (user.status == 'BANNED' ? 'bg-rose-50 text-rose-700 border-rose-200' : 'bg-gray-100 text-gray-600 border-gray-200')} + ' text-xs font-bold rounded-lg border px-2 py-1.5 focus:outline-none focus:ring-2 focus:ring-blue-500'">
                                                <option value="ACTIVE" th:selected="${user.status == 'ACTIVE'}">정상 활동</option>
                                                <option value="BANNED" th:selected="${user.status == 'BANNED'}">이용 정지</option>
                                                <option value="WITHDRAWN" th:selected="${user.status == 'WITHDRAWN'}">회원 탈퇴</option>
                                            </select>
                                        </form>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(users)}">
                                    <td colspan="9" class="text-center py-10 text-slate-400">가입된 회원이 없습니다.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        lucide.createIcons();

        // Responsive Mobile Sidebar Toggle Logic
        const mobileMenuBtn = document.getElementById('mobileMenuBtn');
        const closeSidebarBtn = document.getElementById('closeSidebarBtn');
        const adminSidebar = document.getElementById('adminSidebar');
        const sidebarBackdrop = document.getElementById('sidebarBackdrop');

        function openSidebar() {
            adminSidebar.classList.remove('-translate-x-full');
            sidebarBackdrop.classList.remove('hidden');
            setTimeout(() => {
                sidebarBackdrop.classList.remove('opacity-0');
                sidebarBackdrop.classList.add('opacity-100');
            }, 50);
        }

        function closeSidebar() {
            adminSidebar.classList.add('-translate-x-full');
            sidebarBackdrop.classList.remove('opacity-100');
            sidebarBackdrop.classList.add('opacity-0');
            setTimeout(() => {
                sidebarBackdrop.classList.add('hidden');
            }, 300);
        }

        if (mobileMenuBtn) {
            mobileMenuBtn.addEventListener('click', openSidebar);
        }

        if (closeSidebarBtn) {
            closeSidebarBtn.addEventListener('click', closeSidebar);
        }

        if (sidebarBackdrop) {
            sidebarBackdrop.addEventListener('click', closeSidebar);
        }
    </script>
</body>
</html>
