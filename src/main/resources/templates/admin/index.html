<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dogo Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-64 bg-white border-r border-slate-200 hidden md:flex flex-col">
            <div class="p-6">
                <a href="/" class="flex items-center gap-2 font-bold text-2xl text-blue-600">
                    <i data-lucide="package-search"></i>
                    <span>Dogo Admin</span>
                </a>
            </div>
            <nav class="flex-1 px-4 space-y-1">
                <a href="/admin" class="flex items-center gap-3 px-4 py-3 bg-blue-50 text-blue-700 rounded-xl font-medium">
                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                    대시보드
                </a>
                <a href="#" class="flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-50 rounded-xl transition-colors">
                    <i data-lucide="users" class="w-5 h-5"></i>
                    회원 관리
                </a>
                <a href="#" class="flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-50 rounded-xl transition-colors">
                    <i data-lucide="file-text" class="w-5 h-5"></i>
                    분실물 관리
                </a>
                <a href="#" class="flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-50 rounded-xl transition-colors">
                    <i data-lucide="package" class="w-5 h-5"></i>
                    습득물 관리
                </a>
                <a href="/admin/inquiries" class="flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-50 rounded-xl transition-colors">
                    <i data-lucide="message-square" class="w-5 h-5"></i>
                    1:1 문의
                </a>
            </nav>
            <div class="p-4 border-t border-slate-100">
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="flex items-center gap-3 w-full px-4 py-3 text-red-500 hover:bg-red-50 rounded-xl transition-colors font-medium">
                        <i data-lucide="log-out" class="w-5 h-5"></i>
                        로그아웃
                    </button>
                </form>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto">
            <!-- Top Header -->
            <header class="h-16 bg-white/80 backdrop-blur-md border-b border-slate-200 flex items-center justify-between px-8 sticky top-0 z-10">
                <h1 class="text-xl font-semibold">대시보드 개요</h1>
                <div class="flex items-center gap-4">
                    <button class="p-2 text-slate-500 hover:bg-slate-100 rounded-full transition-colors relative">
                        <i data-lucide="bell" class="w-5 h-5"></i>
                        <span class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full"></span>
                    </button>
                    <div class="flex items-center gap-3 pl-4 border-l border-slate-200">
                        <div class="w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 font-bold">
                            A
                        </div>
                        <span class="font-medium text-sm">관리자님</span>
                    </div>
                </div>
            </header>

            <div class="p-8 space-y-8">
                <!-- Stats Cards -->
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                    <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm hover:shadow-md transition-shadow">
                        <div class="flex items-center justify-between mb-4">
                            <div class="p-2 bg-blue-50 text-blue-600 rounded-lg">
                                <i data-lucide="users" class="w-6 h-6"></i>
                            </div>
                            <span class="text-xs font-semibold text-green-500 bg-green-50 px-2 py-1 rounded-full">+12%</span>
                        </div>
                        <h3 class="text-slate-500 text-sm font-medium">총 회원 수</h3>
                        <p class="text-2xl font-bold mt-1" th:text="${totalUsers}">0</p>
                    </div>
                    <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm hover:shadow-md transition-shadow">
                        <div class="flex items-center justify-between mb-4">
                            <div class="p-2 bg-red-50 text-red-600 rounded-lg">
                                <i data-lucide="search" class="w-6 h-6"></i>
                            </div>
                        </div>
                        <h3 class="text-slate-500 text-sm font-medium">분실물 제보</h3>
                        <p class="text-2xl font-bold mt-1" th:text="${lostItems}">0</p>
                    </div>
                    <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm hover:shadow-md transition-shadow">
                        <div class="flex items-center justify-between mb-4">
                            <div class="p-2 bg-emerald-50 text-emerald-600 rounded-lg">
                                <i data-lucide="package" class="w-6 h-6"></i>
                            </div>
                        </div>
                        <h3 class="text-slate-500 text-sm font-medium">습득물 제보</h3>
                        <p class="text-2xl font-bold mt-1" th:text="${foundItems}">0</p>
                    </div>
                    <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm hover:shadow-md transition-shadow">
                        <div class="flex items-center justify-between mb-4">
                            <div class="p-2 bg-amber-50 text-amber-600 rounded-lg">
                                <i data-lucide="check-circle" class="w-6 h-6"></i>
                            </div>
                            <span class="text-xs font-semibold text-blue-500 bg-blue-50 px-2 py-1 rounded-full">성공률 25%</span>
                        </div>
                        <h3 class="text-slate-500 text-sm font-medium">매칭 성공</h3>
                        <p class="text-2xl font-bold mt-1" th:text="${matchSuccess}">0</p>
                    </div>
                </div>

                <!-- Recent Activity Table -->
                <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
                    <div class="p-6 border-b border-slate-100 flex items-center justify-between">
                        <h2 class="text-lg font-bold">최근 등록된 물품</h2>
                        <button class="text-sm text-blue-600 font-medium hover:underline">전체 보기</button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="bg-slate-50 text-slate-500 text-sm uppercase font-semibold">
                                <tr>
                                    <th class="px-6 py-4">유형</th>
                                    <th class="px-6 py-4">물품명</th>
                                    <th class="px-6 py-4">위치</th>
                                    <th class="px-6 py-4">등록일</th>
                                    <th class="px-6 py-4">상태</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-slate-100">
                                <tr th:each="activity : ${activities}" class="hover:bg-slate-50 transition-colors">
                                    <td class="px-6 py-4">
                                        <span th:class="${activity.type == '분실' ? 'text-red-600 bg-red-50' : (activity.type == '습득' ? 'text-emerald-600 bg-emerald-50' : 'text-blue-600 bg-blue-50')} + ' px-2 py-1 rounded-lg text-xs font-bold'" th:text="${activity.type}">유형</span>
                                    </td>
                                    <td class="px-6 py-4 font-medium" th:text="${activity.item}">아이템</td>
                                    <td class="px-6 py-4 text-slate-600 text-sm" th:text="${activity.location}">위치</td>
                                    <td class="px-6 py-4 text-slate-500 text-sm" th:text="${activity.date}">날짜</td>
                                    <td class="px-6 py-4">
                                        <span class="flex items-center gap-1.5 text-xs font-medium text-slate-600">
                                            <span class="w-1.5 h-1.5 bg-slate-400 rounded-full"></span>
                                            처리중
                                        </span>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
