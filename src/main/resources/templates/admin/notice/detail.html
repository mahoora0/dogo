<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/admin_base :: setAdminContent(~{::content}, 'notice')}" th:with="title='공지사항 관리'">
<th:block th:fragment="content">

    <div class="notice-detail-container max-w-4xl mx-auto">
        
        <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-6 sm:p-8">
            
            <!-- 상단 영역: 제목 및 카테고리 -->
            <div class="flex flex-row sm:items-center justify-between gap-3 pb-4 border-b border-slate-100">
                <h2 class="text-2xl sm:text-3xl font-extrabold text-slate-900 break-words flex-grow" th:text="${notice.title}">
                    공지사항 제목
                </h2>
                <div>
                    <span th:text="${notice.category}"
                          th:classappend="${notice.category == '시스템점검' ? 'bg-amber-50 text-amber-700 border-amber-200' : (notice.category == '시스템공지' ? 'bg-indigo-50 text-indigo-700 border-indigo-200' : 'bg-slate-50 text-slate-700 border-slate-200')}"
                          class="inline-block px-3 py-1 rounded-full text-xs font-semibold border whitespace-nowrap">
                        시스템공지
                    </span>
                </div>
            </div>

            <!-- 정보 영역: 작성자 및 조회수 -->
            <div class="flex items-center gap-4 pt-3 pb-6 text-sm text-slate-500 font-medium">
                <div>
                    <span class="text-slate-400 font-normal">작성자</span> 
                    <strong class="text-slate-700 font-semibold ml-1" th:text="${notice.writer}">관리자</strong>
                </div>
                <div class="w-px h-3 bg-slate-200"></div>
                <div>
                    <span class="text-slate-400 font-normal">조회수</span> 
                    <strong class="text-slate-700 font-semibold ml-1" th:text="${notice.viewCount}">15</strong>
                </div>
            </div>

            <!-- 본문 내용 영역 -->
            <div class="py-6 border-t border-slate-100 min-h-[200px]">
                <div class="text-slate-700 leading-relaxed whitespace-pre-line text-base" th:text="${notice.content}">
                    공지사항 본문 내용이 이곳에 출력됩니다.
                </div>
            </div>

            <!-- 하단 버튼 영역 -->
            <div class="mt-8 pt-4 border-t border-slate-100 flex items-center justify-between">
                
                <!-- 왼쪽: 돌아가기 버튼 -->
                <div>
                    <a th:href="@{/admin/notice}" class="inline-flex items-center justify-center px-5 py-2.5 rounded-lg border border-slate-300 bg-white text-slate-700 hover:bg-slate-50 font-semibold text-sm transition-colors">
                        돌아가기
                    </a>
                </div>

                <!-- 오른쪽: 관리자용 수정/삭제 버튼 -->
                <div class="flex items-center gap-2">
                    <!-- 수정 버튼 -->
                    <a th:href="@{/admin/notice/{id}/edit(id=${notice.id})}"
                       class="inline-flex items-center justify-center px-4 py-2.5 rounded-lg bg-indigo-50 text-indigo-700 hover:bg-indigo-100 font-semibold text-sm transition-colors border border-indigo-200">
                        수정
                    </a>
                    <!-- 삭제 버튼 (Form submit 방식) -->
                    <form th:action="@{/admin/notice/{id}/delete(id=${notice.id})}" method="post" data-confirm="이 공지사항을 삭제하시겠습니까?">
                        <button type="submit" class="inline-flex items-center justify-center px-4 py-2.5 rounded-lg bg-red-50 text-red-600 hover:bg-red-100 font-semibold text-sm transition-colors border border-red-200">
                            삭제
                        </button>
                    </form>
                </div>

            </div>

        </div>

    </div>

</th:block>
</html>
