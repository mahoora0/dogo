<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dogo Admin - 신고 관리</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin-style.css}">
</head>
<body class="bg-slate-50 text-slate-900">
    <div class="flex h-screen overflow-hidden relative">
        <!-- Mobile Sidebar Backdrop overlay -->
        <div id="sidebarBackdrop" class="fixed inset-0 bg-slate-900/50 z-30 hidden transition-opacity duration-300 opacity-0"></div>

        <!-- Sidebar -->
        <aside id="adminSidebar" class="w-64 bg-white border-r border-slate-200 fixed inset-y-0 left-0 z-40 transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out md:static flex flex-col">
            <div class="p-6 flex items-center justify-between">
                <a href="/" class="flex items-center gap-2 font-bold text-2xl text-blue-600">
                    <i data-lucide="package-search"></i>
                    <span>Dogo Admin</span>
                </a>
                <!-- Close menu button for mobile only -->
                <button id="closeSidebarBtn" class="md:hidden text-slate-500 hover:text-slate-700 p-2 focus:outline-none">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <nav class="flex-1 px-4 space-y-1">
                <a href="/admin" class="flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-50 rounded-xl transition-colors">
                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                    대시보드
                </a>
                <a href="/admin/users" class="flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-50 rounded-xl transition-colors">
                    <i data-lucide="users" class="w-5 h-5"></i>
                    회원 관리
                </a>
                <a href="/admin/lost-items" class="flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-50 rounded-xl transition-colors">
                    <i data-lucide="file-text" class="w-5 h-5"></i>
                    분실물 관리
                </a>
                <a href="/admin/found-items" class="flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-50 rounded-xl transition-colors">
                    <i data-lucide="package" class="w-5 h-5"></i>
                    습득물 관리
                </a>
                <a href="/admin/missing-persons" class="flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-50 rounded-xl transition-colors">
                    <i data-lucide="user-round-search" class="w-5 h-5"></i>
                    실종자 관리
                </a>
                <a href="/admin/animals" class="flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-50 rounded-xl transition-colors">
                    <i data-lucide="dog" class="w-5 h-5"></i>
                    실종동물 관리
                </a>
                <a href="/admin/inquiries" class="flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-50 rounded-xl transition-colors">
                    <svg viewBox="0 0 24 24" style="width: 25px; height: 25px; flex-shrink: 0;" fill="currentColor">
                        <path d="M4 4h16v12H7l-3 4V4Zm2 2v8h10v-2H8v-2h8V8H8V6H6Z"/>
                    </svg>
                    1:1 문의
                </a>
                <a href="/admin/reports" class="flex items-center gap-3 px-4 py-3 bg-blue-50 text-blue-700 rounded-xl font-medium">
                    <i data-lucide="shield-alert" class="w-5 h-5"></i>
                    신고 관리
                </a>
                <a href="/admin/notice" class="flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-50 rounded-xl transition-colors">
                    <svg viewBox="0 0 24 24" style="width: 25px; height: 25px; flex-shrink: 0;" fill="currentColor">
                        <path d="M4 10v4h3l5 4V6l-5 4H4Zm11.5 2a3.5 3.5 0 0 0-1.5-2.9v5.8a3.5 3.5 0 0 0 1.5-2.9ZM16 4.8v2.4a6 6 0 0 1 0 9.6v2.4a8 8 0 0 0 0-14.4Z"/>
                    </svg>
                    공지사항 관리
                </a>
                <a href="/admin/faq" class="flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-50 rounded-xl transition-colors">
                    <svg viewBox="0 0 24 24" style="width: 25px; height: 25px; flex-shrink: 0;" fill="currentColor">
                        <path d="M11 18h2v-2h-2v2Zm1-16a8 8 0 1 0 0 16h1v4l4-4.7A8 8 0 0 0 12 2Zm0 2a6 6 0 0 1 3.6 10.8l-.2.2-1.6 1.9V16H12a6 6 0 0 1 0-12Zm0 2.5A3 3 0 0 0 9 9.4h2A1 1 0 1 1 12 10.5c-1.2 0-2 1-2 2.1V14h2v-1.4c0-.1.1-.1.2-.1A3 3 0 0 0 12 6.5Z"/>
                    </svg>
                    FAQ 관리
                </a>
            </nav>
            <div class="p-4 border-t border-slate-100">
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="flex items-center gap-3 w-full px-4 py-3 text-red-500 hover:bg-red-50 rounded-xl transition-colors font-medium">
                        <i data-lucide="log-out" class="w-5 h-5"></i>
                        로그아웃
                    </button>
                </form>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto">
            <!-- Top Header -->
            <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-8 sticky top-0 z-20">
                <div class="flex items-center gap-2">
                    <button type="button" id="mobileMenuBtn" class="md:hidden text-slate-500 hover:text-slate-700 focus:outline-none p-1 rounded-lg hover:bg-slate-100 transition-colors">
                        <i data-lucide="menu" class="w-6 h-6"></i>
                    </button>
                    <h1 class="text-xl font-semibold">신고 관리</h1>
                </div>
                <div class="flex items-center gap-4">
                    <div class="flex items-center gap-3 pl-4 border-l border-slate-200">
                        <div class="w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 font-bold">
                            A
                        </div>
                        <span class="font-medium text-sm">관리자님</span>
                    </div>
                </div>
            </header>

            <div class="p-8">
                <div th:if="${adminReportMessage}" th:text="${adminReportMessage}"
                     class="mb-4 rounded-xl border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm font-semibold text-emerald-700"></div>
                <div th:if="${adminReportError}" th:text="${adminReportError}"
                     class="mb-4 rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-sm font-semibold text-red-700"></div>

                <!-- Page Table Card -->
                <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
                    <div class="p-6 border-b border-slate-100 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                        <h2 class="text-lg font-bold">신고 접수 내역</h2>
                    </div>

                    <form method="get" action="/admin/reports" class="m-6 grid gap-3 rounded-2xl border border-slate-200 bg-slate-50 p-4 shadow-sm md:grid-cols-4">
                        <select name="status" class="rounded-xl border border-slate-200 px-3 py-2 text-sm bg-white">
                            <option value="">전체 상태</option>
                            <option th:each="option : ${statuses}" th:value="${option}" th:selected="${status == option}" th:text="${option.label}">접수됨</option>
                        </select>
                        <select name="targetType" class="rounded-xl border border-slate-200 px-3 py-2 text-sm bg-white">
                            <option value="">전체 대상</option>
                            <option th:each="option : ${targetTypes}" th:value="${option}" th:selected="${targetType == option}" th:text="${option.label}">분실물</option>
                        </select>
                        <select name="reasonType" class="rounded-xl border border-slate-200 px-3 py-2 text-sm bg-white">
                            <option value="">전체 사유</option>
                            <option th:each="option : ${reasonTypes}" th:value="${option}" th:selected="${reasonType == option}" th:text="${option.label}">기타</option>
                        </select>
                        <button type="submit" class="rounded-xl bg-slate-900 px-4 py-2 text-sm font-bold text-white hover:bg-slate-700 transition-colors">필터 적용</button>
                    </form>

                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="bg-slate-50 text-slate-500 text-sm uppercase font-semibold">
                                <tr>
                                    <th class="px-6 py-4">상태</th>
                                    <th class="px-6 py-4">대상</th>
                                    <th class="px-6 py-4">사유</th>
                                    <th class="px-6 py-4">신고자</th>
                                    <th class="px-6 py-4">접수일</th>
                                    <th class="px-6 py-4">처리</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-slate-100">
                                <tr th:if="${#lists.isEmpty(reports)}">
                                    <td colspan="6" class="px-6 py-12 text-center text-slate-500">접수된 신고가 없습니다.</td>
                                </tr>
                                <tr th:each="report : ${reports}" class="align-top hover:bg-slate-50 transition-colors">
                                    <td class="px-6 py-4 whitespace-nowrap">
                                        <span th:text="${report.status().label}" class="inline-block whitespace-nowrap rounded-full bg-slate-100 px-2.5 py-1 text-xs font-bold text-slate-700">접수됨</span>
                                    </td>
                                    <td class="px-6 py-4">
                                        <div class="font-bold text-slate-900" th:text="${report.targetType().label}">분실물</div>
                                        <a th:href="${report.targetUrl()}"
                                           th:target="${report.targetType().name() == 'CHAT_MESSAGE'} ? '_self' : '_blank'"
                                           th:text="${report.targetTitle()}"
                                           class="mt-1 block max-w-xs truncate text-sm font-semibold text-blue-600 hover:underline">대상 제목</a>
                                    </td>
                                    <td class="px-6 py-4">
                                        <div class="font-bold text-slate-800" th:text="${report.reasonType().label}">기타</div>
                                        <p th:if="${report.reasonDetail()}" th:text="${report.reasonDetail()}" class="mt-1 max-w-sm whitespace-pre-line text-xs leading-5 text-slate-500">상세</p>
                                    </td>
                                    <td class="px-6 py-4 text-slate-600">
                                        <div class="font-bold text-slate-800" th:text="${report.reporterNickname() ?: '닉네임 없음'}">닉네임</div>
                                        <div class="text-xs" th:text="${'ID: ' + (report.reporterLoginId() ?: '-')}">ID</div>
                                        <div class="text-xs" th:text="${'회원번호: ' + report.reporterNo()}">회원번호</div>
                                    </td>
                                    <td class="px-6 py-4 text-xs font-semibold text-slate-500" th:text="${#temporals.format(report.createdAt(), 'yyyy.MM.dd HH:mm')}">2026.05.29</td>
                                    <td class="px-6 py-4">
                                        <form th:action="@{/admin/reports/{id}/status(id=${report.reportId()})}" method="post" class="grid min-w-[220px] gap-2">
                                            <input type="hidden" name="filterStatus" th:value="${status}">
                                            <input type="hidden" name="targetType" th:value="${targetType}">
                                            <input type="hidden" name="reasonType" th:value="${reasonType}">
                                            <select name="status" class="rounded-lg border border-slate-200 px-2 py-1.5 text-xs bg-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                                                <option th:each="option : ${statuses}" th:value="${option}" th:selected="${report.status() == option}" th:text="${option.label}">접수됨</option>
                                            </select>
                                            <input type="text" name="adminMemo" maxlength="1000" placeholder="관리자 메모"
                                                   th:value="${report.adminMemo()}"
                                                   class="rounded-lg border border-slate-200 px-2 py-1.5 text-xs focus:outline-none focus:ring-2 focus:ring-blue-500">
                                            <button type="submit" class="rounded-lg bg-slate-900 px-3 py-1.5 text-xs font-bold text-white hover:bg-slate-700 transition-colors">저장</button>
                                        </form>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <nav th:if="${reportPage.totalPages > 1}" class="mt-6 flex items-center justify-center gap-3 text-sm">
                    <a th:classappend="${reportPage.first} ? ' pointer-events-none opacity-40'"
                       th:href="@{/admin/reports(status=${status}, targetType=${targetType}, reasonType=${reasonType}, page=${page - 1})}"
                       class="rounded-full border border-slate-200 bg-white px-4 py-2 font-bold text-slate-600 hover:bg-slate-50 transition-colors">이전</a>
                    <span class="font-bold text-slate-500"><span th:text="${page + 1}">1</span> / <span th:text="${reportPage.totalPages}">1</span></span>
                    <a th:classappend="${reportPage.last} ? ' pointer-events-none opacity-40'"
                       th:href="@{/admin/reports(status=${status}, targetType=${targetType}, reasonType=${reasonType}, page=${page + 1})}"
                       class="rounded-full border border-slate-200 bg-white px-4 py-2 font-bold text-slate-600 hover:bg-slate-50 transition-colors">다음</a>
                </nav>
            </div>
        </main>
    </div>

    <script>
        lucide.createIcons();

        // Responsive Mobile Sidebar Toggle Logic
        const mobileMenuBtn = document.getElementById('mobileMenuBtn');
        const closeSidebarBtn = document.getElementById('closeSidebarBtn');
        const adminSidebar = document.getElementById('adminSidebar');
        const sidebarBackdrop = document.getElementById('sidebarBackdrop');

        function openSidebar() {
            adminSidebar.classList.remove('-translate-x-full');
            sidebarBackdrop.classList.remove('hidden');
            setTimeout(() => {
                sidebarBackdrop.classList.remove('opacity-0');
                sidebarBackdrop.classList.add('opacity-100');
            }, 50);
        }

        function closeSidebar() {
            adminSidebar.classList.add('-translate-x-full');
            sidebarBackdrop.classList.remove('opacity-100');
            sidebarBackdrop.classList.add('opacity-0');
            setTimeout(() => {
                sidebarBackdrop.classList.add('hidden');
            }, 300);
        }

        if (mobileMenuBtn) {
            mobileMenuBtn.addEventListener('click', openSidebar);
        }

        if (closeSidebarBtn) {
            closeSidebarBtn.addEventListener('click', closeSidebar);
        }

        if (sidebarBackdrop) {
            sidebarBackdrop.addEventListener('click', closeSidebar);
        }
    </script>
</body>
</html>
