<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dogo Admin Reports</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" th:href="@{/css/admin-style.css}">
</head>
<body class="bg-slate-50 text-slate-900">
<main class="mx-auto max-w-7xl px-6 py-8">
  <div class="mb-6 flex items-center justify-between">
    <div>
      <a href="/admin" class="text-sm font-semibold text-slate-500 hover:text-slate-900">관리자 홈</a>
      <h1 class="mt-1 text-2xl font-extrabold text-slate-900">신고 관리</h1>
    </div>
    <a href="/" class="rounded-full border border-slate-200 bg-white px-4 py-2 text-sm font-bold text-slate-600 hover:bg-slate-50">사이트로 이동</a>
  </div>

  <div th:if="${adminReportMessage}" th:text="${adminReportMessage}"
       class="mb-4 rounded-xl border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm font-semibold text-emerald-700"></div>
  <div th:if="${adminReportError}" th:text="${adminReportError}"
       class="mb-4 rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-sm font-semibold text-red-700"></div>

  <form method="get" action="/admin/reports" class="mb-5 grid gap-3 rounded-2xl border border-slate-200 bg-white p-4 shadow-sm md:grid-cols-4">
    <select name="status" class="rounded-xl border border-slate-200 px-3 py-2 text-sm">
      <option value="">전체 상태</option>
      <option th:each="option : ${statuses}" th:value="${option}" th:selected="${status == option}" th:text="${option.label}">접수됨</option>
    </select>
    <select name="targetType" class="rounded-xl border border-slate-200 px-3 py-2 text-sm">
      <option value="">전체 대상</option>
      <option th:each="option : ${targetTypes}" th:value="${option}" th:selected="${targetType == option}" th:text="${option.label}">분실물</option>
    </select>
    <select name="reasonType" class="rounded-xl border border-slate-200 px-3 py-2 text-sm">
      <option value="">전체 사유</option>
      <option th:each="option : ${reasonTypes}" th:value="${option}" th:selected="${reasonType == option}" th:text="${option.label}">기타</option>
    </select>
    <button type="submit" class="rounded-xl bg-slate-900 px-4 py-2 text-sm font-bold text-white hover:bg-slate-700">필터 적용</button>
  </form>

  <section class="overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm">
    <table class="min-w-full divide-y divide-slate-200 text-sm">
      <thead class="bg-slate-50 text-left text-xs font-bold uppercase tracking-wide text-slate-500">
      <tr>
        <th class="px-4 py-3">상태</th>
        <th class="px-4 py-3">대상</th>
        <th class="px-4 py-3">사유</th>
        <th class="px-4 py-3">신고자</th>
        <th class="px-4 py-3">접수일</th>
        <th class="px-4 py-3">처리</th>
      </tr>
      </thead>
      <tbody class="divide-y divide-slate-100">
      <tr th:if="${#lists.isEmpty(reports)}">
        <td colspan="6" class="px-4 py-12 text-center text-slate-500">접수된 신고가 없습니다.</td>
      </tr>
      <tr th:each="report : ${reports}" class="align-top hover:bg-slate-50/60">
        <td class="px-4 py-4">
          <span th:text="${report.status().label}" class="rounded-full bg-slate-100 px-2.5 py-1 text-xs font-bold text-slate-700">접수됨</span>
        </td>
        <td class="px-4 py-4">
          <div class="font-bold text-slate-900" th:text="${report.targetType().label}">분실물</div>
          <a th:href="${report.targetUrl()}" target="_blank" th:text="${report.targetTitle()}" class="mt-1 block max-w-xs truncate text-sm font-semibold text-blue-600 hover:underline">대상 제목</a>
        </td>
        <td class="px-4 py-4">
          <div class="font-bold text-slate-800" th:text="${report.reasonType().label}">기타</div>
          <p th:if="${report.reasonDetail()}" th:text="${report.reasonDetail()}" class="mt-1 max-w-sm whitespace-pre-line text-xs leading-5 text-slate-500">상세</p>
        </td>
        <td class="px-4 py-4 text-slate-600">
          <div class="font-bold text-slate-800" th:text="${report.reporterNickname() ?: '닉네임 없음'}">닉네임</div>
          <div class="text-xs" th:text="${'ID: ' + (report.reporterLoginId() ?: '-')}">ID</div>
          <div class="text-xs" th:text="${'회원번호: ' + report.reporterNo()}">회원번호</div>
        </td>
        <td class="px-4 py-4 text-xs font-semibold text-slate-500" th:text="${#temporals.format(report.createdAt(), 'yyyy.MM.dd HH:mm')}">2026.05.29</td>
        <td class="px-4 py-4">
          <form th:action="@{/admin/reports/{id}/status(id=${report.reportId()})}" method="post" class="grid min-w-56 gap-2">
            <input type="hidden" name="filterStatus" th:value="${status}">
            <input type="hidden" name="targetType" th:value="${targetType}">
            <input type="hidden" name="reasonType" th:value="${reasonType}">
            <select name="status" class="rounded-lg border border-slate-200 px-2 py-1.5 text-xs">
              <option th:each="option : ${statuses}" th:value="${option}" th:selected="${report.status() == option}" th:text="${option.label}">접수됨</option>
            </select>
            <input type="text" name="adminMemo" maxlength="1000" placeholder="관리자 메모"
                   th:value="${report.adminMemo()}"
                   class="rounded-lg border border-slate-200 px-2 py-1.5 text-xs">
            <button type="submit" class="rounded-lg bg-slate-900 px-3 py-1.5 text-xs font-bold text-white hover:bg-slate-700">저장</button>
          </form>
        </td>
      </tr>
      </tbody>
    </table>
  </section>

  <nav th:if="${reportPage.totalPages > 1}" class="mt-5 flex items-center justify-center gap-3 text-sm">
    <a th:classappend="${reportPage.first} ? ' pointer-events-none opacity-40'"
       th:href="@{/admin/reports(status=${status}, targetType=${targetType}, reasonType=${reasonType}, page=${page - 1})}"
       class="rounded-full border border-slate-200 bg-white px-4 py-2 font-bold text-slate-600">이전</a>
    <span class="font-bold text-slate-500"><span th:text="${page + 1}">1</span> / <span th:text="${reportPage.totalPages}">1</span></span>
    <a th:classappend="${reportPage.last} ? ' pointer-events-none opacity-40'"
       th:href="@{/admin/reports(status=${status}, targetType=${targetType}, reasonType=${reasonType}, page=${page + 1})}"
       class="rounded-full border border-slate-200 bg-white px-4 py-2 font-bold text-slate-600">다음</a>
  </nav>
</main>
</body>
</html>
