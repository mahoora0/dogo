<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dogo Admin - 채팅 열람</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin-style.css}">
</head>
<body class="bg-slate-50 text-slate-900">
    <div class="flex h-screen overflow-hidden relative">
        <!-- Mobile Sidebar Backdrop overlay -->
        <div id="sidebarBackdrop" class="fixed inset-0 bg-slate-900/50 z-30 hidden transition-opacity duration-300 opacity-0"></div>

        <!-- Sidebar -->
        <aside id="adminSidebar" class="w-64 bg-white border-r border-slate-200 fixed inset-y-0 left-0 z-40 transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out md:static flex flex-col">
            <div class="p-6 flex items-center justify-between">
                <a href="/" class="flex items-center gap-2 font-bold text-2xl text-blue-600">
                    <i data-lucide="package-search"></i>
                    <span>Dogo Admin</span>
                </a>
                <button id="closeSidebarBtn" class="md:hidden text-slate-500 hover:text-slate-700 p-2 focus:outline-none">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <nav class="flex-1 px-4 space-y-1">
                <a href="/admin" class="flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-50 rounded-xl transition-colors">
                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                    대시보드
                </a>
                <a href="/admin/reports" class="flex items-center gap-3 px-4 py-3 bg-blue-50 text-blue-700 rounded-xl font-medium">
                    <i data-lucide="shield-alert" class="w-5 h-5"></i>
                    신고 관리
                </a>
            </nav>
            <div class="p-4 border-t border-slate-100">
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="flex items-center gap-3 w-full px-4 py-3 text-red-500 hover:bg-red-50 rounded-xl transition-colors font-medium">
                        <i data-lucide="log-out" class="w-5 h-5"></i>
                        로그아웃
                    </button>
                </form>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto">
            <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-8 sticky top-0 z-20">
                <div class="flex items-center gap-2">
                    <button type="button" id="mobileMenuBtn" class="md:hidden text-slate-500 hover:text-slate-700 focus:outline-none p-1 rounded-lg hover:bg-slate-100 transition-colors">
                        <i data-lucide="menu" class="w-6 h-6"></i>
                    </button>
                    <h1 class="text-xl font-semibold">채팅 열람</h1>
                </div>
                <a href="/admin/reports" class="flex items-center gap-1.5 text-sm font-semibold text-slate-600 hover:text-blue-600 transition-colors">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i>
                    신고 목록
                </a>
            </header>

            <div class="p-8">
                <!-- 참여자 정보 -->
                <div class="mb-6 grid gap-4 sm:grid-cols-2">
                    <div class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
                        <div class="text-xs font-bold uppercase text-slate-400">게시글 작성자</div>
                        <div class="mt-1 font-bold text-slate-900" th:text="${chat.ownerNickname() ?: '닉네임 없음'}">작성자</div>
                        <div class="text-xs text-slate-500" th:text="${'ID: ' + (chat.ownerLoginId() ?: '-') + ' / 회원번호: ' + chat.ownerNo()}">정보</div>
                    </div>
                    <div class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
                        <div class="text-xs font-bold uppercase text-slate-400">채팅 신청자</div>
                        <div class="mt-1 font-bold text-slate-900" th:text="${chat.inquirerNickname() ?: '닉네임 없음'}">신청자</div>
                        <div class="text-xs text-slate-500" th:text="${'ID: ' + (chat.inquirerLoginId() ?: '-') + ' / 회원번호: ' + chat.inquirerNo()}">정보</div>
                    </div>
                </div>

                <!-- 대화 내용 -->
                <div class="rounded-2xl border border-slate-200 bg-white shadow-sm">
                    <div class="border-b border-slate-100 p-5 flex items-center justify-between">
                        <h2 class="text-lg font-bold">대화 내용</h2>
                        <span class="text-xs font-semibold text-slate-400" th:text="${'채팅방 #' + chat.roomId()}">#</span>
                    </div>
                    <div class="space-y-4 p-6">
                        <p th:if="${#lists.isEmpty(chat.messages())}" class="py-12 text-center text-slate-400">메시지가 없습니다.</p>

                        <div th:each="msg : ${chat.messages()}"
                             th:with="isOwner=${chat.ownerNo() != null and msg.senderNo == chat.ownerNo()}"
                             class="flex" th:classappend="${isOwner} ? ' justify-end' : ' justify-start'">
                            <div class="max-w-lg">
                                <div class="mb-1 text-xs font-bold"
                                     th:classappend="${isOwner} ? ' text-right text-blue-600' : ' text-slate-500'"
                                     th:text="${msg.senderNickname ?: ('회원 ' + msg.senderNo)}">발신자</div>

                                <!-- 이미지 그룹 -->
                                <div th:if="${msg.files != null and !#lists.isEmpty(msg.files)}"
                                     class="rounded-2xl border border-slate-200 bg-slate-50 p-2">
                                    <div class="grid grid-cols-2 gap-2">
                                        <a th:each="f : ${msg.files}" th:href="${f.fileUrl}" target="_blank">
                                            <img th:src="${f.fileUrl}" class="h-28 w-full rounded-lg object-cover" alt="첨부 이미지">
                                        </a>
                                    </div>
                                </div>

                                <!-- 단일 파일/이미지 -->
                                <div th:if="${(msg.files == null or #lists.isEmpty(msg.files)) and msg.type == 'FILE'}"
                                     class="rounded-2xl px-4 py-3"
                                     th:classappend="${isOwner} ? ' bg-blue-500 text-white' : ' bg-slate-100 text-slate-700'">
                                    <a th:href="${msg.fileUrl}" target="_blank" class="flex items-center gap-2 text-sm font-semibold underline">
                                        <i data-lucide="paperclip" class="w-4 h-4"></i>
                                        <span th:text="${msg.fileName ?: msg.content}">파일</span>
                                    </a>
                                </div>

                                <!-- 텍스트 -->
                                <div th:if="${(msg.files == null or #lists.isEmpty(msg.files)) and msg.type != 'FILE'}"
                                     class="whitespace-pre-wrap break-words rounded-2xl px-4 py-2.5 text-sm"
                                     th:classappend="${isOwner} ? ' bg-blue-500 text-white' : ' bg-slate-100 text-slate-800'"
                                     th:text="${msg.content}">메시지 내용</div>

                                <div class="mt-1 text-[11px] text-slate-400"
                                     th:classappend="${isOwner} ? ' text-right' : ''"
                                     th:text="${msg.createdAt != null ? #temporals.format(msg.createdAt, 'yyyy.MM.dd HH:mm') : ''}">시간</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        lucide.createIcons();

        const mobileMenuBtn = document.getElementById('mobileMenuBtn');
        const closeSidebarBtn = document.getElementById('closeSidebarBtn');
        const adminSidebar = document.getElementById('adminSidebar');
        const sidebarBackdrop = document.getElementById('sidebarBackdrop');

        function openSidebar() {
            adminSidebar.classList.remove('-translate-x-full');
            sidebarBackdrop.classList.remove('hidden');
            setTimeout(() => {
                sidebarBackdrop.classList.remove('opacity-0');
                sidebarBackdrop.classList.add('opacity-100');
            }, 50);
        }

        function closeSidebar() {
            adminSidebar.classList.add('-translate-x-full');
            sidebarBackdrop.classList.remove('opacity-100');
            sidebarBackdrop.classList.add('opacity-0');
            setTimeout(() => sidebarBackdrop.classList.add('hidden'), 300);
        }

        if (mobileMenuBtn) mobileMenuBtn.addEventListener('click', openSidebar);
        if (closeSidebarBtn) closeSidebarBtn.addEventListener('click', closeSidebar);
        if (sidebarBackdrop) sidebarBackdrop.addEventListener('click', closeSidebar);
    </script>
</body>
</html>
