<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: setContent(~{::content})}">
<th:block th:fragment="content">
    <section class="max-w-5xl mx-auto">
        <div class="mb-8">
            <p class="text-sm font-semibold text-indigo-700">관리자</p>
            <h2 class="mt-2 text-3xl font-extrabold text-slate-900">문의 관리</h2>
        </div>

        <div class="overflow-hidden rounded-lg border border-slate-200 bg-white shadow-sm">
            <table class="w-full text-left text-sm">
                <thead class="bg-slate-50 text-slate-600">
                <tr>
                    <th class="px-5 py-3 font-semibold">제목</th>
                    <th class="w-32 px-5 py-3 font-semibold">유저 ID</th>
                    <th class="w-32 px-5 py-3 font-semibold">상태</th>
                </tr>
                </thead>
                <tbody class="divide-y divide-slate-100">
                <tr th:if="${#lists.isEmpty(inquiries)}">
                    <td colspan="3" class="px-5 py-10 text-center text-slate-500">등록된 문의 내역이 없습니다.</td>
                </tr>
                <tr th:each="inquiry : ${inquiries}" class="hover:bg-slate-50">
                    <td class="px-5 py-4">
                        <a th:href="@{/admin/inquiries/{id}(id=${inquiry.id})}" th:text="${inquiry.title}" class="font-semibold text-slate-900 hover:text-indigo-700">
                            문의 제목
                        </a>
                    </td>
                    <td th:text="${inquiry.userId ?: '-'}" class="px-5 py-4 text-slate-600">1</td>
                    <td class="px-5 py-4">
                        <span th:text="${inquiry.status}" class="rounded-full bg-indigo-50 px-2.5 py-1 text-xs font-semibold text-indigo-700">접수</span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</th:block>
</html>
