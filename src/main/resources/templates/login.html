<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 - 두고내림</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
      /* 소셜 브랜드 컬러 및 이미지 스타일링 */
      .brand-naver { background-color: #03C75A; color: white; }
      .brand-kakao { background-color: #FEE500; color: #3C1E1E; }
      .brand-google { background-color: #ffffff; color: #1f2937; border: 1px solid #e5e7eb; }

      /* 이미지 느낌의 둥근 모서리 */
      .rounded-custom { border-radius: 12px; }
  </style>
</head>
<body class="bg-[#F8F9FA] flex items-center justify-center min-h-screen p-4">

<div class="w-full max-w-[550px]">

  <div class="bg-white w-full py-6 mb-6 rounded-xl shadow-sm border border-gray-100 flex items-center justify-center">
    <a th:href="@{/}" class="flex items-center">
      <img th:src="@{/images/logo.png}" class="w-10 h-10 object-contain" alt="로고">
    </a>
  </div>

  <div class="bg-white p-12 rounded-[24px] shadow-sm border border-gray-100">

    <div class="text-center mb-8">
      <h1 class="text-3xl font-extrabold text-gray-900 mb-2">로그인</h1>
      <p class="text-gray-500 text-sm">분실물센터 계정으로 로그인하세요</p>
    </div>

    <form action="#" th:action="@{/login}" method="post" class="space-y-5">
      <div class="space-y-2">
        <label class="block text-sm font-bold text-gray-700 ml-1">아이디</label>
        <input type="text" name="username" placeholder="아이디 입력"
               class="w-full px-4 py-3 bg-[#F1F3F5] border-none rounded-custom focus:ring-2 focus:ring-blue-400 outline-none transition-all placeholder:text-gray-400">
      </div>

      <div class="space-y-2">
        <label class="block text-sm font-bold text-gray-700 ml-1">비밀번호</label>
        <input type="password" name="password" placeholder="비밀번호 입력"
               class="w-full px-4 py-3 bg-[#F1F3F5] border-none rounded-custom focus:ring-2 focus:ring-blue-400 outline-none transition-all placeholder:text-gray-400">
      </div>

      <div class="flex justify-between items-center text-xs px-1">
        <label class="flex items-center gap-2 text-gray-500 cursor-pointer">
          <input type="checkbox" class="rounded border-gray-300"> 로그인 상태 유지
        </label>
        <a href="#" class="text-gray-600 font-semibold border-b border-gray-400">아이디/비밀번호 찾기</a>
      </div>

      <button type="submit" class="w-full bg-[#333333] text-white py-4 rounded-custom font-bold text-md hover:bg-black transition-all mt-4">
        로그인
      </button>
    </form>

    <div class="relative my-10">
      <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-100"></div></div>
      <div class="relative flex justify-center text-[11px] font-bold text-gray-400 uppercase tracking-tighter">
        <span class="bg-white px-4">또는 SNS 계정으로 로그인</span>
      </div>
    </div>

    <div class="grid grid-cols-3 gap-3">
      <a th:href="@{/oauth2/authorization/google}" class="brand-google flex flex-col items-center justify-center py-3 rounded-custom hover:bg-gray-50 transition-all">
        <span class="text-sm font-bold flex items-center gap-1"><span class="text-blue-500">G</span> 구글</span>
      </a>
      <a th:href="@{/oauth2/authorization/naver}" class="brand-naver flex flex-col items-center justify-center py-3 rounded-custom hover:opacity-90 transition-all">
        <span class="text-sm font-bold">N 네이버</span>
      </a>
      <a th:href="@{/oauth2/authorization/kakao}" class="brand-kakao flex flex-col items-center justify-center py-3 rounded-custom hover:opacity-90 transition-all">
        <span class="text-sm font-bold">K 카카오</span>
      </a>
    </div>

    <div class="mt-10 text-center">
      <p class="text-sm text-gray-500">
        아직 회원이 아니신가요?
        <a href="#" class="text-gray-900 font-bold ml-2 border-b-2 border-gray-900 pb-0.5">회원가입</a>
      </p>
    </div>
  </div>
</div>

</body>
</html>
