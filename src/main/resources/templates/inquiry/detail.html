<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: setContent(~{::content})}">
<th:block th:fragment="content">
    <section class="max-w-3xl mx-auto">
        <div class="mb-6 flex flex-col gap-3 sm:flex-row sm:items-end sm:justify-between">
            <div>
                <p class="text-sm font-semibold text-indigo-700">문의 확인</p>
                <h2 th:text="${inquiry.title}" class="mt-2 text-3xl font-extrabold text-slate-900">문의 제목</h2>
                <div class="mt-4">
                    <a th:href="${isAdmin ? '/admin/inquiries' : '/inquiry'}" class="inline-flex items-center justify-center px-5 py-2.5 rounded-lg border border-slate-300 bg-white text-slate-700 hover:bg-slate-50 font-semibold text-sm transition-colors">
                        돌아가기
                    </a>
                </div>
            </div>
        </div>

        <div class="rounded-lg border border-slate-200 bg-white p-6 shadow-sm">
            <dl class="grid gap-4 text-sm sm:grid-cols-3">
                <div>
                    <dt class="font-semibold text-slate-500">문의 종류</dt>
                    <dd th:text="${inquiry.categoryLabel}" class="mt-1 text-slate-900">분실물 문의</dd>
                </div>
                <div>
                    <dt class="font-semibold text-slate-500">상태</dt>
                    <dd th:text="${inquiry.status}" class="mt-1 text-slate-900">접수</dd>
                </div>
                <div>
                    <dt class="font-semibold text-slate-500">등록일</dt>
                    <dd th:text="${inquiry.createdAt}" class="mt-1 text-slate-900">2026.05.12 11:00</dd>
                </div>
            </dl>

            <div class="mt-6 border-t border-slate-100 pt-6">
                <h3 class="text-sm font-semibold text-slate-500">문의 내용</h3>
                <p th:text="${inquiry.content}" class="mt-3 whitespace-pre-line rounded-lg bg-slate-50 p-4 text-sm leading-6 text-slate-700">문의 내용</p>
            </div>

            <div th:if="${inquiry.files != null and not #lists.isEmpty(inquiry.files)}" class="mt-6 border-t border-slate-100 pt-6">
                <h3 class="text-sm font-semibold text-slate-500 mb-3">첨부파일</h3>
                <ul class="space-y-2">
                    <li th:each="file : ${inquiry.files}" class="flex items-center gap-2">
                        <svg class="h-5 w-5 text-slate-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13" />
                        </svg>
                        <a th:href="${file.fileUrl}" target="_blank" th:text="${file.originalName}" class="text-sm font-medium text-indigo-600 hover:text-indigo-800 hover:underline">파일명.jpg</a>
                        <span class="text-xs text-slate-400" th:text="'(' + ${file.fileSize / 1024} + ' KB)'">(100 KB)</span>
                    </li>
                </ul>
            </div>

            <!-- 사용자가 볼 때 -->
            <div th:unless="${isAdmin}" class="mt-6 border-t border-slate-100 pt-6">
                <div class="flex items-center justify-between gap-3">
                    <h3 class="text-sm font-semibold text-slate-500">답변</h3>
                    <span th:if="${inquiry.answeredAt != ''}" th:text="${inquiry.answeredAt}" class="text-xs text-slate-500">2026.05.12 12:00</span>
                </div>
                <p th:if="${inquiry.answer == null || inquiry.answer == ''}" class="mt-3 rounded-lg border border-dashed border-slate-300 bg-white px-4 py-6 text-center text-sm text-slate-500">
                    아직 등록된 답변이 없습니다.
                </p>
                <p th:unless="${inquiry.answer == null || inquiry.answer == ''}" th:text="${inquiry.answer}" class="mt-3 whitespace-pre-line rounded-lg bg-indigo-50 p-4 text-sm leading-6 text-slate-700">
                    답변 내용
                </p>
            </div>

            <!-- 관리자가 볼 때 -->
            <form th:if="${isAdmin}" th:action="@{/admin/inquiry/{id}/answer(id=${inquiry.id})}" method="post" class="mt-6 border-t border-slate-100 pt-6">
                <label for="answer" class="block text-sm font-semibold text-slate-700">답변</label>
                <textarea id="answer" name="answer" required rows="7" th:text="${inquiry.answer}" placeholder="답변 내용을 입력해주세요."
                          class="mt-2 w-full rounded-lg border border-slate-300 px-4 py-3 text-sm text-slate-700 outline-none focus:border-indigo-600 focus:ring-2 focus:ring-indigo-100"></textarea>
                <p th:if="${inquiry.answeredAt != null and inquiry.answeredAt != ''}" th:text="'마지막 답변일: ' + ${inquiry.answeredAt}" class="mt-2 text-xs text-slate-500">마지막 답변일</p>
                <div class="mt-4 flex justify-end">
                    <button type="submit" class="rounded-md bg-slate-900 px-4 py-2.5 text-sm font-semibold text-white hover:bg-slate-800">
                        답변 저장
                    </button>
                </div>
            </form>
        </div>
    </section>
</th:block>
</html>
