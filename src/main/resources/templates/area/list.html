<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<th:block th:replace="~{layout/base :: setContent(~{this::content})}">
  <th:block th:fragment="content">

    <div class="search-banner">
      <div class="search-inner">

        <div class="select-group flex gap-2 items-center">

          <!-- 시/도 -->
          <div class="select-wrapper">
            <select id="areaSelect"
                    class="area-select"
                    onmousedown="this.size=8;"
                    onblur="this.size=1;"
                    onchange="this.size=1; this.blur(); loadSubRegions();">
              <option value="">시/도</option>
              <option th:each="area : ${areas}"
                      th:value="${area.areaName}"
                      th:text="${area.areaName}"
                      th:data-lat="${area.latitude}"
                      th:data-lng="${area.longitude}"
                      th:data-level="${area.defaultLevel}">
              </option>
            </select>
          </div>

          <!-- 시/군/구 -->
          <div class="select-wrapper">
            <select id="subAreaSelect"
                    class="area-select"
                    disabled
                    onmousedown="this.size=8;"
                    onblur="this.size=1;"
                    onchange="this.size=1; this.blur(); loadNeighborhoods();">
              <option value="">시/군/구</option>
            </select>
          </div>

          <!-- 읍/면/동 -->
          <div class="select-wrapper">
            <select id="neighborhoodSelect"
                    class="area-select"
                    disabled
                    onmousedown="this.size=8;"
                    onblur="this.size=1;"
                    onchange="this.size=1; this.blur(); updateMap();">
              <option value="">읍/면/동</option>
            </select>
          </div>

        </div>

        <div class="divider"></div>

        <input type="text" id="centerSearch" placeholder="센터명을 입력하세요">

        <button class="btn-search-black" onclick="updateMap()">검색</button>

      </div>
    </div>

    <div class="area-content-grid">

      <div id="centerList" class="center-list-container">
        <div class="p-4 text-center text-gray-500">지역을 선택해 주세요.</div>
      </div>

      <div class="map-wrapper">
        <div id="map" style="width:100%; height:600px;"></div>
      </div>

    </div>

    <script th:src="@{/js/area.js(v=${#dates.createNow().getTime()})}"></script>

  </th:block>
</th:block>
</html>
