<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<th:block th:replace="~{layout/base :: setContent(~{this::content})}">
  <th:block th:fragment="content">
    <div class="search-banner">
      <div class="search-inner">
        <select id="areaSelect">
          <option value="">장소 / 지역</option>
          <option value="서울">서울</option>
          <option value="부산">부산</option>
          <option value="대구">대구</option>
          <option value="인천">인천</option>
          <option value="광주">광주</option>
          <option value="대전">대전</option>
          <option value="울산">울산</option>
          <option value="세종">세종</option>
          <option value="경기">경기</option>
          <option value="충남">충남</option>
          <option value="충북">충북</option>
          <option value="경남">경남</option>
          <option value="경북">경북</option>
          <option value="전남">전남</option>
          <option value="전북">전북</option>
          <option value="강원">강원</option>
          <option value="제주">제주</option>
        </select>

        <div class="divider"></div>

        <input type="text" id="centerSearch" placeholder="센터명을 입력하세요">

        <button class="btn-search-black" onclick="updateMap()">검색</button>
      </div>
    </div>

    <div class="area-content-grid">
      <!-- 경찰관서 리스트 -->
      <div id="centerList" class="center-list-container">
        <p class="empty-msg">지역을 선택해 주세요.</p>
      </div>

      <!-- 지도 -->
      <div class="map-wrapper">
        <div id="map" style="width:100%; height:600px;"></div>
      </div>
    </div>

    <script th:inline="javascript">
      const stations = [[${stationList}]];
    </script>
    <script th:src="@{/js/area.js}"></script>
  </th:block>
</th:block>
</html>
