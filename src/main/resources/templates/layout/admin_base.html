<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" th:fragment="setAdminContent(content, currentMenu)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1280">
    <title>Dogo Admin</title>
    <script>
      tailwind.config = {
        theme: {
          screens: {
            'sm': '0px',
            'md': '0px',
            'lg': '0px',
            'xl': '0px',
            '2xl': '0px',
          }
        }
      }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script th:src="@{/js/ui-dialog.js}"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body class="bg-slate-50 text-slate-900">
    <div class="flex h-screen overflow-hidden relative">
        <!-- Mobile Sidebar Backdrop overlay -->
        <div id="sidebarBackdrop" class="fixed inset-0 bg-slate-900/50 z-30 hidden transition-opacity duration-300 opacity-0"></div>

        <!-- Sidebar -->
        <aside id="adminSidebar" class="w-64 shrink-0 bg-white border-r border-slate-200 static flex flex-col z-40 h-full">
            <div class="p-6 flex items-center justify-between">
                <a href="/" class="flex items-center gap-2 font-bold text-2xl text-blue-600">
                    <i data-lucide="package-search"></i>
                    <span>Dogo Admin</span>
                </a>
                <!-- Close menu button for mobile only -->
                <button id="closeSidebarBtn" class="hidden text-slate-500 hover:text-slate-700 p-2 focus:outline-none">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <nav class="flex-1 px-4 space-y-1">
                <a href="/admin" th:classappend="${currentMenu == 'dashboard' ? 'bg-blue-50 text-blue-700 font-medium' : 'text-slate-600 hover:bg-slate-50'}" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-colors">
                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                    대시보드
                </a>
                <a href="/admin/users" th:classappend="${currentMenu == 'users' ? 'bg-blue-50 text-blue-700 font-medium' : 'text-slate-600 hover:bg-slate-50'}" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-colors">
                    <i data-lucide="users" class="w-5 h-5"></i>
                    회원 관리
                </a>
                <a href="/admin/lost-items" th:classappend="${currentMenu == 'lost-items' ? 'bg-blue-50 text-blue-700 font-medium' : 'text-slate-600 hover:bg-slate-50'}" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-colors">
                    <i data-lucide="file-text" class="w-5 h-5"></i>
                    분실물 관리
                </a>
                <a href="/admin/found-items" th:classappend="${currentMenu == 'found-items' ? 'bg-blue-50 text-blue-700 font-medium' : 'text-slate-600 hover:bg-slate-50'}" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-colors">
                    <i data-lucide="package" class="w-5 h-5"></i>
                    습득물 관리
                </a>
                <a href="/admin/missing-persons" th:classappend="${currentMenu == 'missing-persons' ? 'bg-blue-50 text-blue-700 font-medium' : 'text-slate-600 hover:bg-slate-50'}" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-colors">
                    <i data-lucide="user-round-search" class="w-5 h-5"></i>
                    실종자 관리
                </a>
                <a href="/admin/animals" th:classappend="${currentMenu == 'animals' ? 'bg-blue-50 text-blue-700 font-medium' : 'text-slate-600 hover:bg-slate-50'}" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-colors">
                    <i data-lucide="dog" class="w-5 h-5"></i>
                    실종동물 관리
                </a>
                <a href="/admin/inquiries" th:classappend="${currentMenu == 'inquiries' ? 'bg-blue-50 text-blue-700 font-medium' : 'text-slate-600 hover:bg-slate-50'}" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-colors">
                    <svg viewBox="0 0 24 24" style="width: 25px; height: 25px; flex-shrink: 0;" fill="currentColor">
                        <path d="M4 4h16v12H7l-3 4V4Zm2 2v8h10v-2H8v-2h8V8H8V6H6Z"/>
                    </svg>
                    1:1 문의
                </a>
                <a href="/admin/reports" th:classappend="${currentMenu == 'reports' ? 'bg-blue-50 text-blue-700 font-medium' : 'text-slate-600 hover:bg-slate-50'}" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-colors">
                    <i data-lucide="shield-alert" class="w-5 h-5"></i>
                    신고 관리
                </a>
                <a href="/admin/notice" th:classappend="${currentMenu == 'notice' ? 'bg-blue-50 text-blue-700 font-medium' : 'text-slate-600 hover:bg-slate-50'}" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-colors">
                    <svg viewBox="0 0 24 24" style="width: 25px; height: 25px; flex-shrink: 0;" fill="currentColor">
                        <path d="M4 10v4h3l5 4V6l-5 4H4Zm11.5 2a3.5 3.5 0 0 0-1.5-2.9v5.8a3.5 3.5 0 0 0 1.5-2.9ZM16 4.8v2.4a6 6 0 0 1 0 9.6v2.4a8 8 0 0 0 0-14.4Z"/>
                    </svg>
                    공지사항 관리
                </a>
                <a href="/admin/faq" th:classappend="${currentMenu == 'faq' ? 'bg-blue-50 text-blue-700 font-medium' : 'text-slate-600 hover:bg-slate-50'}" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-colors">
                    <svg viewBox="0 0 24 24" style="width: 25px; height: 25px; flex-shrink: 0;" fill="currentColor">
                        <path d="M11 18h2v-2h-2v2Zm1-16a8 8 0 1 0 0 16h1v4l4-4.7A8 8 0 0 0 12 2Zm0 2a6 6 0 0 1 3.6 10.8l-.2.2-1.6 1.9V16H12a6 6 0 0 1 0-12Zm0 2.5A3 3 0 0 0 9 9.4h2A1 1 0 1 1 12 10.5c-1.2 0-2 1-2 2.1V14h2v-1.4c0-.1.1-.1.2-.1A3 3 0 0 0 12 6.5Z"/>
                    </svg>
                    FAQ 관리
                </a>
            </nav>
            <div class="p-4 border-t border-slate-100">
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="flex items-center gap-3 w-full px-4 py-3 text-red-500 hover:bg-red-50 rounded-xl transition-colors font-medium">
                        <i data-lucide="log-out" class="w-5 h-5"></i>
                        로그아웃
                    </button>
                </form>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto">
            <!-- Top Header -->
            <header class="h-16 bg-white/80 backdrop-blur-md border-b border-slate-200 flex items-center justify-center sticky top-0 z-10">
                <div class="min-w-[1180px] mx-auto px-8 flex items-center justify-between w-full">
                    <div class="flex items-center gap-2">
                        <button type="button" id="mobileMenuBtn" class="hidden text-slate-500 hover:text-slate-700 focus:outline-none p-1 rounded-lg hover:bg-slate-100 transition-colors">
                            <i data-lucide="menu" class="w-6 h-6"></i>
                        </button>
                        <h1 class="text-xl font-bold text-slate-800" th:text="${title != null ? title : '관리자 포털'}">관리자</h1>
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="flex items-center gap-3 pl-4 border-l border-slate-200">
                            <div class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center text-white font-bold">
                                A
                            </div>
                            <span class="font-semibold text-sm text-slate-700">관리자님</span>
                        </div>
                    </div>
                </div>
            </header>

            <div class="p-8 min-w-[1180px] mx-auto w-full">
                <th:block th:replace="${content}"></th:block>
            </div>
        </main>
    </div>

    <script th:src="@{/js/admin.js}"></script>
</body>
</html>
