<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<th:block th:fragment="setContent(content)">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DOGO 찾기 서비스</title>
    <script type="text/javascript"
            src="//dapi.kakao.com/v2/maps/sdk.js?appkey=c2b25620b9f4f16cf99df871475b41e4&libraries=services&autoload=false"></script>
    <script th:src="@{/js/common.js}"></script>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/areaList.css}">
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body>
    <header class="navbar">
      <div class="header-container">
        <div class="logo">
          <a th:href="@{/}" class="logo-link">
            <img id="logoImg" th:src="@{/images/logo.png}" alt="DOGO 로고" onerror="hideLogo()">
            <span id="logoText" style="display: none;">DOGO</span>
          </a>
        </div>
        <div class="nav-links">
          <th:block sec:authorize="isAnonymous()">
            <a th:href="@{/login}" class="nav-link">로그인</a>
            <a th:href="@{/join}" class="nav-link">회원가입</a>
          </th:block>

          <!-- 로그인 된 상태 -->
          <th:block sec:authorize="isAuthenticated()">
            <!-- 매칭 알림 종 아이콘 (사용자가 최소 1개 이상 분실물을 등록했을 때만 노출) -->
            <div th:if="${hasLostItems}" class="relative inline-block text-left mr-2" id="notificationWrapper">
              <button type="button" id="notificationBtn" class="relative p-2 text-slate-600 hover:bg-slate-100 rounded-full transition-colors focus:outline-none">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a23.848 23.848 0 0 0 5.454-1.31A8.967 8.967 0 0 1 18 9.75V9A6 6 0 0 0 6 9v.75a8.967 8.967 0 0 1-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a2.427 2.427 0 0 1-4.571 0m4.571 0a1.125 1.125 0 0 1-2.25 0" />
                </svg>
                <span th:if="${unreadMatchCount > 0}" th:text="${unreadMatchCount}"
                      class="absolute top-1 right-1 inline-flex items-center justify-center px-1.5 py-0.5 text-xs font-bold leading-none text-white transform translate-x-1/2 -translate-y-1/2 bg-red-500 rounded-full">
                  0
                </span>
              </button>

              <!-- 알림 드롭다운 -->
              <div id="notificationDropdown" class="hidden absolute right-0 mt-2 w-80 origin-top-right rounded-xl bg-white shadow-lg ring-1 ring-black ring-opacity-5 focus:outline-none z-50 overflow-hidden">
                <div class="p-4 border-b border-slate-100 bg-slate-50">
                  <h3 class="text-sm font-bold text-slate-900">새로운 매칭 알림</h3>
                </div>
                <div class="max-h-96 overflow-y-auto">
                  <th:block th:if="${not #lists.isEmpty(topMatches)}">
                    <a th:each="match : ${topMatches}" th:href="@{/found-items/{id}(id=${match.id})}"
                       class="flex items-start gap-3 p-4 hover:bg-slate-50 border-b border-slate-50 last:border-0 transition-colors">
                      <div class="w-12 h-12 flex-shrink-0 bg-slate-100 rounded-lg overflow-hidden border border-slate-200">
                        <img th:if="${match.imageUrl != null}" th:src="${match.imageUrl}" class="w-full h-full object-cover">
                        <div th:unless="${match.imageUrl != null}" class="w-full h-full flex items-center justify-center text-slate-400 text-xs">IMG</div>
                      </div>
                      <div class="flex-grow min-w-0">
                        <p class="text-[10px] font-bold text-indigo-600 mb-0.5">매칭 [[${match.score}]]점</p>
                        <p class="text-sm font-semibold text-slate-900 truncate" th:text="${match.name}">물건명</p>
                        <p class="text-[11px] text-slate-500 truncate" th:text="${match.area}">장소</p>
                      </div>
                    </a>
                  </th:block>
                  <div th:if="${#lists.isEmpty(topMatches)}" class="p-8 text-center text-sm text-slate-400">
                    새로운 매칭 결과가 없습니다.
                  </div>
                </div>
                <div class="p-3 bg-slate-50 border-t border-slate-100 text-center">
                  <a th:href="@{/lost-items}" class="text-xs font-bold text-slate-600 hover:text-indigo-600">내 분실물 목록 보기</a>
                </div>
              </div>
            </div>

            <script>
              document.addEventListener('DOMContentLoaded', function() {
                const btn = document.getElementById('notificationBtn');
                const dropdown = document.getElementById('notificationDropdown');
                const badge = btn ? btn.querySelector('.absolute') : null;

                if (btn && dropdown) {
                  btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const isOpening = dropdown.classList.contains('hidden');
                    dropdown.classList.toggle('hidden');

                    // 창을 열 때 숫자가 있다면 지우고 서버에 알림 (한 번만 실행)
                    if (isOpening && badge) {
                      badge.style.display = 'none';
                      fetch('/api/matches/mark-as-read', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' }
                      }).catch(err => console.error('알림 읽음 처리 실패:', err));
                    }
                  });

                  document.addEventListener('click', function(e) {
                    if (!dropdown.contains(e.target) && !btn.contains(e.target)) {
                      dropdown.classList.add('hidden');
                    }
                  });
                }
              });
            </script>

            <a th:href="@{/chat}" class="chat-button relative" title="채팅하기">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 20.25c4.97 0 9-3.694 9-8.25s-4.03-8.25-9-8.25S3 7.444 3 12c0 2.104.859 4.023 2.273 5.48L4.32 19.58a.45.45 0 0 0 .67.54l1.917-1.352a9.905 9.905 0 0 0 5.093 1.482Z" />
              </svg>
              <span class="chat-text">채팅</span>
              <span th:if="${unreadChatCount != null && unreadChatCount > 0}"
                    th:text="${unreadChatCount > 99 ? '99+' : unreadChatCount}"
                    class="notification-badge chat-notification-badge">0</span>
            </a>
            <a th:href="${#authentication.principal.user.role == 'ADMIN' ? '/admin' : '/userpage'}" class="profile-link">
              <img th:if="${#authentication.principal.user.profileImageUrl != null}"
                   th:src="${#authentication.principal.user.profileImageUrl}"
                   class="profile-image" alt="프로필">
              <span th:unless="${#authentication.principal.user.profileImageUrl != null}" class="profile-placeholder" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                  <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6Zm-7 9a7 7 0 1114 0H3Z" clip-rule="evenodd"/>
                </svg>
              </span>
              <span sec:authentication="principal.user.nickname">닉네임</span>
            </a>

            <!-- 기존 프로필 -->
            <form th:action="@{/logout}" method="post">
              <button type="submit" class="nav-link nav-link--button">로그아웃</button>
            </form>
          </th:block>
        </div>
      </div>
    </header>

    <div class="main-layout">
      <aside class="sidebar">
        <nav>
          <div class="category">
            <h3>분실물</h3>
            <ul>
              <li th:classappend="${currentUri == '/lost-items' ? 'active' : ''}">
                <a th:href="@{/lost-items}"><span class="sidebar-icon sidebar-icon--lost-search"></span>분실물 검색</a>
              </li>
              <li th:classappend="${currentUri == '/lost-items/new' ? 'active' : ''}">
                <a th:href="@{/lost-items/new}"><span class="sidebar-icon sidebar-icon--lost-new"></span>분실물 등록</a>
              </li>
            </ul>
          </div>
          <div class="category">
            <h3>습득물</h3>
            <ul>
              <li th:classappend="${currentUri == '/found-items' ? 'active' : ''}">
                <a th:href="@{/found-items}"><span class="sidebar-icon sidebar-icon--found-search"></span>습득물 검색</a>
              </li>
              <li th:classappend="${currentUri == '/found-items/new' ? 'active' : ''}">
                <a th:href="@{/found-items/new}"><span class="sidebar-icon sidebar-icon--found-new"></span>습득물 등록</a>
              </li>
              <li th:classappend="${currentUri == '/areas/list' ? 'active' : ''}">
                <a th:href="@{/areas/list}"><span class="sidebar-icon sidebar-icon--service-center"></span>서비스센터</a>
              </li>
            </ul>
          </div>
          <div class="category">
            <h3>실종자</h3>
            <ul>
              <li th:classappend="${currentUri == '/missing-alerts' ? 'active' : ''}">
                <a th:href="@{/missing-alerts}"><span class="sidebar-icon sidebar-icon--missing-alert"></span>실종 경보</a>
              </li>
              <li th:classappend="${currentUri == '/missing-persons' ? 'active' : ''}">
                <a th:href="@{/missing-persons}"><span class="sidebar-icon sidebar-icon--person-search"></span>실종자 검색</a>
              </li>
              <li th:classappend="${currentUri == '/missing-persons/new' ? 'active' : ''}">
                <a th:href="@{/missing-persons/new}"><span class="sidebar-icon sidebar-icon--person-new"></span>실종자 제보</a>
              </li>
            </ul>
          </div>
          <div class="category">
            <h3>실종동물</h3>
            <ul>
              <li th:classappend="${currentUri == '/animal-reports' ? 'active' : ''}">
                <a th:href="@{/animal-reports}"><span class="sidebar-icon sidebar-icon--animal-search"></span>실종동물 검색</a>
              </li>
              <li th:classappend="${currentUri == '/animal-reports/new' ? 'active' : ''}">
                <a th:href="@{/animal-reports/new}"><span class="sidebar-icon sidebar-icon--animal-new"></span>실종동물 제보</a>
              </li>
            </ul>
          </div>
          <hr class="sidebar-divider">
          <div class="category">
            <h3>고객지원</h3>
            <ul>
              <li th:classappend="${currentUri == '/faq' ? 'active' : ''}">
                <a th:href="@{/faq}"><span class="sidebar-icon sidebar-icon--faq"></span>자주묻는질문</a>
              </li>
              <li th:classappend="${currentUri == '/inquiry' ? 'active' : ''}">
                <a th:href="@{/inquiry}"><span class="sidebar-icon sidebar-icon--inquiry"></span>문의하기</a>
              </li>
              <li th:classappend="${currentUri == '/notice' ? 'active' : ''}">
                <a th:href="@{/notice}"><span class="sidebar-icon sidebar-icon--notice"></span>공지사항</a>
              </li>
              <li th:classappend="${currentUri == '/guide' ? 'active' : ''}">
                <a th:href="@{/guide}"><span class="sidebar-icon sidebar-icon--guide"></span>이용가이드</a>
              </li>
            </ul>
          </div>
        </nav>
      </aside>

      <main class="content">
        <th:block th:replace="${content}"></th:block>
      </main>
    </div>
    <script th:src="@{/js/place-modal.js}"></script>
  </body>
</th:block>
</html>
