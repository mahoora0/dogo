<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<th:block th:fragment="setContent(content)">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DOGO 찾기 서비스</title>
    <script type="text/javascript"
            src="//dapi.kakao.com/v2/maps/sdk.js?appkey=c2b25620b9f4f16cf99df871475b41e4&libraries=services&autoload=false"></script>
    <script th:src="@{/js/common.js}"></script>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/areaList.css}">
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body>
    <header class="navbar">
      <div class="header-container">
        <div class="logo">
          <a th:href="@{/}" class="logo-link">
            <img id="logoImg" th:src="@{/images/logo.png}" alt="DOGO 로고" onerror="hideLogo()">
            <span id="logoText" style="display: none;">DOGO</span>
          </a>
        </div>
        <div class="nav-links">
          <th:block sec:authorize="isAnonymous()">
            <a th:href="@{/login}" class="nav-link">로그인</a>
            <a th:href="@{/join}" class="nav-link">회원가입</a>
          </th:block>

          <th:block sec:authorize="isAuthenticated()">
            <!-- 🔔 알림 아이콘 추가 -->
            <a th:href="@{/notifications}" class="chat-button" title="알림">
              <svg xmlns="http://www.w3.org/2000/svg"
                   fill="none"
                   viewBox="0 0 24 24"
                   stroke-width="2"
                   stroke="currentColor">
                <path stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M15 17h5l-1.405-1.405A2.032 2.032 0 0 1 18 14.158V11a6 6 0 1 0-12 0v3.159c0 .538-.214 1.055-.595 1.437L4 17h5m6 0a3 3 0 1 1-6 0m6 0H9"/>
              </svg>
              <span class="chat-text">알림</span>
            </a>

            <!-- 💬 채팅 -->
            <a th:href="@{/chat}" class="chat-button" title="채팅하기">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 20.25c4.97 0 9-3.694 9-8.25s-4.03-8.25-9-8.25S3 7.444 3 12c0 2.104.859 4.023 2.273 5.48L4.32 19.58a.45.45 0 0 0 .67.54l1.917-1.352a9.905 9.905 0 0 0 5.093 1.482Z" />
              </svg>
              <span class="chat-text">채팅</span>
            </a>
            <a th:href="${#authentication.principal.user.role == 'ADMIN' ? '/admin' : '/userpage'}" class="profile-link">
              <img th:if="${#authentication.principal.user.profileImageUrl != null}"
                   th:src="${#authentication.principal.user.profileImageUrl}"
                   class="profile-image" alt="프로필">
              <span th:unless="${#authentication.principal.user.profileImageUrl != null}" class="profile-placeholder" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                  <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6Zm-7 9a7 7 0 1114 0H3Z" clip-rule="evenodd"/>
                </svg>
              </span>
              <span sec:authentication="principal.user.nickname">닉네임</span>
            </a>

            <!-- 기존 프로필 -->
            <form th:action="@{/logout}" method="post">
              <button type="submit" class="nav-link nav-link--button">로그아웃</button>
            </form>
          </th:block>
        </div>
      </div>
    </header>

    <div class="main-layout">
      <aside class="sidebar">
        <nav>
          <div class="category">
            <h3>분실물</h3>
            <ul>
              <li th:classappend="${currentUri == '/lost-items' ? 'active' : ''}">
                <a th:href="@{/lost-items}"><span class="sidebar-icon sidebar-icon--lost-search"></span>분실물 검색</a>
              </li>
              <li th:classappend="${currentUri == '/lost-items/new' ? 'active' : ''}">
                <a th:href="@{/lost-items/new}"><span class="sidebar-icon sidebar-icon--lost-new"></span>분실물 등록</a>
              </li>
            </ul>
          </div>
          <div class="category">
            <h3>습득물</h3>
            <ul>
              <li th:classappend="${currentUri == '/found-items' ? 'active' : ''}">
                <a th:href="@{/found-items}"><span class="sidebar-icon sidebar-icon--found-search"></span>습득물 검색</a>
              </li>
              <li th:classappend="${currentUri == '/found-items/new' ? 'active' : ''}">
                <a th:href="@{/found-items/new}"><span class="sidebar-icon sidebar-icon--found-new"></span>습득물 등록</a>
              </li>
              <li th:classappend="${currentUri == '/areas/list' ? 'active' : ''}">
                <a th:href="@{/areas/list}"><span class="sidebar-icon sidebar-icon--service-center"></span>서비스센터</a>
              </li>
            </ul>
          </div>
          <div class="category">
            <h3>실종자</h3>
            <ul>
              <li>
                <a href="#"><span class="sidebar-icon sidebar-icon--person-search"></span>실종자 검색</a>
              </li>
              <li>
                <a href="#"><span class="sidebar-icon sidebar-icon--person-new"></span>실종자 제보</a>
              </li>
            </ul>
          </div>
          <div class="category">
            <h3>실종동물</h3>
            <ul>
              <li th:classappend="${currentUri == '/animal-reports' ? 'active' : ''}">
                <a th:href="@{/animal-reports}"><span class="sidebar-icon sidebar-icon--animal-search"></span>실종동물 검색</a>
              </li>
              <li th:classappend="${currentUri == '/animal-reports/new' ? 'active' : ''}">
                <a th:href="@{/animal-reports/new}"><span class="sidebar-icon sidebar-icon--animal-new"></span>실종동물 제보</a>
              </li>
            </ul>
          </div>
          <hr class="sidebar-divider">
          <div class="category">
            <h3>고객지원</h3>
            <ul>
              <li th:classappend="${currentUri == '/faq' ? 'active' : ''}">
                <a th:href="@{/faq}"><span class="sidebar-icon sidebar-icon--faq"></span>자주묻는질문</a>
              </li>
              <li th:classappend="${currentUri == '/inquiry' ? 'active' : ''}">
                <a th:href="@{/inquiry}"><span class="sidebar-icon sidebar-icon--inquiry"></span>문의하기</a>
              </li>
              <li th:classappend="${currentUri == '/notice' ? 'active' : ''}">
                <a th:href="@{/notice}"><span class="sidebar-icon sidebar-icon--notice"></span>공지사항</a>
              </li>
              <li th:classappend="${currentUri == '/guide' ? 'active' : ''}">
                <a th:href="@{/guide}"><span class="sidebar-icon sidebar-icon--guide"></span>이용가이드</a>
              </li>
            </ul>
          </div>
        </nav>
      </aside>

      <main class="content">
        <th:block th:replace="${content}"></th:block>
      </main>
    </div>
    <script th:src="@{/js/place-modal.js}"></script>
  </body>
</th:block>
</html>
