<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>분실물 등록 | DOGO</title>
	<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900">
<header class="border-b border-slate-200 bg-white">
	<div class="mx-auto flex max-w-4xl items-center justify-between px-5 py-4">
		<a href="/lost-items" class="text-xl font-bold tracking-tight">DOGO</a>
		<a href="/lost-items" class="text-sm font-semibold text-slate-600 hover:text-slate-900">목록으로</a>
	</div>
</header>

<main class="mx-auto max-w-4xl px-5 py-8">
	<div class="mb-6">
		<p class="text-sm font-semibold text-teal-700">내가 찾아요</p>
		<h1 class="mt-2 text-3xl font-bold tracking-tight">분실물 등록</h1>
	</div>

	<form action="/lost-items" method="post" enctype="multipart/form-data" class="rounded-lg border border-slate-200 bg-white p-5 shadow-sm">
		<div class="grid gap-5 md:grid-cols-2">
			<label class="block">
				<span class="text-sm font-semibold">물품명</span>
				<input name="name" required class="mt-2 w-full rounded-md border border-slate-300 px-3 py-2 outline-none focus:border-teal-600 focus:ring-2 focus:ring-teal-100">
			</label>
			<label class="block">
				<span class="text-sm font-semibold">카테고리</span>
				<select name="category" required class="mt-2 w-full rounded-md border border-slate-300 px-3 py-2 outline-none focus:border-teal-600 focus:ring-2 focus:ring-teal-100">
					<option value="">선택</option>
					<option>지갑</option>
					<option>가방</option>
					<option>전자기기</option>
					<option>의류</option>
					<option>기타</option>
				</select>
			</label>
			<label class="block">
				<span class="text-sm font-semibold">분실 지역</span>
				<input name="area" placeholder="예: 서울 강남구" class="mt-2 w-full rounded-md border border-slate-300 px-3 py-2 outline-none focus:border-teal-600 focus:ring-2 focus:ring-teal-100">
			</label>
			<label class="block">
				<span class="text-sm font-semibold">분실 장소</span>
				<input name="place" placeholder="예: 강남역 11번 출구" class="mt-2 w-full rounded-md border border-slate-300 px-3 py-2 outline-none focus:border-teal-600 focus:ring-2 focus:ring-teal-100">
			</label>
			<label class="block">
				<span class="text-sm font-semibold">분실 일시</span>
				<input type="date" name="lostDate" class="mt-2 w-full rounded-md border border-slate-300 px-3 py-2 outline-none focus:border-teal-600 focus:ring-2 focus:ring-teal-100">
			</label>
			<label class="block">
				<span class="text-sm font-semibold">사진</span>
				<input type="file" name="image" accept="image/*" class="mt-2 w-full rounded-md border border-slate-300 px-3 py-2 text-sm file:mr-3 file:rounded-md file:border-0 file:bg-slate-900 file:px-3 file:py-1.5 file:text-white">
			</label>
		</div>

		<label class="mt-5 block">
			<span class="text-sm font-semibold">상세 설명</span>
			<textarea name="description" rows="6" placeholder="색상, 브랜드, 특징, 안에 들어있던 물건 등을 적어주세요." class="mt-2 w-full rounded-md border border-slate-300 px-3 py-2 outline-none focus:border-teal-600 focus:ring-2 focus:ring-teal-100"></textarea>
		</label>

		<div class="mt-6 flex justify-end gap-2">
			<a href="/lost-items" class="rounded-md border border-slate-300 px-4 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-100">취소</a>
			<button type="submit" class="rounded-md bg-teal-600 px-4 py-2 text-sm font-semibold text-white hover:bg-teal-700">등록</button>
		</div>
	</form>
</main>
</body>
</html>
