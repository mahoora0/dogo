<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>내가 찾아요 | DOGO</title>
	<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900">
<header class="border-b border-slate-200 bg-white">
	<div class="mx-auto flex max-w-6xl items-center justify-between px-5 py-4">
		<a href="/lost-items" class="text-xl font-bold tracking-tight">DOGO</a>
		<nav class="flex items-center gap-2 text-sm font-medium">
			<a href="/lost-items" class="rounded-md bg-slate-900 px-3 py-2 text-white">내가 찾아요</a>
			<a href="#" class="rounded-md px-3 py-2 text-slate-600 hover:bg-slate-100">주인을 찾아요</a>
		</nav>
	</div>
</header>

<main class="mx-auto max-w-6xl px-5 py-8">
	<section class="mb-8 flex flex-col gap-4 sm:flex-row sm:items-end sm:justify-between">
		<div>
			<p class="text-sm font-semibold text-teal-700">분실물 등록과 조회</p>
			<h1 class="mt-2 text-3xl font-bold tracking-tight">내가 찾아요</h1>
			<p class="mt-2 text-slate-600">잃어버린 물건을 등록하고 검색할 수 있습니다.</p>
		</div>
		<a href="/lost-items/new" class="inline-flex items-center justify-center rounded-md bg-teal-600 px-4 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-teal-700">
			분실물 등록
		</a>
	</section>

	<form action="/lost-items" method="get" class="mb-6 grid gap-3 rounded-lg border border-slate-200 bg-white p-4 shadow-sm md:grid-cols-5">
		<input name="keyword" th:value="${keyword}" placeholder="물품명, 제목, 설명" class="rounded-md border border-slate-300 px-3 py-2 text-sm outline-none focus:border-teal-600 focus:ring-2 focus:ring-teal-100">
		<select name="category" class="rounded-md border border-slate-300 px-3 py-2 text-sm outline-none focus:border-teal-600 focus:ring-2 focus:ring-teal-100">
			<option value="">전체 카테고리</option>
			<option th:each="categoryOption : ${searchCategories}" th:value="${categoryOption}" th:text="${categoryOption}" th:selected="${category == categoryOption}">지갑</option>
		</select>
		<input name="area" th:value="${area}" placeholder="지역 또는 장소" class="rounded-md border border-slate-300 px-3 py-2 text-sm outline-none focus:border-teal-600 focus:ring-2 focus:ring-teal-100">
		<select name="status" class="rounded-md border border-slate-300 px-3 py-2 text-sm outline-none focus:border-teal-600 focus:ring-2 focus:ring-teal-100">
			<option value="">전체 상태</option>
			<option value="WAITING" th:selected="${status == 'WAITING'}">대기중</option>
			<option value="MATCHING" th:selected="${status == 'MATCHING'}">매칭중</option>
			<option value="FOUND" th:selected="${status == 'FOUND'}">회수완료</option>
		</select>
		<button type="submit" class="rounded-md bg-slate-900 px-4 py-2 text-sm font-semibold text-white hover:bg-slate-700">검색</button>
	</form>

	<section class="grid gap-4 md:grid-cols-2 lg:grid-cols-3">
		<a th:each="item : ${lostItems}" th:href="@{/lost-items/{id}(id=${item.id})}" class="overflow-hidden rounded-lg border border-slate-200 bg-white shadow-sm transition hover:-translate-y-0.5 hover:shadow-md">
			<img th:src="${item.imageUrl}" alt="" class="h-44 w-full object-cover">
			<div class="p-4">
				<div class="mb-3 flex items-center justify-between gap-2">
					<span th:text="${item.category ?: '미분류'}" class="rounded-full bg-teal-50 px-2.5 py-1 text-xs font-semibold text-teal-700">지갑</span>
					<span th:text="${item.statusLabel}" class="rounded-full bg-slate-100 px-2.5 py-1 text-xs font-semibold text-slate-700">대기중</span>
				</div>
				<h2 th:text="${item.title}" class="line-clamp-2 text-lg font-bold">검정 카드지갑을 찾습니다</h2>
				<p th:text="${item.name}" class="mt-2 text-sm font-medium text-slate-700">검정 카드지갑</p>
				<p th:text="${item.place}" class="mt-1 text-sm text-slate-600">강남역 11번 출구 근처</p>
				<p th:text="${#temporals.format(item.lostAt, 'yyyy.MM.dd HH:mm')}" class="mt-1 text-sm text-slate-500">2026.05.02 14:30</p>
			</div>
		</a>
	</section>

	<p th:if="${#lists.isEmpty(lostItems)}" class="rounded-lg border border-dashed border-slate-300 bg-white px-5 py-10 text-center text-slate-500">
		검색 결과가 없습니다.
	</p>

	<nav th:if="${lostItemPage.totalPages > 1}" class="mt-8 flex items-center justify-between gap-3 text-sm">
		<a th:classappend="${lostItemPage.first} ? ' pointer-events-none opacity-40'"
		   th:href="@{/lost-items(keyword=${keyword}, category=${category}, area=${area}, status=${status}, page=${page - 1}, size=${size})}"
		   class="rounded-md border border-slate-300 bg-white px-3 py-2 font-semibold text-slate-700 hover:bg-slate-100">이전</a>
		<span class="text-slate-500">
			<span th:text="${page + 1}">1</span>
			/
			<span th:text="${lostItemPage.totalPages}">1</span>
		</span>
		<a th:classappend="${lostItemPage.last} ? ' pointer-events-none opacity-40'"
		   th:href="@{/lost-items(keyword=${keyword}, category=${category}, area=${area}, status=${status}, page=${page + 1}, size=${size})}"
		   class="rounded-md border border-slate-300 bg-white px-3 py-2 font-semibold text-slate-700 hover:bg-slate-100">다음</a>
	</nav>
</main>
</body>
</html>
