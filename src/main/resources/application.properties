spring.application.name=dogo

spring.datasource.url=jdbc:mysql://localhost:3306/dogo?createDatabaseIfNotExist=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.open-in-view=false

spring.sql.init.mode=always
spring.sql.init.encoding=UTF-8

spring.thymeleaf.cache=false

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=30MB

file.upload-dir=${user.home}/dogo/uploads

police.service-key=${POLICE_SERVICE_KEY:${POLICE_LOST_ITEM_SERVICE_KEY:${POLICE_FOUND_ITEM_SERVICE_KEY:}}}

police.common-code.base-url=http://apis.data.go.kr/1320000/CmmnCdService/getCmmnCd
police.common-code.service-key=${police.service-key}
police.common-code.num-of-rows=500

police.lost-item.base-url=http://apis.data.go.kr/1320000/LostGoodsInfoInqireService/getLostGoodsInfoAccToClAreaPd
police.lost-item.detail-url=http://apis.data.go.kr/1320000/LostGoodsInfoInqireService/getLostGoodsDetailInfo
police.lost-item.service-key=${police.service-key}
police.lost-item.num-of-rows=100
police.lost-item.incremental-empty-page-limit=2
police.lost-item.backfill-lookback-days=${POLICE_LOST_ITEM_BACKFILL_LOOKBACK_DAYS:1}
police.lost-item.incremental-lookback-days=${POLICE_LOST_ITEM_INCREMENTAL_LOOKBACK_DAYS:30}
police.lost-item.sync.enabled=true
police.lost-item.sync-cron=0 0 * * * *
police.lost-item.backfill-on-startup=true

police.found-item.base-url=http://apis.data.go.kr/1320000/LosfundInfoInqireService/getLosfundInfoAccToClAreaPd
police.found-item.detail-url=http://apis.data.go.kr/1320000/LosfundInfoInqireService/getLosfundDetailInfo
police.found-item.service-key=${police.service-key}
police.found-item.num-of-rows=100
police.found-item.incremental-empty-page-limit=2
police.found-item.backfill-lookback-days=${POLICE_FOUND_ITEM_BACKFILL_LOOKBACK_DAYS:1}
police.found-item.incremental-lookback-days=${POLICE_FOUND_ITEM_INCREMENTAL_LOOKBACK_DAYS:30}
police.found-item.sync.enabled=true
police.found-item.sync-cron=0 10 * * * *
police.found-item.backfill-on-startup=true

# Google Login Config
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=profile,email


# Naver Login Config
spring.security.oauth2.client.registration.naver.client-id=${NAVER_CLIENT_ID:}
spring.security.oauth2.client.registration.naver.client-secret=${NAVER_CLIENT_SECRET:}
spring.security.oauth2.client.registration.naver.client-name=Naver
spring.security.oauth2.client.registration.naver.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.naver.redirect-uri=http://localhost:8080/login/oauth2/code/naver
# Naver Provider Config
spring.security.oauth2.client.provider.naver.authorization-uri=https://nid.naver.com/oauth2.0/authorize
spring.security.oauth2.client.provider.naver.token-uri=https://nid.naver.com/oauth2.0/token
spring.security.oauth2.client.provider.naver.user-info-uri=https://openapi.naver.com/v1/nid/me
spring.security.oauth2.client.provider.naver.user-name-attribute=response

# Kakao Registration
spring.security.oauth2.client.registration.kakao.client-id=${KAKAO_CLIENT_ID:}
spring.security.oauth2.client.registration.kakao.client-secret=${KAKAO_CLIENT_SECRET:}
spring.security.oauth2.client.registration.kakao.client-name=Kakao
spring.security.oauth2.client.registration.kakao.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.kakao.redirect-uri=http://localhost:8080/login/oauth2/code/kakao
spring.security.oauth2.client.registration.kakao.client-authentication-method=client_secret_post
spring.security.oauth2.client.registration.kakao.scope=profile_nickname, account_email
# Kakao Provider
spring.security.oauth2.client.provider.kakao.authorization-uri=https://kauth.kakao.com/oauth/authorize
spring.security.oauth2.client.provider.kakao.token-uri=https://kauth.kakao.com/oauth/token
spring.security.oauth2.client.provider.kakao.user-info-uri=https://kapi.kakao.com/v2/user/me
spring.security.oauth2.client.provider.kakao.user-name-attribute=id

# Google: show account chooser
spring.security.oauth2.client.registration.google.authorization-params.prompt=select_account

# Kakao: always prompt login
spring.security.oauth2.client.registration.kakao.authorization-params.prompt=login

# Naver: force re-authentication
spring.security.oauth2.client.registration.naver.authorization-params.auth_type=reauthenticate

# Mail Config
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USERNAME:}
spring.mail.password=${GMAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.debug=true

# Twilio Config
twilio.account-sid=${TWILIO_ACCOUNT_SID:}
twilio.auth-token=${TWILIO_AUTH_TOKEN:}
twilio.phone-number=${TWILIO_PHONE_NUMBER:}

# Semantic Match (Python sidecar)
match.semantic.enabled=${MATCH_SEMANTIC_ENABLED:false}
match.semantic.base-url=${MATCH_SEMANTIC_BASE_URL:http://localhost:8001}
match.semantic.timeout-ms=${MATCH_SEMANTIC_TIMEOUT_MS:3000}

# Pre-computed Embedding Match
match.embedding.enabled=${MATCH_EMBEDDING_ENABLED:false}
match.embedding.backfill-on-startup=${MATCH_EMBEDDING_BACKFILL_ON_STARTUP:false}
match.embedding.backfill-batch-size=${MATCH_EMBEDDING_BACKFILL_BATCH_SIZE:100}
