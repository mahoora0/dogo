spring.application.name=dogo

spring.datasource.url=jdbc:mysql://localhost:3306/dogo?createDatabaseIfNotExist=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.open-in-view=false

spring.sql.init.mode=${SPRING_SQL_INIT_MODE:always}
spring.sql.init.encoding=UTF-8

spring.thymeleaf.cache=false

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=30MB

file.upload-dir=${user.home}/dogo/uploads

police.service-key=${POLICE_SERVICE_KEY:${POLICE_LOST_ITEM_SERVICE_KEY:${POLICE_FOUND_ITEM_SERVICE_KEY:}}}
kric.api.key=${KRIC_API_KEY:}

safe182.amber-list.url=${SAFE182_AMBER_LIST_URL:https://www.safe182.go.kr/api/lcm/amberList.do}
safe182.esntl-id=${SAFE182_ESNTL_ID:${SAFE182_MISSING_SEARCH_ESNTL_ID:}}
safe182.auth-key=${SAFE182_AUTH_KEY:${SAFE182_MISSING_SEARCH_AUTH_KEY:}}
safe182.missing-search.esntl-id=${SAFE182_MISSING_SEARCH_ESNTL_ID:${SAFE182_ESNTL_ID:}}
safe182.missing-search.auth-key=${SAFE182_MISSING_SEARCH_AUTH_KEY:${SAFE182_AUTH_KEY:}}
safe182.missing-alert.num-of-rows=${SAFE182_MISSING_ALERT_NUM_OF_ROWS:100}
safe182.missing-alert.backfill-lookback-days=${SAFE182_MISSING_ALERT_BACKFILL_LOOKBACK_DAYS:3650}
safe182.missing-alert.incremental-lookback-days=${SAFE182_MISSING_ALERT_INCREMENTAL_LOOKBACK_DAYS:7}
safe182.missing-alert.sync.enabled=${SAFE182_MISSING_ALERT_SYNC_ENABLED:true}
safe182.missing-alert.sync-cron=${SAFE182_MISSING_ALERT_SYNC_CRON:0 20 * * * *}
safe182.missing-alert.backfill-on-startup=${SAFE182_MISSING_ALERT_BACKFILL_ON_STARTUP:true}

police.common-code.base-url=http://apis.data.go.kr/1320000/CmmnCdService/getCmmnCd
police.common-code.service-key=${police.service-key}
police.common-code.num-of-rows=500

kakao.javascript-key=${KAKAO_JAVASCRIPT_KEY:}
kakao.rest-api-key=${KAKAO_REST_API_KEY:}

police.lost-item.base-url=http://apis.data.go.kr/1320000/LostGoodsInfoInqireService/getLostGoodsInfoAccToClAreaPd
police.lost-item.detail-url=http://apis.data.go.kr/1320000/LostGoodsInfoInqireService/getLostGoodsDetailInfo
police.lost-item.service-key=${police.service-key}
police.lost-item.num-of-rows=100
police.lost-item.incremental-empty-page-limit=0
police.lost-item.backfill-lookback-days=${POLICE_LOST_ITEM_BACKFILL_LOOKBACK_DAYS:1}
police.lost-item.incremental-lookback-days=${POLICE_LOST_ITEM_INCREMENTAL_LOOKBACK_DAYS:30}
police.lost-item.sync.enabled=${POLICE_LOST_ITEM_SYNC_ENABLED:false}
police.lost-item.sync-cron=0 0 * * * *
police.lost-item.backfill-on-startup=${POLICE_LOST_ITEM_BACKFILL_ON_STARTUP:false}

police.found-item.base-url=http://apis.data.go.kr/1320000/LosfundInfoInqireService/getLosfundInfoAccToClAreaPd
police.found-item.detail-url=http://apis.data.go.kr/1320000/LosfundInfoInqireService/getLosfundDetailInfo
police.found-item.service-key=${police.service-key}
police.found-item.num-of-rows=100
police.found-item.incremental-empty-page-limit=0
police.found-item.backfill-lookback-days=${POLICE_FOUND_ITEM_BACKFILL_LOOKBACK_DAYS:1}
police.found-item.incremental-lookback-days=${POLICE_FOUND_ITEM_INCREMENTAL_LOOKBACK_DAYS:30}
police.found-item.sync.enabled=${POLICE_FOUND_ITEM_SYNC_ENABLED:false}
police.found-item.sync-cron=0 10 * * * *
police.found-item.backfill-on-startup=${POLICE_FOUND_ITEM_BACKFILL_ON_STARTUP:false}

# Google Login Config
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=profile,email

# Naver Login Config
spring.security.oauth2.client.registration.naver.client-id=${NAVER_CLIENT_ID:}
spring.security.oauth2.client.registration.naver.client-secret=${NAVER_CLIENT_SECRET:}
spring.security.oauth2.client.registration.naver.client-name=Naver
spring.security.oauth2.client.registration.naver.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.naver.redirect-uri=http://localhost:8080/login/oauth2/code/naver

# Naver Provider Config
spring.security.oauth2.client.provider.naver.authorization-uri=https://nid.naver.com/oauth2.0/authorize
spring.security.oauth2.client.provider.naver.token-uri=https://nid.naver.com/oauth2.0/token
spring.security.oauth2.client.provider.naver.user-info-uri=https://openapi.naver.com/v1/nid/me
spring.security.oauth2.client.provider.naver.user-name-attribute=response

# Kakao Registration
spring.security.oauth2.client.registration.kakao.client-id=${KAKAO_CLIENT_ID:}
spring.security.oauth2.client.registration.kakao.client-secret=${KAKAO_CLIENT_SECRET:}
spring.security.oauth2.client.registration.kakao.client-name=Kakao
spring.security.oauth2.client.registration.kakao.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.kakao.redirect-uri=http://localhost:8080/login/oauth2/code/kakao
spring.security.oauth2.client.registration.kakao.client-authentication-method=client_secret_post
spring.security.oauth2.client.registration.kakao.scope=profile_nickname, account_email

# Kakao Provider
spring.security.oauth2.client.provider.kakao.authorization-uri=https://kauth.kakao.com/oauth/authorize
spring.security.oauth2.client.provider.kakao.token-uri=https://kauth.kakao.com/oauth/token
spring.security.oauth2.client.provider.kakao.user-info-uri=https://kapi.kakao.com/v2/user/me
spring.security.oauth2.client.provider.kakao.user-name-attribute=id

# Mail Config
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USERNAME:}
spring.mail.password=${GMAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.debug=${MAIL_DEBUG:false}

# Twilio Config
twilio.account-sid=${TWILIO_ACCOUNT_SID:}
twilio.auth-token=${TWILIO_AUTH_TOKEN:}
twilio.phone-number=${TWILIO_PHONE_NUMBER:}

# Semantic Match (Python sidecar)
match.semantic.enabled=${MATCH_SEMANTIC_ENABLED:false}
match.semantic.base-url=${MATCH_SEMANTIC_BASE_URL:http://localhost:8001}
match.semantic.timeout-ms=${MATCH_SEMANTIC_TIMEOUT_MS:3000}

# Pre-computed Embedding Match
match.embedding.enabled=${MATCH_EMBEDDING_ENABLED:false}
match.embedding.backfill-on-startup=${MATCH_EMBEDDING_BACKFILL_ON_STARTUP:false}
match.embedding.backfill-batch-size=${MATCH_EMBEDDING_BACKFILL_BATCH_SIZE:100}

# Pet Image Embedding (CLIP)
match.pet.embedding.enabled=${MATCH_PET_EMBEDDING_ENABLED:false}
match.pet.embedding.model-name=${MATCH_PET_EMBEDDING_MODEL_NAME:AvitoTech/Zer0int-CLIP-L-for-animal-identification}
match.pet.embedding.crop-type=${MATCH_PET_EMBEDDING_CROP_TYPE:ANIMAL_CROP_V2}
match.pet.embedding.timeout-ms=${MATCH_PET_EMBEDDING_TIMEOUT_MS:60000}
match.pet.embedding.backfill-on-startup=${MATCH_PET_EMBEDDING_BACKFILL_ON_STARTUP:false}
match.pet.embedding.force-backfill=${MATCH_PET_EMBEDDING_FORCE_BACKFILL:false}
match.pet.embedding.backfill-batch-size=${MATCH_PET_EMBEDDING_BACKFILL_BATCH_SIZE:50}
match.pet.embedding.inference-batch-size=${MATCH_PET_EMBEDDING_INFERENCE_BATCH_SIZE:4}

# Default Admin Account Config
admin.id=${ADMIN_ID:admin}
admin.password=${ADMIN_PASSWORD:}

# Animal Protection API Config (농림축산식품부 농림축산검역본부_국가동물보호정보시스템 구조동물 조회 서비스)
animal-protection.base-url=https://apis.data.go.kr/1543061/abandonmentPublicService_v2
animal-protection.service-key=${ANIMAL_PROTECTION_SERVICE_KEY:}
animal-protection.num-of-rows=${ANIMAL_PROTECTION_NUM_OF_ROWS:100}
animal-protection.backfill-lookback-days=${ANIMAL_PROTECTION_BACKFILL_LOOKBACK_DAYS:30}
animal-protection.incremental-lookback-days=${ANIMAL_PROTECTION_INCREMENTAL_LOOKBACK_DAYS:7}
animal-protection.sync.enabled=${ANIMAL_PROTECTION_SYNC_ENABLED:false}
animal-protection.sync-cron=${ANIMAL_PROTECTION_SYNC_CRON:0 30 * * * *}
animal-protection.backfill-on-startup=${ANIMAL_PROTECTION_BACKFILL_ON_STARTUP:false}

# Animal Loss API Config (농림축산식품부 농림축산검역본부_국가동물보호정보시스템 분실신고동물 조회 서비스)
animal-loss.base-url=https://apis.data.go.kr/1543061/lossInfoService
animal-loss.service-key=${ANIMAL_LOSS_SERVICE_KEY:${ANIMAL_PROTECTION_SERVICE_KEY:}}
animal-loss.num-of-rows=${ANIMAL_LOSS_NUM_OF_ROWS:100}
animal-loss.backfill-lookback-days=${ANIMAL_LOSS_BACKFILL_LOOKBACK_DAYS:30}
animal-loss.incremental-lookback-days=${ANIMAL_LOSS_INCREMENTAL_LOOKBACK_DAYS:7}
animal-loss.sync.enabled=${ANIMAL_LOSS_SYNC_ENABLED:false}
animal-loss.sync-cron=${ANIMAL_LOSS_SYNC_CRON:0 40 * * * *}
animal-loss.backfill-on-startup=${ANIMAL_LOSS_BACKFILL_ON_STARTUP:false}
